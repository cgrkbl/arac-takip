<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Küçüker Lojistik"/>
<meta name="theme-color" content="#1c1c1e"/>
<link rel="manifest" href="/manifest.json"/>
<title>Küçüker Lojistik</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#1c1c1e;font-family:-apple-system,Segoe UI,sans-serif;color:#f2f2f7;min-height:100vh;}
input,select,textarea{font-family:inherit;font-size:14px;color:#f2f2f7;background:#3a3a3c;border:1px solid #48484a;border-radius:8px;padding:10px 12px;width:100%;outline:none;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:#0a84ff;}
input[type=date]{color:#f2f2f7;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
textarea{resize:vertical;}
.screen{display:none;} .screen.active{display:block;}
.card{background:#2c2c2e;border:1px solid #48484a;border-radius:12px;padding:14px;margin-bottom:12px;}
.section-title{font-size:10px;font-weight:700;color:#636366;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:0;}
.field label{font-size:11px;color:#636366;font-weight:600;}
.btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;color:#fff;}
.btn-blue{background:#0a84ff;}
.btn-green{background:#30d158;}
.btn-red{background:#ff453a;}
.btn-orange{background:#ff9f0a;color:#000;}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid;}
.badge-green{color:#30d158;border-color:#30d158;background:#30d15822;}
.badge-orange{color:#ff9f0a;border-color:#ff9f0a;background:#ff9f0a22;}
.badge-blue{color:#0a84ff;border-color:#0a84ff;background:#0a84ff22;}
.badge-red{color:#ff453a;border-color:#ff453a;background:#ff453a22;}
.empty{text-align:center;padding:40px 20px;color:#636366;}
.empty-icon{font-size:32px;margin-bottom:10px;}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:9999;white-space:nowrap;display:none;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s infinite;}

/* Header */
#header{background:#2c2c2e;border-bottom:1px solid #48484a;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
#header-logo{width:36px;height:36px;border-radius:10px;overflow:hidden;flex-shrink:0;}
#header-logo img{width:100%;height:100%;object-fit:contain;background:#fff;}
#header-title{font-size:15px;font-weight:700;}
#header-sub{font-size:10px;color:#636366;}
#header-right{margin-left:auto;display:flex;gap:10px;align-items:center;font-size:12px;}
#btn-cikis-header{background:#3a3a3c;border:1px solid #48484a;border-radius:8px;padding:5px 10px;color:#aeaeb2;font-size:11px;}

/* Üst tab bar */
#tab-bar{background:#2c2c2e;border-bottom:1px solid #48484a;display:flex;overflow-x:auto;}
#tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{flex:1;min-width:60px;padding:11px 4px;background:transparent;color:#636366;border-bottom:2px solid transparent;font-size:11px;font-weight:600;position:relative;white-space:nowrap;}
.tab-btn.active{color:#0a84ff;border-bottom-color:#0a84ff;}
.tab-badge{position:absolute;top:5px;right:4px;background:#ff453a;color:#fff;border-radius:50%;width:15px;height:15px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;}

/* Alt nav - admin */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#2c2c2e;border-top:1px solid #48484a;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:10px 4px 8px;background:transparent;color:#636366;font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;}
.nav-btn.active{color:#0a84ff;}
.nav-btn span:first-child{font-size:20px;}
.nav-badge{position:absolute;top:6px;right:25%;background:#ff453a;color:#fff;border-radius:50%;width:15px;height:15px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;}
#content{padding:16px;max-width:680px;margin:0 auto;padding-bottom:90px;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.kpi-card{background:#2c2c2e;border:1px solid #48484a;border-radius:12px;padding:14px;}
.kpi-icon{font-size:18px;margin-bottom:6px;}
.kpi-val{font-size:20px;font-weight:800;}
.kpi-unit{font-size:10px;color:#636366;margin-top:1px;}
.kpi-label{font-size:11px;color:#aeaeb2;margin-top:3px;}
.bar-wrap{background:#3a3a3c;border-radius:4px;height:6px;overflow:hidden;margin-top:4px;}
.bar{height:100%;border-radius:4px;}

/* Login */
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
#login-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0a0a0f 0%,#111118 50%,#0d0d15 100%);z-index:0;}
#login-content{position:relative;z-index:1;width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;}
#login-logo{width:80px;height:80px;border-radius:16px;overflow:hidden;margin-bottom:12px;background:#fff;}
#login-logo img{width:100%;height:100%;object-fit:contain;}
#login-title{font-size:24px;font-weight:800;margin-bottom:4px;}
#login-sub{font-size:11px;color:#636366;margin-bottom:32px;text-transform:uppercase;letter-spacing:1px;}
.login-btn{width:100%;padding:16px;border-radius:12px;font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:10px;}
#login-sofor-btn{background:#2c2c2e;border:1px solid #48484a;color:#f2f2f7;}
#login-admin-btn{background:#0a84ff;color:#fff;}
#login-yakit-btn{background:#30d158;color:#fff;}
#login-form{width:100%;}
#pin-display{background:#3a3a3c;border:1px solid #48484a;border-radius:8px;padding:14px;text-align:center;font-size:28px;letter-spacing:12px;min-height:56px;margin-bottom:8px;}
#pin-error{color:#ff453a;font-size:12px;text-align:center;margin-bottom:8px;min-height:20px;}
.numpad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
.numpad-btn{padding:16px;background:#2c2c2e;border:1px solid #48484a;border-radius:10px;color:#f2f2f7;font-size:20px;font-weight:600;}
.numpad-btn.del{background:#3a3a3c;}
#btn-giris{width:100%;padding:14px;border-radius:10px;font-size:16px;font-weight:700;background:#3a3a3c;color:#636366;}
#btn-giris.active{background:#0a84ff;color:#fff;}
#btn-geri{background:none;color:#636366;font-size:13px;margin-bottom:20px;padding:0;}

/* Harita */
#map{height:400px;border-radius:12px;overflow:hidden;border:1px solid #48484a;}
.leaflet-popup-content-wrapper{background:#2c2c2e;border:1px solid #48484a;color:#f2f2f7;border-radius:10px;}
.leaflet-popup-tip{background:#2c2c2e;}
.leaflet-popup-content{margin:10px 14px;font-family:-apple-system,sans-serif;font-size:12px;}

/* Uyarı banner */
.warn-red{background:#3a1a1a;border:1px solid #ff453a;border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:8px;}
.warn-orange{background:#2d1f00;border:1px solid #ff9f0a;border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:8px;}
.info-banner{background:#2c2c2e;border:1px solid #48484a;border-radius:8px;padding:10px 14px;font-size:12px;color:#aeaeb2;margin-bottom:12px;}

/* Araç durum kartı */
.arac-durum-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.durum-item{background:#1c1c1e;border-radius:8px;padding:8px 10px;}
.durum-tur{font-size:10px;color:#636366;text-transform:uppercase;letter-spacing:.8px;}
.durum-val{font-size:12px;font-weight:600;margin-top:2px;}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</head>
<body>


<!-- ARAÇ TALEBİ EKRANI -->
<div id="talep-screen" style="display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;">
  <div style="position:absolute;inset:0;background:linear-gradient(135deg,#0a0a0f 0%,#111118 50%,#0d0d15 100%);z-index:0;"></div>
  <svg style="position:absolute;inset:0;width:100%;height:100%;z-index:0;opacity:.4" viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice">
    <polygon points="200,50 280,100 280,200 200,250 120,200 120,100" fill="none" stroke="#0a84ff" stroke-width=".8" opacity=".6"/>
    <polygon points="320,400 390,440 390,520 320,560 250,520 250,440" fill="none" stroke="#30d158" stroke-width=".6" opacity=".3"/>
    <polygon points="80,550 150,590 150,670 80,710 10,670 10,590" fill="none" stroke="#ff9f0a" stroke-width=".5" opacity=".3"/>
    <line x1="200" y1="250" x2="300" y2="178" stroke="#0a84ff" stroke-width=".4" opacity=".3"/>
    <line x1="280" y1="200" x2="250" y2="440" stroke="#30d158" stroke-width=".4" opacity=".2"/>
    <circle cx="200" cy="50" r="2" fill="#0a84ff" opacity=".6"/>
    <circle cx="320" cy="400" r="2" fill="#30d158" opacity=".5"/>
    <defs>
      <radialGradient id="gt1" cx="50%" cy="30%" r="50%"><stop offset="0%" stop-color="#0a84ff" stop-opacity=".08"/><stop offset="100%" stop-color="#0a84ff" stop-opacity="0"/></radialGradient>
    </defs>
    <rect width="400" height="800" fill="url(#gt1)"/>
  </svg>
  <div style="position:relative;z-index:1;width:100%;max-width:340px">
    <button onclick="talepEkraniGizle()" style="background:none;border:none;color:#636366;font-size:13px;margin-bottom:20px;padding:0;cursor:pointer">← Geri</button>
    <div style="font-size:20px;font-weight:800;margin-bottom:4px;color:#f2f2f7">🚗 Araç Talebi</div>
    <div style="display:flex;background:#2c2c2e;border-radius:10px;padding:4px;gap:4px;margin:12px 0">
      <button onclick="talepTab('form')" id="tab-talep-form" style="flex:1;padding:8px;border:none;border-radius:8px;background:#0a84ff;color:#fff;font-size:12px;font-weight:600;cursor:pointer">📝 Yeni Talep</button>
      <button onclick="talepTab('sorgula')" id="tab-talep-sorgula" style="flex:1;padding:8px;border:none;border-radius:8px;background:transparent;color:#636366;font-size:12px;font-weight:600;cursor:pointer">🔍 Sorgula</button>
    </div>
    <div id="talep-form">
      <div class="field" style="margin-bottom:12px">
        <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:5px">Ad Soyad *</label>
        <input type="text" id="t-isim" placeholder="Ahmet Yılmaz"/>
      </div>
      <div class="field" style="margin-bottom:12px">
        <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:5px">Departman *</label>
        <input type="text" id="t-departman" placeholder="Örn: Lojistik, Satış, Üretim"/>
      </div>
      <div class="field" style="margin-bottom:12px">
        <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:5px">Nereye Gidecek *</label>
        <input type="text" id="t-nereye" placeholder="İstanbul, Merkez Depo"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div class="field">
          <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:5px">Tarih *</label>
          <input type="date" id="t-tarih"/>
        </div>
        <div class="field">
          <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:5px">Saat *</label>
          <input type="time" id="t-saat"/>
        </div>
      </div>
      <div class="field" style="margin-bottom:16px">
        <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:5px">Açıklama</label>
        <textarea id="t-aciklama" rows="2" placeholder="Ek bilgi..."></textarea>
      </div>
      <div id="talep-mesaj" style="font-size:12px;margin-bottom:8px;min-height:18px"></div>
      <button onclick="talепGonder()" style="width:100%;padding:14px;background:#0a84ff;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer">🚗 Talebi Gönder</button>
    </div>
    <div id="talep-basari" style="display:none;text-align:center;padding:30px 0">
      <div style="font-size:48px;margin-bottom:16px">✅</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px;color:#f2f2f7">Talebiniz Alındı!</div>
      <div style="font-size:13px;color:#636366;margin-bottom:24px">Yönetici en kısa sürede değerlendirecek.</div>
      <button onclick="talепYeniGonder()" style="padding:12px 24px;background:#3a3a3c;border:1px solid #48484a;border-radius:10px;color:#f2f2f7;font-size:14px;cursor:pointer">Yeni Talep</button>
    </div>
    <div id="talep-sorgula-panel" style="display:none">
      <div class="field" style="margin-bottom:12px">
        <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:5px">Ad Soyad *</label>
        <input type="text" id="s-isim" placeholder="Ahmet Yılmaz"/>
      </div>
      <button onclick="talepSorgula()" style="width:100%;padding:14px;background:#636366;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:16px">🔍 Sorgula</button>
      <div id="sorgula-sonuc"></div>
    </div>
  </div>
</div>


<!-- LOGIN -->
<div id="login-screen">
  <div id="login-bg">
    <svg style="width:100%;height:100%;opacity:.4" viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice">
      <polygon points="200,50 280,100 280,200 200,250 120,200 120,100" fill="none" stroke="#0a84ff" stroke-width=".8" opacity=".6"/>
      <polygon points="350,150 400,178 400,234 350,262 300,234 300,178" fill="none" stroke="#0a84ff" stroke-width=".5" opacity=".4"/>
      <polygon points="50,300 110,334 110,402 50,436 -10,402 -10,334" fill="none" stroke="#0a84ff" stroke-width=".5" opacity=".4"/>
      <polygon points="320,400 390,440 390,520 320,560 250,520 250,440" fill="none" stroke="#30d158" stroke-width=".6" opacity=".3"/>
      <polygon points="80,550 150,590 150,670 80,710 10,670 10,590" fill="none" stroke="#ff9f0a" stroke-width=".5" opacity=".3"/>
      <line x1="200" y1="250" x2="300" y2="178" stroke="#0a84ff" stroke-width=".4" opacity=".3"/>
      <line x1="120" y1="200" x2="10" y2="334" stroke="#0a84ff" stroke-width=".4" opacity=".3"/>
      <line x1="280" y1="200" x2="250" y2="440" stroke="#30d158" stroke-width=".4" opacity=".2"/>
      <circle cx="200" cy="50" r="2" fill="#0a84ff" opacity=".6"/>
      <circle cx="280" cy="100" r="2" fill="#0a84ff" opacity=".6"/>
      <circle cx="200" cy="250" r="2" fill="#0a84ff" opacity=".6"/>
      <circle cx="320" cy="400" r="2" fill="#30d158" opacity=".5"/>
      <defs>
        <radialGradient id="g1" cx="50%" cy="30%" r="50%"><stop offset="0%" stop-color="#0a84ff" stop-opacity=".08"/><stop offset="100%" stop-color="#0a84ff" stop-opacity="0"/></radialGradient>
        <radialGradient id="g2" cx="50%" cy="70%" r="40%"><stop offset="0%" stop-color="#30d158" stop-opacity=".05"/><stop offset="100%" stop-color="#30d158" stop-opacity="0"/></radialGradient>
      </defs>
      <rect width="400" height="800" fill="url(#g1)"/>
      <rect width="400" height="800" fill="url(#g2)"/>
    </svg>
  </div>
  <div id="login-content">
    <div id="login-logo"><img id="login-logo-img" src="" onload="this.style.opacity=1" style="opacity:0;transition:opacity .3s"/></div>
    <div id="login-title">Küçüker Lojistik</div>
    <div id="login-sub">Araç Takip Sistemi</div>
    <div id="login-buttons">
      <button class="login-btn" id="login-sofor-btn" onclick="loginMod('sofor')" style="background:#ff9f0a;color:#000;">🧑‍✈️ Şoför Girişi</button>
      <button class="login-btn" id="login-admin-btn" onclick="loginMod('admin')">🔑 Yönetici Girişi</button>
      <button class="login-btn" id="login-yakit-btn" onclick="loginMod('yakit')">⛽ Yakıt Personeli</button>
      <button class="login-btn" style="background:#ff453a;color:#fff;" onclick="talepEkraniGoster()">🚗 Araç Talebi</button>
    </div>
    <div id="login-form" style="display:none;width:100%">
      <button id="btn-geri" onclick="loginGeri()">← Geri</button>
      <div id="sofor-sec-wrap" style="display:none;margin-bottom:16px">
        <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:6px">ŞOFÖR *</label>
        <select id="sofor-sec" style="width:100%;background:#3a3a3c;border:1px solid #48484a;border-radius:8px;padding:12px;color:#f2f2f7;font-size:14px;outline:none;"></select>
      </div>
      <div id="pin-display">PIN girin</div>
      <div id="pin-error"></div>
      <div class="numpad">
        <button class="numpad-btn" onclick="pinGir('1')">1</button>
        <button class="numpad-btn" onclick="pinGir('2')">2</button>
        <button class="numpad-btn" onclick="pinGir('3')">3</button>
        <button class="numpad-btn" onclick="pinGir('4')">4</button>
        <button class="numpad-btn" onclick="pinGir('5')">5</button>
        <button class="numpad-btn" onclick="pinGir('6')">6</button>
        <button class="numpad-btn" onclick="pinGir('7')">7</button>
        <button class="numpad-btn" onclick="pinGir('8')">8</button>
        <button class="numpad-btn" onclick="pinGir('9')">9</button>
        <button class="numpad-btn" style="opacity:0" disabled></button>
        <button class="numpad-btn" onclick="pinGir('0')">0</button>
        <button class="numpad-btn del" onclick="pinSil()">⌫</button>
      </div>
      <button id="btn-giris" onclick="loginGiris()">Giriş Yap</button>
    </div>
  </div>
</div>

<!-- ANA UYGULAMA -->
<div id="app" style="display:none">
  <div id="header">
    <div id="header-logo"><img id="header-logo-img" src="" style=""/></div>
    <div>
      <div id="header-title">Küçüker Lojistik</div>
      <div id="header-sub"></div>
    </div>
    <div id="header-right">
      <span id="header-durum"></span>
      <button onclick="window.location.reload()" style="background:#3a3a3c;border:1px solid #48484a;border-radius:8px;padding:5px 10px;color:#aeaeb2;font-size:11px;margin-right:6px">🔄</button><button id="btn-cikis-header" onclick="logout()">Çıkış</button>
    </div>
  </div>
  <div id="tab-bar"></div>
  <div id="content"></div>
  <div id="bottom-nav" style="display:none"></div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// VERİ
// ═══════════════════════════════════════════
let ADMIN_PIN = "1234";
let YAKIT_PIN = "0000";
const YUKLER = ["Ham Kumaş","Boyalı Kumaş","İplik","Aksesuar","Mamul Ürün","Ambalaj Malzemesi","Kimyasal Madde","Diğer"];
const BAKIM_TURLERI = ["Muayene","Sigorta","Bakım","Lastik"];

// Logo base64 - sonradan yüklenecek
const LOGO_B64 = "/icon.png";

let DB = {
  soforler: [],
  araclar: [],
  konumlar: [],
  fabrika: {id:"fabrika",isim:"Ana Fabrika",lat:37.810609525109456,lng:29.161879748756583},
  aktifSeferler: [],
  tamamlananlar: [],
  yakitlar: [],
  bakimlar: [],
  isler: [],
  mesailer: [],
  talepler: [],
  nakliyeler: [],
  litreFiyati: "",
};

// ═══════════════════════════════════════════
// KULLANICI DURUMU
// ═══════════════════════════════════════════
let KUL = null; // {rol, isim}
let AKTIF_MENU = "ana";
let AKTIF_TAB = "rapor";
let PIN = "";
let LOGIN_MOD = null;
let MAP_OBJ = null;
let FILTRE_SOFOR = "Tümü";
let FILTRE_BAS = "";
let FILTRE_BIT = "";
let FILTRE_HARITA_TARIH = new Date().toISOString().split("T")[0];

// ═══════════════════════════════════════════

function logo() {
  const imgs = document.querySelectorAll('#login-logo-img,#header-logo-img');
  imgs.forEach(img => {
    img.src = LOGO_SRC;
  });
}

function formatSure(d) {
  if(d<60) return d+" dk";
  const sa=Math.floor(d/60), dk=d%60;
  return dk>0?sa+" sa "+dk+" dk":sa+" sa";
}

function mesafe(la1,ln1,la2,ln2) {
  const R=6371,dL=(la2-la1)*Math.PI/180,dN=(ln2-ln1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dN/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function tumKonumlar() {
  return [DB.fabrika, ...DB.konumlar];
}

function showToast(msg, type="success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  t.style.background = type==="error" ? "#3a1a1a" : "#1a3a2a";
  t.style.border = "1px solid "+(type==="error"?"#ff453a":"#30d158");
  t.style.color = type==="error" ? "#ff453a" : "#6ee7b7";
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.style.display="none", 3000);
}

function setContent(html) {
  document.getElementById("content").innerHTML = html;
}

// ═══════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════
function loginMod(mod) {
  LOGIN_MOD = mod;
  PIN = "";
  document.getElementById("login-buttons").style.display = "none";
  document.getElementById("login-form").style.display = "block";
  document.getElementById("sofor-sec-wrap").style.display = mod==="sofor" ? "block" : "none";
  pinGuncelle();
  document.getElementById("pin-error").textContent = "";
  if(mod==="sofor") {
    const sel = document.getElementById("sofor-sec");
    sel.innerHTML = '<option value="">Seçin...</option>' +
      DB.soforler.map(s=>`<option value="${s.isim}">${s.isim}</option>`).join("");
  }
}

function loginGeri() {
  document.getElementById("login-buttons").style.display = "block";
  document.getElementById("login-form").style.display = "none";
  PIN = "";
}

function pinGir(d) {
  if(PIN.length >= 4) return;
  PIN += d;
  pinGuncelle();
}

function pinSil() {
  PIN = PIN.slice(0,-1);
  pinGuncelle();
}

function pinGuncelle() {
  const el = document.getElementById("pin-display");
  el.textContent = PIN ? "●".repeat(PIN.length) : "PIN girin";
  el.style.color = PIN ? "#f2f2f7" : "#636366";
  el.style.letterSpacing = PIN ? "12px" : "0";
  el.style.fontSize = PIN ? "28px" : "14px";
  const btn = document.getElementById("btn-giris");
  btn.className = PIN.length===4 ? "active" : "";
  btn.style.background = PIN.length===4 ? "#0a84ff" : "#3a3a3c";
  btn.style.color = PIN.length===4 ? "#fff" : "#636366";
}

function loginGiris() {
  if(PIN.length < 4) return;
  document.getElementById("pin-error").textContent = "";
  if(LOGIN_MOD==="admin") {
    if(PIN===ADMIN_PIN) girisYap({rol:"admin",isim:"Yönetici"});
    else { document.getElementById("pin-error").textContent="Yanlış PIN!"; PIN=""; pinGuncelle(); }
  } else if(LOGIN_MOD==="yakit") {
    if(PIN===YAKIT_PIN) girisYap({rol:"yakit",isim:"Yakıt Personeli"});
    else { document.getElementById("pin-error").textContent="Yanlış PIN!"; PIN=""; pinGuncelle(); }
  } else {
    const sf = document.getElementById("sofor-sec").value;
    if(!sf) { document.getElementById("pin-error").textContent="Şoför seçin!"; return; }
    const sofor = DB.soforler.find(s=>s.isim===sf);
    if(sofor && PIN===sofor.pin) girisYap({rol:"sofor",isim:sf});
    else { document.getElementById("pin-error").textContent="Yanlış PIN!"; PIN=""; pinGuncelle(); }
  }
}

// Giriş ekranı için PIN ve şoför listesini önceden yükler (giriş öncesi doğrulama için)
async function loginVerisiYukle() {
  try {
    const [ayarlar, soforler] = await Promise.all([
      supa.from('ayarlar').select('*'),
      supa.from('soforler').select('*').order('isim'),
    ]);
    if(ayarlar.data) {
      ayarlar.data.forEach(function(a) {
        if(a.anahtar==='admin_pin') ADMIN_PIN=a.deger;
        if(a.anahtar==='yakit_pin') YAKIT_PIN=a.deger;
        if(a.anahtar==='litre_fiyati') DB.litreFiyati=a.deger;
      });
    }
    if(soforler.data) DB.soforler = soforler.data;
  } catch(e) { console.error("Giriş verisi yükleme hatası:", e); }
}

async function girisYap(kul) {
  KUL = kul;
  // Oturumu kaydet
  sessionStorage.setItem("kul", JSON.stringify(kul));
  sessionStorage.setItem("aktif_menu", AKTIF_MENU);
  sessionStorage.setItem("aktif_tab", AKTIF_TAB);
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  // Giriş sonrası yükle
  showToast("Veriler yükleniyor...");
  await dbYukle();
  document.getElementById("header-sub").textContent =
    kul.rol==="admin" ? "🔑 Yönetici" :
    kul.rol==="yakit" ? "⛽ Yakıt Personeli" : "🧑‍✈️ "+kul.isim;

  if(kul.rol==="admin") {
    document.getElementById("bottom-nav").style.display = "flex";
    altMenuSec("ana");
  } else if(kul.rol==="yakit") {
    document.getElementById("bottom-nav").style.display = "none";
    renderTabBar([{id:"yakit",label:"⛽ Yakıt Girişi"},{id:"yakitliste",label:"📋 Yakıt Listesi"}]);
    tabSec("yakit");
  } else {
    document.getElementById("bottom-nav").style.display = "none";
    renderSoforTabBar();
    tabSec("cikis");
  }
  headerGuncelle();
  logo();
}

function logout() {
  KUL = null;
  sessionStorage.removeItem("kul");
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("login-buttons").style.display = "block";
  document.getElementById("login-form").style.display = "none";
  PIN = "";
}

function tabSec(id) {
  AKTIF_TAB = id;
  sessionStorage.setItem("aktif_tab", id);
  // tab bar güncelle
  document.querySelectorAll(".tab-btn").forEach(b=>{
    b.classList.toggle("active", b.textContent.trim().startsWith(
      id==="rapor"?"📊":id==="harita"?"🗺️":id==="cikis"?"🚀":
      id==="aktif"?"🟡":id==="liste"?"📋":id==="araclar"?"🚗":
      id==="soforler"?"👤":id==="konumlar"?"📍":id==="yakit"?"⛽":
      id==="yakitliste"?"📋":id==="bakim"?"🔧":
      id==="bakimliste"?"📋":id==="nakliye"?"🚚":
      id==="nakliyeliste"?"📋":"XXX"
    ));
  });
  // Tekrar tab bar'ı doğru render et
  if(KUL.rol==="admin") renderTabBar(MENU_GRUPLARI[AKTIF_MENU]);

  else renderSoforTabBar();

  // içeriği render et
  switch(id) {
    case "rapor":      renderKPI(); break;
    case "harita":     renderHarita(); break;
    case "cikis":      renderCikis(); break;
    case "aktif":      renderAktif(); break;
    case "liste":      renderListe(); break;
    case "araclar":    renderAraclar(); break;
    case "soforler":   renderSoforler(); break;
    case "konumlar":   renderKonumlar(); break;
    case "yakit":      renderYakit(); break;
    case "yakitliste": renderYakitListe(); break;
    case "bakim":      renderBakim(); break;
    case "bakimliste": renderBakimListe(); break;
    case "ayarlar":    renderAyarlar(); break;
    case "mesailer":   renderMesailer(); break;
    case "talepler":   renderTalepler(); break;
    case "nakliye":    renderNakliye(); break;
    case "nakliyeliste": renderNakliyeListe(); break;
    case "maliyet":    renderMaliyetRaporu(); break;
    case "islistesi":   window.IS_FILTRE_TARIH_MANUEL=false; window.IS_FILTRE_TARIH=null; renderIsListesi(); break;

let CIKIS_SEL = {lat:null,lng:null,id:null};
let VARIS_SEL = {lat:null,lng:null,id:null,isim:""};

function cikisSecildi() {
  const id = document.getElementById("f-cikis").value;
  const k = tumKonumlar().find(x=>String(x.id)===String(id));
  if(!k) { CIKIS_SEL={lat:null,lng:null,id:null}; return; }
  CIKIS_SEL = {lat:k.lat,lng:k.lng,id:k.id,isim:k.isim};
  const link = document.getElementById("cikis-harita-link");
  link.style.display="block";
  link.innerHTML=`<a href="https://www.google.com/maps?q=${k.lat},${k.lng}" target="_blank" style="color:#0a84ff;text-decoration:none">📍 ${k.isim} — Haritada Gör →</a>`;
  varisGuncelle();
}

function varisSecildi() {
  const id = document.getElementById("f-varis").value;
  const k = tumKonumlar().find(x=>String(x.id)===String(id));
  const el = document.getElementById("varis-detay");
  if(!k) { VARIS_SEL={lat:null,lng:null,id:null,isim:""}; el.style.display="none"; return; }
  VARIS_SEL = {lat:k.lat,lng:k.lng,id:k.id,isim:k.isim};
  varisGuncelle();
}

function varisGuncelle() {
  const el = document.getElementById("varis-detay");
  if(!VARIS_SEL.lat) return;
  const basLat = CIKIS_SEL.lat || DB.fabrika.lat;
  const basLng = CIKIS_SEL.lng || DB.fabrika.lng;
  const km = mesafe(basLat, basLng, VARIS_SEL.lat, VARIS_SEL.lng);
  el.style.display="block";
  el.innerHTML=`
    <div style="background:#1c1c1e;border:1px solid #0a84ff44;border-radius:10px;padding:12px 14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:14px;font-weight:700">${VARIS_SEL.isim}</div>
        <span class="badge badge-blue">📏 ${km} km</span>
      </div>
      <a href="https://www.google.com/maps/dir/?api=1&origin=${basLat},${basLng}&destination=${VARIS_SEL.lat},${VARIS_SEL.lng}&travelmode=driving"
        target="_blank" style="display:block;text-align:center;background:#1a73e8;color:#fff;border-radius:8px;padding:9px;font-size:13px;font-weight:700;text-decoration:none">
        🗺️ Rotayı Google Maps'te Aç
      </a>
    </div>`;
}

function cikisKaydetBtn(btn) {
  const soforAdi = btn.getAttribute("data-sofor") || "";
  cikisKaydet(soforAdi);
}

async function cikisKaydet(soforAdi) {
  const soforEl = document.getElementById("f-sofor");
  const sofor = (soforEl ? soforEl.value : "") || soforAdi || "";
  const tarihEl = document.getElementById("f-tarih");
  const tarih = tarihEl ? tarihEl.value : new Date().toISOString().split("T")[0];
  const cikisId = (document.getElementById("f-cikis")||{}).value || "";
  const varisId = (document.getElementById("f-varis")||{}).value || "";
  const km = (document.getElementById("f-km")||{}).value || "";
  const yuk = (document.getElementById("f-yuk")||{}).value || "";
  const plaka = (document.getElementById("f-plaka")||{}).value || "";
  const miktar = (document.getElementById("f-miktar")||{}).value || "";
  const birim = (document.getElementById("f-birim")||{}).value || "kg";
  const aciklama = (document.getElementById("f-aciklama")||{}).value || "";

  if(!sofor||!cikisId||!varisId||!km||!yuk) { 
    let eksik = [];
    if(!sofor) eksik.push("Şoför");
    if(!cikisId) eksik.push("Çıkış konumu");
    if(!varisId) eksik.push("Varış noktası");
    if(!km) eksik.push("Başlangıç KM");
    if(!yuk) eksik.push("Yük türü");
    showToast(eksik.join(", ")+" zorunlu!","error"); 
    return; 
  }
  if(DB.aktifSeferler.find(s=>s.sofor===sofor)) { showToast(sofor+" zaten yolda!","error"); return; }

  const cikisK = tumKonumlar().find(x=>String(x.id)===String(cikisId));
  const varisK = tumKonumlar().find(x=>String(x.id)===String(varisId));
  const km_mesafe = cikisK&&varisK ? mesafe(cikisK.lat,cikisK.lng,varisK.lat,varisK.lng) : null;
  const simdi = new Date();

  const yeniSefer = {
    sofor, tarih, plaka,
    cikis_id: cikisId, cikis_isim: cikisK?.isim||"", cikis_lat: cikisK?.lat, cikis_lng: cikisK?.lng,
    varis_id: varisId, varis_isim: varisK?.isim||"", varis_lat: varisK?.lat, varis_lng: varisK?.lng,
    mesafe: km_mesafe, baslangic_km: parseInt(km),
    yuk_turu: yuk, yuk_miktari: miktar, yuk_birimi: birim, aciklama,
    cikis_timestamp: simdi.getTime(),
    cikis_saati: simdi.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"})
  };
  try {
    const data = await seferBaslatDB(yeniSefer);
    DB.aktifSeferler.push({...yeniSefer, id: data.id});
  } catch(e) {
    DB.aktifSeferler.push({...yeniSefer, id: Date.now()});
  }
  showToast(sofor+" yola çıktı!");
  headerGuncelle();
  if(KUL.rol==="admin") { renderBottomNav(); altMenuSec("sefer"); }
  else { renderSoforTabBar(); tabSec("aktif"); }
}

    </div>

function kmHesapla(id, basKm) {
  const val = parseInt(document.getElementById("don-km-"+id).value)||0;
  const el = document.getElementById("km-fark-"+id);
  if(val > basKm) { el.style.display="block"; el.textContent=`+${val-basKm} km`; }
  else el.style.display="none";
}

async function donusKaydet(id) {
  const sefer = DB.aktifSeferler.find(s=>s.id===id);
  if(!sefer) return;
  const bKm = parseInt(document.getElementById("don-km-"+id).value);
  const not = document.getElementById("don-not-"+id).value;
  if(!bKm) { showToast("Bitiş KM girin!","error"); return; }
  if(bKm <= sefer.baslangic_km) { showToast("Bitiş KM başlangıçtan büyük olmalı!","error"); return; }
  const simdi = new Date();
  const bekleme = Math.round((simdi.getTime()-sefer.cikis_timestamp)/60000);
  const tamamlanan = {
    ...sefer, bitis_km: bKm, km_fark: bKm-sefer.baslangic_km,
    donus_notu: not, bekleme_dakika: bekleme,
    donus_saati: simdi.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"})
  };
  try {
    await seferTamamlaDB(id, bKm, not, bekleme, tamamlanan.donus_saati, bKm-sefer.baslangic_km);
  } catch(e) {}
  DB.tamamlananlar.unshift(tamamlanan);
  DB.aktifSeferler = DB.aktifSeferler.filter(s=>s.id!==id);
  showToast(sefer.sofor+" döndü - "+formatSure(bekleme));
  headerGuncelle();
  if(KUL.rol==="admin") renderBottomNav();
  else renderSoforTabBar();
  renderAktif();
}

function cizPastaGrafik(canvasId, legendId, veriler, renkler) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  const cx = canvas.width/2, cy = canvas.height/2, r = 58;
  const toplam = veriler.reduce((a,v)=>a+v.deger,0);
  if(toplam===0) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  let aci = -Math.PI/2;
  veriler.forEach((v,i) => {
    const dilim = (v.deger/toplam) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,aci,aci+dilim);
    ctx.closePath();
    ctx.fillStyle = renkler[i%renkler.length];
    ctx.fill();
    ctx.strokeStyle = "#1c1c1e";
    ctx.lineWidth = 2;
    ctx.stroke();
    aci += dilim;
  });

  // Ortada boşluk (donut efekti)
  ctx.beginPath();
  ctx.arc(cx,cy,30,0,Math.PI*2);
  ctx.fillStyle = "#2c2c2e";
  ctx.fill();

  // Legend
  const leg = document.getElementById(legendId);
  if(leg) {
    leg.innerHTML = veriler.map((v,i)=>`
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
        <div style="width:10px;height:10px;border-radius:50%;background:${renkler[i%renkler.length]};flex-shrink:0"></div>
        <span style="color:#aeaeb2">${v.etiket}</span>
        <span style="color:#f2f2f7;font-weight:600;margin-left:auto">${v.yuzde}%</span>
      </div>`).join("");
  }
}

function kpiGrafikleriCiz(soforKm, soforBek, tKm, tBek) {
  const RENKLER = ["#0a84ff","#30d158","#ff9f0a","#ff453a","#bf5af2","#32ade6","#ff6961","#ffd60a"];
  
  setTimeout(()=>{
    const kmVeriler = Object.entries(soforKm).sort((a,b)=>b[1]-a[1]).map(([s,km])=>({
      etiket: s.split(" ")[0],
      deger: km,
      yuzde: tKm>0?Math.round(km/tKm*100):0
    }));
    cizPastaGrafik("pie-km","pie-km-legend",kmVeriler,RENKLER);

    const bekVeriler = Object.entries(soforBek).sort((a,b)=>b[1]-a[1]).map(([s,dk])=>({
      etiket: s.split(" ")[0],
      deger: dk,
      yuzde: tBek>0?Math.round(dk/tBek*100):0
    }));
    cizPastaGrafik("pie-bek","pie-bek-legend",bekVeriler,RENKLER);
  }, 100);
}

function listeFiltreGuncelle(v) { FILTRE_SOFOR=v; renderListe(); }
function listeTarihGuncelle(tip,v) { if(tip==="bas") FILTRE_BAS=v; else FILTRE_BIT=v; renderListe(); }
function listeHizliFiltre(gun) {
  if(gun===0) { FILTRE_BAS=""; FILTRE_BIT=""; }
  else if(gun===1) { FILTRE_BAS=new Date().toISOString().split("T")[0]; FILTRE_BIT=FILTRE_BAS; }
  else { FILTRE_BIT=new Date().toISOString().split("T")[0]; FILTRE_BAS=new Date(Date.now()-gun*24*60*60*1000).toISOString().split("T")[0]; }
  renderListe();
}

function renderHarita() {
  const tarihler = [...new Set(DB.tamamlananlar.map(s=>s.tarih))].sort((a,b)=>b.localeCompare(a));
  if(tarihler.length>0 && !tarihler.includes(FILTRE_HARITA_TARIH)) {
    FILTRE_HARITA_TARIH = tarihler[0];
  }

  setContent(`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;color:#636366">Tarih:</span>
      <select onchange="haritaTarihGuncelle(this.value)" style="flex:1">
        ${tarihler.length===0?`<option value="${FILTRE_HARITA_TARIH}">${FILTRE_HARITA_TARIH}</option>`:""}
        ${tarihler.map(t=>`<option value="${t}" ${FILTRE_HARITA_TARIH===t?"selected":""}>${t}</option>`).join("")}
      </select>
    </div>
    <div class="card" style="padding:10px;display:flex;gap:16px;font-size:12px;color:#aeaeb2;margin-bottom:12px">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#ff453a;margin-right:5px"></span>Varış noktası</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#ff9f0a;margin-right:5px"></span>Fabrika</span>
    </div>
    <div id="map"></div>
    <div style="height:20px"></div>
  `);

  setTimeout(()=>haritaRender(), 100);
}

function haritaTarihGuncelle(t) { FILTRE_HARITA_TARIH=t; renderHarita(); }

function haritaRender() {
  const mapEl = document.getElementById("map");
  if(!mapEl) return;

  if(MAP_OBJ) { MAP_OBJ.remove(); MAP_OBJ=null; }
  MAP_OBJ = L.map("map").setView([DB.fabrika.lat, DB.fabrika.lng], 8);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(MAP_OBJ);

  // Fabrika
  L.marker([DB.fabrika.lat,DB.fabrika.lng],{icon:L.divIcon({
    html:`<div style="background:#ff9f0a;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>`,
    className:"",iconSize:[14,14],iconAnchor:[7,7]
  })}).bindPopup(`<b>🏭 ${DB.fabrika.isim}</b>`).addTo(MAP_OBJ);

  const seferler = DB.tamamlananlar.filter(s=>s.tarih===FILTRE_HARITA_TARIH);
  seferler.forEach(s=>{
    if(!s.varis_lat||!s.varis_lng) return;
    L.marker([s.varis_lat,s.varis_lng],{icon:L.divIcon({
      html:`<div style="background:#ff453a;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>`,
      className:"",iconSize:[14,14],iconAnchor:[7,7]
    })}).bindPopup(`<b>${s.varis_isim}</b><br>🧑‍✈️ ${s.sofor}<br>🛣️ ${s.km_fark} km<br>⏱️ ${formatSure(s.bekleme_dakika)}`).addTo(MAP_OBJ);
    L.polyline([[DB.fabrika.lat,DB.fabrika.lng],[s.varis_lat,s.varis_lng]],{color:"#ff453a",weight:2,opacity:.5,dashArray:"6,6"}).addTo(MAP_OBJ);
  });

  if(seferler.length>0) {
    const bounds = seferler.filter(s=>s.varis_lat).map(s=>[s.varis_lat,s.varis_lng]);
    bounds.push([DB.fabrika.lat,DB.fabrika.lng]);
    if(bounds.length>1) MAP_OBJ.fitBounds(bounds,{padding:[30,30]});
  }
}

async function aracEkle() {
  const pl = document.getElementById("yeni-plaka").value.trim().toUpperCase();
  if(!pl) { showToast("Plaka girin!","error"); return; }
  if(DB.araclar.find(a=>a.plaka===pl)) { showToast("Bu plaka zaten var!","error"); return; }
  try {
    const data = await aracEkleDB(pl);
    DB.araclar.push(data);
    showToast(pl+" eklendi!");
    renderAraclar();
  } catch(e) { showToast("Hata: "+e.message,"error"); }
}

async function aracSil(id) {
  try {
    await aracSilDB(id);
    DB.araclar = DB.araclar.filter(a=>a.id!==id);
    showToast("Araç silindi.");
    renderAraclar();
  } catch(e) { showToast("Hata: "+e.message,"error"); }
}

async function konumEkle() {
  const isim=document.getElementById("yk-isim").value.trim();

    const data = await konumEkleDB({isim,adres,lat,lng});
    DB.konumlar.push(data);
    showToast(isim+" eklendi!");
    renderKonumlar();
  } catch(e) { showToast("Hata: "+e.message,"error"); }
}

function konumDuzenle(id) { DUZ_KONUM_ID=id; renderKonumlar(); }

async function konumKaydet() {
  const isim=document.getElementById("duz-isim").value.trim();
  const adres=document.getElementById("duz-adres").value.trim();
  const lat=parseFloat(document.getElementById("duz-lat").value);
  const lng=parseFloat(document.getElementById("duz-lng").value);
  if(!isim||!lat||!lng){showToast("Zorunlu alanları doldurun!","error");return;}
  try {
    await konumGuncelleDB(DUZ_KONUM_ID,{isim,adres,lat,lng});
    if(DUZ_KONUM_ID==="fabrika") { DB.fabrika={...DB.fabrika,isim,adres,lat,lng}; }
    else { DB.konumlar=DB.konumlar.map(k=>k.id===DUZ_KONUM_ID?{...k,isim,adres,lat,lng}:k); }
    DUZ_KONUM_ID=null;
    showToast(isim+" güncellendi!");
    renderKonumlar();
  } catch(e) { showToast("Hata: "+e.message,"error"); }
}

async function konumSil(id) {
  try {
    await konumSilDB(id);
    DB.konumlar=DB.konumlar.filter(k=>k.id!==id);
    showToast("Konum silindi.");
    renderKonumlar();
  } catch(e) { showToast("Hata: "+e.message,"error"); }
}

function litreFiyatiGuncelle() {
  // Bilgi satırını güncelle
  const fiyat = parseFloat(DB.litreFiyati)||0;
  const bilgiEl = document.getElementById("litre-fiyat-bilgi");
  if(bilgiEl) {
    if(fiyat>0) {
      bilgiEl.style.display="block";
      bilgiEl.innerHTML=`💡 1 litre = <strong style="color:#0a84ff">${fiyat.toFixed(2)} TL</strong>`;
    } else {
      bilgiEl.style.display="none";
    }
  }
  // Hesabı da güncelle
  yakitHesapla();
}

function yakitHesapla() {
  const litre = parseFloat(document.getElementById("y-litre")?.value)||0;
  const fiyat = parseFloat(DB.litreFiyati)||0;
  const el = document.getElementById("yakit-hesap");
  if(!el) return;
  if(litre>0) {
    el.style.display="block";
    el.innerHTML=`<div style="background:#1c1c1e;border-radius:8px;padding:10px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;margin-bottom:10px">
      <div><div style="color:#636366;font-size:10px;text-transform:uppercase;letter-spacing:1px">Alınan Yakıt</div>
      <div style="color:#30d158;font-weight:700;font-size:18px;margin-top:4px">${litre} Litre</div></div>
      ${KUL.rol==="admin"&&fiyat>0?`<div><div style="color:#636366;font-size:10px;text-transform:uppercase;letter-spacing:1px">Toplam Tutar</div>
      <div style="color:#ff9f0a;font-weight:700;font-size:18px;margin-top:4px">${(litre*fiyat).toFixed(2)} TL</div></div>`:""}
    </div>`;
  } else el.style.display="none";
}

async function yakitKaydet() {
  const sofor=document.getElementById("y-sofor").value;
  const plaka=document.getElementById("y-plaka").value;
  const tarih=document.getElementById("y-tarih").value;
  const litre=parseFloat(document.getElementById("y-litre").value);
  if(!sofor||!plaka||!litre){showToast("Zorunlu alanları doldurun!","error");return;}
  const fiyat=parseFloat(DB.litreFiyati)||0;
  const simdi=new Date();
  // Eğer tarih bugün ise saati yaz, değilse boş bırak
  const bugunStr = bugunTR ? bugunTR() : simdi.toISOString().split("T")[0];
  const yeniYakit = {
    sofor, plaka, tarih, litre,
    tutar: fiyat>0?litre*fiyat:0,
    saat: tarih===bugunStr ? simdi.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}) : "",
    kaydeden: KUL.isim
  };
  try {
    const data = await yakitEkleDB(yeniYakit);
    DB.yakitlar.unshift({...yeniYakit, id: data.id});
  } catch(e) { DB.yakitlar.unshift({...yeniYakit, id: Date.now()}); }
  showToast("Yakıt kaydı eklendi!");
  renderYakit();
}

async function yakitSil(id) {
  try { await yakitSilDB(id); } catch(e) {}
  DB.yakitlar = DB.yakitlar.filter(function(y){ return y.id!==id; });
  showToast("Yakıt kaydı silindi.");
  renderYakitListe();
}

      ${isAdmin?`<div class="kpi-card"><div class="kpi-icon">💰</div><div class="kpi-val" style="color:#ff9f0a">${tTutar.toLocaleString()}</div><div class="kpi-unit">TL</div><div class="kpi-label">Toplam Tutar</div></div>`:""}
      <div class="kpi-card"><div class="kpi-icon">📋</div><div class="kpi-val" style="color:#0a84ff">${DB.yakitlar.length}</div><div class="kpi-unit">adet</div><div class="kpi-label">Toplam Kayıt</div></div>
    </div>
    ${DB.yakitlar.map(y=>`
      <div class="card" style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <div>
            <div style="font-weight:700;font-size:14px">${y.sofor}</div>
            <div style="font-size:11px;color:#636366">${y.tarih}${y.saat?" • "+y.saat:""} • ${y.plaka}</div>

          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <span class="badge badge-green">${y.litre} lt</span>
            ${isAdmin&&y.tutar>0?`<span class="badge badge-orange">${y.tutar.toLocaleString()} TL</span>`:""}
          </div>
        </div>
        <div style="background:#1c1c1e;border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:6px;font-size:11px;color:#636366">

function renderBakim() {
  const bugun = new Date();
  const gecmis = DB.bakimlar.filter(b=>b.sonrakiTarih&&new Date(b.sonrakiTarih)<bugun);
  const yaklasan = DB.bakimlar.filter(b=>{
    if(!b.sonrakiTarih) return false;
    const fark=(new Date(b.sonrakiTarih)-bugun)/(1000*60*60*24);
    return fark<=30&&fark>=0;
  });

  var html = "";
  gecmis.forEach(b=>{
    html+=`<div class="warn-red"><span style="color:#ff453a;font-weight:700">🚨 VADESİ GEÇMİŞ: </span><span>${b.plaka} — ${b.tur} (${b.sonrakiTarih})</span></div>`;
  });
  yaklasan.forEach(b=>{
    const fark=Math.ceil((new Date(b.sonrakiTarih)-bugun)/(1000*60*60*24));
    html+=`<div class="warn-orange"><span style="color:#ff9f0a;font-weight:700">⚠️ ${fark} GÜN KALDI: </span><span>${b.plaka} — ${b.tur} (${b.sonrakiTarih})</span></div>`;
  });

  html+=`<div class="card">
    <div class="section-title">Yeni Bakım Kaydı</div>
    <div class="row" style="margin-bottom:10px">
      <div class="field"><label>Plaka *</label><select id="b-plaka"><option value="">Seçin...</option>${DB.araclar.map(a=>"<option>"+a.plaka+"</option>").join("")}</select></div>
      <div class="field"><label>Bakım Türü *</label><select id="b-tur"><option value="">Seçin...</option>${BAKIM_TURLERI.map(t=>"<option>"+t+"</option>").join("")}</select></div>
    </div>
    <div class="row" style="margin-bottom:10px">
      <div class="field"><label>Yapıldığı Tarih *</label><input type="date" id="b-tarih" value="${new Date().toISOString().split("T")[0]}"/></div>
      <div class="field"><label>Sonraki Tarih</label><input type="date" id="b-sonraki"/></div>
    </div>
    <div class="row" style="margin-bottom:10px">
      <div class="field"><label>KM</label><input type="number" id="b-km" placeholder="125000"/></div>
      <div class="field"><label>Maliyet (TL)</label><input type="number" id="b-maliyet" placeholder="1500"/></div>
    </div>
    <div class="field" style="margin-bottom:10px"><label>Not</label><input type="text" id="b-not" placeholder="Ek bilgi..."/></div>
    <button class="btn btn-green" onclick="bakimKaydet()">+ Bakım Kaydı Ekle</button>
  </div>`;

  html+=`<div style="height:20px"></div>`;
  setContent(html);
}

function renderBakimListe() {
  const bugun = new Date();
  var html = "";

  if(DB.araclar.length>0) {
    html+=`<div class="card"><div class="section-title">Araç Bakım Durumu</div>`;
    DB.araclar.forEach(a=>{
      const ab = DB.bakimlar.filter(b=>b.plaka===a.plaka);
      html+=`<div style="background:#1c1c1e;border-radius:10px;padding:12px 14px;border:1px solid #48484a;margin-bottom:8px">
        <div style="font-weight:700;font-size:14px;margin-bottom:8px">🚗 ${a.plaka}</div>
        <div class="arac-durum-grid">`;
      BAKIM_TURLERI.forEach(tur=>{
        const son = ab.filter(b=>b.tur===tur).sort((a,b)=>b.tarih.localeCompare(a.tarih))[0];
        let renk="#636366", durum="Kayıt yok";
        if(son){
          durum=son.sonrakiTarih||son.tarih;
          if(son.sonrakiTarih){
            const fark=(new Date(son.sonrakiTarih)-bugun)/(1000*60*60*24);
            renk=fark<0?"#ff453a":fark<=30?"#ff9f0a":"#30d158";
          }
        }
        html+=`<div class="durum-item"><div class="durum-tur">${tur}</div><div class="durum-val" style="color:${renk}">${durum}</div></div>`;
      });
      html+=`</div></div>`;
    });
    html+=`</div>`;
  }

  if(DB.bakimlar.length>0) {
    html+=`<div class="card"><div class="section-title">Bakım Geçmişi (${DB.bakimlar.length})</div>`;
    DB.bakimlar.forEach(b=>{
      const gec=b.sonrakiTarih&&new Date(b.sonrakiTarih)<bugun;
      const yak=b.sonrakiTarih&&!gec&&(new Date(b.sonrakiTarih)-bugun)/(1000*60*60*24)<=30;
      html+=`<div style="background:#1c1c1e;border-radius:8px;padding:10px 12px;border:1px solid ${gec?"#ff453a":yak?"#ff9f0a":"#48484a"};margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <div>
            <span style="font-weight:700;font-size:14px">${b.plaka}</span>
            <span style="margin-left:8px;background:#2c2c2e;border:1px solid #48484a;border-radius:6px;padding:2px 8px;font-size:11px;color:#aeaeb2">${b.tur}</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            ${b.maliyet>0?`<span class="badge badge-orange">${b.maliyet.toLocaleString()} TL</span>`:""}
            <button onclick="bakimSil(${b.id})" style="background:none;color:#ff453a;font-size:16px;padding:0;border:none;cursor:pointer">🗑️</button>
          </div>
        </div>
        <div style="font-size:11px;color:#636366;display:flex;gap:12px;flex-wrap:wrap">
          <span>📅 ${b.tarih}</span>
          ${b.sonrakiTarih?`<span style="color:${gec?"#ff453a":yak?"#ff9f0a":"#636366"}">⏭️ ${b.sonrakiTarih}${gec?" 🚨":yak?" ⚠️":""}</span>`:""}
          ${b.km>0?`<span>🛣️ ${b.km.toLocaleString()} km</span>`:""}
          ${b.not?`<span>💬 ${b.not}</span>`:""}
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  if(DB.araclar.length===0 && DB.bakimlar.length===0) {
    html+=`<div class="empty"><div class="empty-icon">🔧</div>Henüz bakım kaydı yok.</div>`;
  }

  html+=`<div style="height:20px"></div>`;
  setContent(html);
}
async function bakimKaydet() {
  const plaka=document.getElementById("b-plaka").value;
  const tur=document.getElementById("b-tur").value;
  const tarih=document.getElementById("b-tarih").value;
  const sonraki=document.getElementById("b-sonraki").value;
  const km=document.getElementById("b-km").value;
  const maliyet=document.getElementById("b-maliyet").value;
  const not=document.getElementById("b-not").value;
  if(!plaka||!tur||!tarih){showToast("Zorunlu alanları doldurun!","error");return;}
  const yeniBakim = {plaka,tur,tarih,sonrakiTarih:sonraki,km:km?parseInt(km):0,maliyet:maliyet?parseFloat(maliyet):0,not};
  try {
    const data = await bakimEkleDB(yeniBakim);
    DB.bakimlar.unshift({...yeniBakim, id: data.id});
  } catch(e) { DB.bakimlar.unshift({...yeniBakim, id: Date.now()}); }
  showToast("Bakım kaydı eklendi!");
  if(AKTIF_TAB==="bakimliste") renderBakimListe(); else renderBakim();
}

async function bakimSil(id) {
  try { await bakimSilDB(id); } catch(e) {}
  DB.bakimlar=DB.bakimlar.filter(b=>b.id!==id);
  showToast("Silindi.");
  if(AKTIF_TAB==="bakim") renderBakim(); else renderBakimListe();
}

function excHizliFiltre(gun) {
  const bas = document.getElementById("exc-bas");
  const bit = document.getElementById("exc-bit");
  if(!bas||!bit) return;
  bit.value = new Date().toISOString().split("T")[0];
  bas.value = new Date(Date.now()-gun*24*60*60*1000).toISOString().split("T")[0];
  excOnizlemeGuncelle();
}

function excOnizlemeGuncelle() {
  const bas = document.getElementById("exc-bas")?.value;
  const bit = document.getElementById("exc-bit")?.value;
  if(!bas||!bit) return;

  const seferler = DB.tamamlananlar.filter(s=>s.tarih>=bas&&s.tarih<=bit);
  const yakitlar = DB.yakitlar.filter(y=>y.tarih>=bas&&y.tarih<=bit);
  const bakimlar = DB.bakimlar.filter(b=>b.tarih>=bas&&b.tarih<=bit);

  const el = document.getElementById("exc-onizleme");
  if(!el) return;
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">

function csvSatir(arr) {
  return arr.map(function(v) {
    var s = String(v == null ? "" : v);
    s = s.replace(/"/g, '""');
    return '"' + s + '"';
  }).join(",") + "\r\n";
}

function excelAktar() {
  var basEl = document.getElementById("exc-bas");
  var bitEl = document.getElementById("exc-bit");
  if(!basEl||!bitEl) { showToast("Tarih secin!","error"); return; }
  var bas = basEl.value;
  var bit = bitEl.value;
  if(!bas||!bit) { showToast("Tarih araligini secin!","error"); return; }

  var seferler = DB.tamamlananlar.filter(function(s){return s.tarih>=bas&&s.tarih<=bit;});
  var yakitlar = DB.yakitlar.filter(function(y){return y.tarih>=bas&&y.tarih<=bit;});
  var bakimlar = DB.bakimlar.filter(function(b){return b.tarih>=bas&&b.tarih<=bit;});

  var rows = [];

  rows.push(["SEFER LISTESI"]);
  rows.push(["Sofor","Tarih","Cikis Saati","Donus Saati","Cikis Konumu","Varis Konumu","Mesafe km","Baslangic KM","Bitis KM","Kat Edilen KM","Yuk Turu","Miktar","Birim","Bekleme dk","Plaka","Aciklama"]);
  seferler.forEach(function(s){
    rows.push([s.sofor,s.tarih,s.cikis_saati||"",s.donus_saati||"",s.cikis_isim||"",s.varis_isim||"",s.mesafe||"",s.baslangic_km,s.bitis_km,s.km_fark,s.yuk_turu,s.yuk_miktari||"",s.yuk_birimi||"",s.bekleme_dakika,s.plaka||"",s.aciklama||""]);
  });

  rows.push([]);
  rows.push(["YAKIT LISTESI"]);
  rows.push(["Sofor","Plaka","Tarih","Saat","Litre","Tutar TL","Litre Fiyati","Kaydeden"]);
  yakitlar.forEach(function(y){
    rows.push([y.sofor,y.plaka,y.tarih,y.saat||"",y.litre,y.tutar||"",y.tutar&&y.litre?(y.tutar/y.litre).toFixed(2):"",y.kaydeden||""]);
  });

  rows.push([]);
  rows.push(["BAKIM LISTESI"]);
  rows.push(["Plaka","Bakim Turu","Yapildigi Tarih","Sonraki Tarih","KM","Maliyet TL","Not"]);
  bakimlar.forEach(function(b){
    rows.push([b.plaka,b.tur,b.tarih,b.sonrakiTarih||"",b.km||"",b.maliyet||"",b.not||""]);
  });

  var csv = rows.map(csvSatir).join("");

  try {
    var blob = new Blob([csv], {type:"text/csv"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "Kucuker_" + bas + "_" + bit + ".csv";
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
    showToast("Dosya indiriliyor!");
  } catch(e) {
    showToast("Hata: " + e.message, "error");
  }
}

const SUPA_URL = "https://xwqaloxiebliccrjmgyo.supabase.co";
const SUPA_KEY = "sb_publishable_BLp6PmrBVk2SJOVzwb0eDA_wsR3lpcX";

// Supabase REST API - CDN gerektirmez
const supa = {
  from: function(table) {
    return new SupaQuery(table);
  }
};

class SupaQuery {
  constructor(table) {
    this.table = table;
    this._filters = [];
    this._order = null;
    this._limit = null;
    this._single = false;
    this._select = '*';
    this._insertData = null;
    this._updateData = null;
    this._deleteMode = false;
  }
  select(s) { this._select = s||'*'; return this; }
  eq(col, val) { this._filters.push({col, val, op:'eq'}); return this; }
  order(col, opts) { this._order = {col, asc: opts&&opts.ascending!==false?true:false}; return this; }
  limit(n) { this._limit = n; return this; }
  single() { this._single = true; return this; }
  insert(data) { this._insertData = data; return this; }
  update(data) { this._updateData = data; return this; }
  delete() { this._deleteMode = true; return this; }

  async _exec() {
    let url = SUPA_URL + '/rest/v1/' + this.table + '?select=' + this._select;
    this._filters.forEach(f => { url += '&' + f.col + '=eq.' + encodeURIComponent(f.val); });
    if(this._order) url += '&order=' + this._order.col + (this._order.asc?'.asc':'.desc');
    if(this._limit) url += '&limit=' + this._limit;

    const headers = {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': this._single ? 'return=representation' : 'return=representation'
    };

    let method = 'GET';
    let body = null;

    if(this._insertData) {
      method = 'POST';
      body = JSON.stringify(this._insertData);
      headers['Prefer'] = 'return=representation';
      url = SUPA_URL + '/rest/v1/' + this.table;
    } else if(this._updateData) {
      method = 'PATCH';
      body = JSON.stringify(this._updateData);
      headers['Prefer'] = 'return=representation';
      url = SUPA_URL + '/rest/v1/' + this.table;
      this._filters.forEach(f => { url += (url.includes('?')?'&':'?') + f.col + '=eq.' + encodeURIComponent(f.val); });
    } else if(this._deleteMode) {
      method = 'DELETE';
      url = SUPA_URL + '/rest/v1/' + this.table;
      this._filters.forEach(f => { url += (url.includes('?')?'&':'?') + f.col + '=eq.' + encodeURIComponent(f.val); });
    }

    try {
      const res = await fetch(url, {method, headers, body});
      const data = await res.json();
      if(!res.ok) return {data: null, error: data};
      if(this._single) return {data: Array.isArray(data)?data[0]:data, error: null};
      return {data, error: null};
    } catch(e) {
      return {data: null, error: e};
    }
  }

  then(resolve, reject) { return this._exec().then(resolve, reject); }
}

    const [soforler, araclar, konumlar, fabrikaRes, aktif, tamamlanan, yakitlar, bakimlar, isler, ayarlar, mesailer, talepler, nakliyeler] = await Promise.all([

async function isEkle() {
  var kat = document.getElementById("is-kat").value;
  var tarih = document.getElementById("is-tarih").value;
  var firma = document.getElementById("is-firma").value.trim();
  var miktar = "";
  var oncelik = "Normal";
  var not = "";
  if(!firma) { showToast("Firma/konum adı zorunlu!","error"); return; }
  const yeniIs = {
    kategori:kat, tarih:tarih, firma:firma, miktar:miktar, oncelik:oncelik,
    not:not, durum:"Bekliyor",
    olusturma:new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"})
  };
  try {
    const data = await isEkleDB(yeniIs);
    DB.isler.push({...yeniIs, id: data.id});
  } catch(e) { DB.isler.push({...yeniIs, id: Date.now()}); }
  showToast(firma+" eklendi!");
  renderIsListesi();
}

async function isDurumDegistir(id) {
  const yeniDurum = DB.isler.find(i=>i.id===id)?.durum==="Tamamlandı"?"Bekliyor":"Tamamlandı";
  try { await isDurumGuncelleDB(id, yeniDurum); } catch(e) {}
  DB.isler = DB.isler.map(function(i){
    if(i.id===id) return Object.assign({},i,{durum:yeniDurum});
    return i;
  });
  renderIsListesi();
}

async function isSil(id) {
  try { await isSilDB(id); } catch(e) {}
  DB.isler = DB.isler.filter(function(i){ return i.id!==id; });
  renderIsListesi();
}

function isFiltreTarih(t) { window.IS_FILTRE_TARIH=t; window.IS_FILTRE_TARIH_MANUEL=true; renderIsListesi(); }
function isFiltreKat(k) { window.IS_FILTRE_KAT=k; renderIsListesi(); }

async function isExcel() {
  var tarih = window.IS_FILTRE_TARIH || bugunTR();

  if(isler.length===0) { showToast("Aktarılacak kayıt yok!","error"); return; }

      left:   {style:"medium"},

  ws.mergeCells(2, 2, 2, IS_KATEGORILER.length+1);

  // Satır 3: Kategori başlıkları
  ws.getRow(3).height = 26;
  IS_KATEGORILER.forEach(function(kat, i) {
    var cell = ws.getCell(3, i+2);
    cell.value = kat;
    cell.font = {name:"Arial", bold:true, size:12};
    cell.fill = {type:"pattern", pattern:"solid", fgColor:{argb:"FF00CFCF"}};
    cell.alignment = {horizontal:"center", vertical:"middle"};
    cell.border = {
      top:{style:"thin"}, bottom:{style:"thin"},
      left:{style: i===0?"medium":"thin"},
      right:{style: i===IS_KATEGORILER.length-1?"medium":"thin"}
    };
  });

  // Satır 4+: Veri satırları
  for(var r=0; r<maxSatir; r++) {
    var rowNum = r + 4;
    var sonSatir = r === maxSatir-1;
    ws.getRow(rowNum).height = 25;
    IS_KATEGORILER.forEach(function(kat, i) {
      var cell = ws.getCell(rowNum, i+2);
      cell.value = (katVeriler[kat]||[])[r] || "";
      cell.font = {name:"Arial", size:11};
      cell.alignment = {horizontal:"left", vertical:"middle"};
      cell.border = {
        top:{style:"thin"},
        bottom:{style: sonSatir?"medium":"thin"},
        left:{style: i===0?"medium":"thin"},
        right:{style: i===IS_KATEGORILER.length-1?"medium":"thin"}
      };
    });
  }

  // Bakım tablosu
  var bakimRow = nakRow+1+nakliyeler.length+2;
  ws.getRow(bakimRow).height = 22;
  ["Plaka","Bakım Türü","Tarih","Tutar (TL)"].forEach(function(h,i){
    var c=ws.getCell(bakimRow,i+1);
    c.value=h; c.font={name:"Arial",bold:true,size:11};
    c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFbf5af2"}};
    c.alignment={horizontal:"center"};
    c.border={top:{style:"medium"},bottom:{style:"thin"},left:{style:i===0?"medium":"thin"},right:{style:i===3?"medium":"thin"}};
  });
  bakimlar.forEach(function(b,i){
    var r=bakimRow+1+i;
    ws.getRow(r).height=20;
    var son=i===bakimlar.length-1;
    [[b.plaka],[b.tur],[b.tarih],[b.maliyet]].forEach(function(v,ci){
      var c=ws.getCell(r,ci+1);
      c.value=v[0]; c.font={name:"Arial",size:11};
      c.border={top:{style:"thin"},bottom:{style:son?"medium":"thin"},left:{style:ci===0?"medium":"thin"},right:{style:ci===3?"medium":"thin"}};
      if(ci===3) c.numFmt='#,##0.00 "TL"';
    });
  });

  try {
    var buffer = await wb.xlsx.writeBuffer();
    var blob = new Blob([buffer], {type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "AracProgrami_"+tarih+".xlsx";
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);

function mesaiSureHesapla() {
  var bas = document.getElementById("m-bas")?.value;
  var bit = document.getElementById("m-bit")?.value;
  var el = document.getElementById("mesai-sure");
  if(!el) return;
  if(bas && bit) {
    var basDk = parseInt(bas.split(":")[0])*60 + parseInt(bas.split(":")[1]);
    var bitDk = parseInt(bit.split(":")[0])*60 + parseInt(bit.split(":")[1]);
    var fark = bitDk - basDk;
    if(fark < 0) fark += 1440;
    el.style.display = "block";
    el.innerHTML = '⏱️ Mesai süresi: <strong style="color:#0a84ff">' + formatSure(fark) + '</strong>';
    el.dataset.sure = fark;
  } else {
    el.style.display = "none";
  }
}

async function mesaiEkle() {
  var sofor = document.getElementById("m-sofor").value;
  var tarih = document.getElementById("m-tarih").value;
  var bas = document.getElementById("m-bas").value;
  var bit = document.getElementById("m-bit").value;
  var aciklama = document.getElementById("m-aciklama").value;
  if(!sofor||!tarih||!bas||!bit) { showToast("Zorunlu alanları doldurun!","error"); return; }
  var basDk = parseInt(bas.split(":")[0])*60 + parseInt(bas.split(":")[1]);
  var bitDk = parseInt(bit.split(":")[0])*60 + parseInt(bit.split(":")[1]);
  var sure = bitDk - basDk;
  if(sure < 0) sure += 1440;
  var yeniMesai = {sofor, tarih, baslangic:bas, bitis:bit, sure_dakika:sure, aciklama};
  try {
    const data = await mesaiEkleDB(yeniMesai);
    DB.mesailer.unshift({...yeniMesai, id:data.id});
    showToast(sofor+" mesai eklendi!");
    renderMesailer();
  } catch(e) { showToast("Hata: "+e.message,"error"); }
}

async function mesaiSil(id) {
  try { await mesaiSilDB(id); } catch(e) {}
  DB.mesailer = DB.mesailer.filter(function(m){ return m.id!==id; });
  showToast("Mesai silindi.");
  renderMesailer();
}

function mesaiFiltreGuncelle(v) { window.MESAI_FILTRE_SOFOR=v; renderMesailer(); }
function mesaiTarihFiltre(tip,v) {
  if(tip==="bas") window.MESAI_FILTRE_BAS=v;
  else window.MESAI_FILTRE_BIT=v;
  renderMesailer();
}
function mesaiHizliFiltre(gun) {
  if(gun===0) { window.MESAI_FILTRE_BAS=""; window.MESAI_FILTRE_BIT=""; }
  else if(gun===1) { window.MESAI_FILTRE_BAS=bugunTR(); window.MESAI_FILTRE_BIT=bugunTR(); }
  else { window.MESAI_FILTRE_BIT=bugunTR(); window.MESAI_FILTRE_BAS=new Date(Date.now()-gun*24*60*60*1000).toISOString().split("T")[0]; }
  renderMesailer();
}

function renderMaliyetRaporu() {
  var simdi = new Date();
  var bugunStr = bugunTR();
  var ayBas = simdi.getFullYear()+"-"+String(simdi.getMonth()+1).padStart(2,"0")+"-01";

  var filtreBas = window.MAL_BAS || ayBas;
  var filtreBit = window.MAL_BIT || bugunStr;
  var filtreMod = window.MAL_MOD || "tarih";
  window.MAL_BAS = filtreBas;
  window.MAL_BIT = filtreBit;
  window.MAL_MOD = filtreMod;

  // Yıllar ve aylar için seçenekler
  var yillar = [...new Set([
    ...DB.yakitlar.map(y=>y.tarih.substring(0,4)),
    ...DB.nakliyeler.map(n=>n.tarih.substring(0,4)),
    String(simdi.getFullYear())
  ])].sort((a,b)=>b-a);

  var aylar = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

  function hesapla(bas, bit) {
    var yakitlar = DB.yakitlar.filter(y=>y.tarih>=bas&&y.tarih<=bit);
    var nakliyeler = DB.nakliyeler.filter(n=>n.tarih>=bas&&n.tarih<=bit);
    var bakimlar = DB.bakimlar.filter(b=>b.tarih>=bas&&b.tarih<=bit&&b.maliyet>0);
    var yakitTutar = yakitlar.reduce((a,y)=>a+(y.tutar||0),0);
    var nakliyeTutar = nakliyeler.reduce((a,n)=>a+(n.fiyat||0),0);
    var bakimTutar = bakimlar.reduce((a,b)=>a+(b.maliyet||0),0);
    var toplam = yakitTutar + nakliyeTutar + bakimTutar;
    return {yakitlar, nakliyeler, bakimlar, yakitTutar, nakliyeTutar, bakimTutar, toplam};
  }

  var rapor = hesapla(filtreBas, filtreBit);

  setContent(`

    </div>

    ${filtreMod==='tarih'?`
    <div class="card">
      <div class="section-title">TARİH ARALIĞI</div>
      <div class="row" style="margin-bottom:8px">
        <div class="field"><label>Başlangıç</label><input type="date" value="${filtreBas}" onchange="maliyetTarih('bas',this.value)"/></div>
        <div class="field"><label>Bitiş</label><input type="date" value="${filtreBit}" onchange="maliyetTarih('bit',this.value)"/></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button onclick="maliyetHizli(7)" style="padding:5px 10px;background:#3a3a3c;border:1px solid #48484a;border-radius:8px;color:#aeaeb2;font-size:11px;cursor:pointer">Son 7 Gün</button>

function maliyetMod(mod) { window.MAL_MOD=mod; renderMaliyetRaporu(); }
function maliyetTarih(tip,v) { if(tip==="bas") window.MAL_BAS=v; else window.MAL_BIT=v; renderMaliyetRaporu(); }
function maliyetHizli(gun) {
  var bugun = bugunTR();
  if(gun==='ay') {
    var s=new Date(); window.MAL_BAS=s.getFullYear()+"-"+String(s.getMonth()+1).padStart(2,"0")+"-01"; window.MAL_BIT=bugun;
  } else if(gun==='yil') {
    window.MAL_BAS=new Date().getFullYear()+"-01-01"; window.MAL_BIT=bugun;
  } else {
    window.MAL_BIT=bugun; window.MAL_BAS=new Date(Date.now()-gun*24*60*60*1000).toISOString().split("T")[0];
  }
  renderMaliyetRaporu();
}
function maliyetAySec(yil,ay) {
  var ayStr = String(ay).padStart(2,"0");
  var sonGun = new Date(yil,ay,0).getDate();
  window.MAL_BAS=yil+"-"+ayStr+"-01";
  window.MAL_BIT=yil+"-"+ayStr+"-"+sonGun;
  renderMaliyetRaporu();
}

async function maliyetExcel() {
  var bas = window.MAL_BAS || bugunTR();
  var bit = window.MAL_BIT || bugunTR();
  var yakitlar = DB.yakitlar.filter(y=>y.tarih>=bas&&y.tarih<=bit);
  var nakliyeler = DB.nakliyeler.filter(n=>n.tarih>=bas&&n.tarih<=bit);
  var bakimlar = DB.bakimlar.filter(b=>b.tarih>=bas&&b.tarih<=bit&&b.maliyet>0);
  var yakitTutar = yakitlar.reduce((a,y)=>a+(y.tutar||0),0);
  var nakliyeTutar = nakliyeler.reduce((a,n)=>a+(n.fiyat||0),0);
  var bakimTutar = bakimlar.reduce((a,b)=>a+(b.maliyet||0),0);
  var toplam = yakitTutar + nakliyeTutar + bakimTutar;

  var wb = new ExcelJS.Workbook();
  var ws = wb.addWorksheet("Maliyet Raporu");
  ws.getColumn(1).width = 20;
  ws.getColumn(2).width = 25;
  ws.getColumn(3).width = 15;
  ws.getColumn(4).width = 15;

  // Başlık
  ws.mergeCells(1,1,1,4);
  var baslik = ws.getCell(1,1);
  baslik.value = bas+" / "+bit+" MALİYET RAPORU";
  baslik.font = {name:"Arial",bold:true,size:14};
  baslik.fill = {type:"pattern",pattern:"solid",fgColor:{argb:"FF1c1c1e"}};
  baslik.font = {name:"Arial",bold:true,size:14,color:{argb:"FFFFFFFF"}};
  baslik.alignment = {horizontal:"center",vertical:"middle"};
  baslik.border = {top:{style:"medium"},bottom:{style:"medium"},left:{style:"medium"},right:{style:"medium"}};
  ws.getRow(1).height = 32;

  // Özet
  ws.getRow(2).height = 14;
  var ozet = [[3,"⛽ Yakıt Toplamı","",yakitTutar],[4,"🚚 Nakliye Toplamı","",nakliyeTutar],[5,"🔧 Bakım Toplamı","",bakimTutar],[6,"💰 Genel Toplam","",toplam]];
  ozet.forEach(function(o){
    ws.getRow(o[0]).height = 22;
    var c1=ws.getCell(o[0],1); c1.value=o[1]; c1.font={name:"Arial",bold:true,size:12};
    var c2=ws.getCell(o[0],2); c2.value=""; 
    var c3=ws.getCell(o[0],3); c3.value="";
    var c4=ws.getCell(o[0],4); c4.value=o[3]; c4.font={name:"Arial",bold:true,size:12};
    c4.numFmt='#,##0.00 "TL"';
    c4.fill={type:"pattern",pattern:"solid",fgColor:{argb:o[0]===5?"FFFF9F0A":"FF2c2c2e"}};
    if(o[0]===5) { c1.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFFF9F0A"}}; }
  });

  // Yakıt başlık
  ws.getRow(7).height = 22;
  ["Şoför","Plaka","Tarih","Tutar (TL)"].forEach(function(h,i){
    var c=ws.getCell(7,i+1);
    c.value=h; c.font={name:"Arial",bold:true,size:11};
    c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF30d158"}};
    c.alignment={horizontal:"center"};
    c.border={top:{style:"medium"},bottom:{style:"thin"},left:{style:i===0?"medium":"thin"},right:{style:i===3?"medium":"thin"}};
  });
  yakitlar.forEach(function(y,i){
    var r=8+i;
    ws.getRow(r).height=20;
    var son=i===yakitlar.length-1;
    [[y.sofor],[y.plaka],[y.tarih],[y.tutar]].forEach(function(v,ci){
      var c=ws.getCell(r,ci+1);
      c.value=v[0]; c.font={name:"Arial",size:11};
      c.border={top:{style:"thin"},bottom:{style:son?"medium":"thin"},left:{style:ci===0?"medium":"thin"},right:{style:ci===3?"medium":"thin"}};
      if(ci===3) c.numFmt='#,##0.00 "TL"';
    });
  });

  // Nakliye başlık
  var nakRow = 8+yakitlar.length+2;
  ws.getRow(nakRow).height = 22;
  ["Sevk Adresi","Açıklama","Tarih","Tutar (TL)"].forEach(function(h,i){
    var c=ws.getCell(nakRow,i+1);
    c.value=h; c.font={name:"Arial",bold:true,size:11};
    c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF0a84ff"}};
    c.alignment={horizontal:"center"};
    c.border={top:{style:"medium"},bottom:{style:"thin"},left:{style:i===0?"medium":"thin"},right:{style:i===3?"medium":"thin"}};
  });
  nakliyeler.forEach(function(n,i){
    var r=nakRow+1+i;
    ws.getRow(r).height=20;
    var son=i===nakliyeler.length-1;
    [[n.sevk_adresi],[n.aciklama||""],[n.tarih],[n.fiyat]].forEach(function(v,ci){
      var c=ws.getCell(r,ci+1);
      c.value=v[0]; c.font={name:"Arial",size:11};
      c.border={top:{style:"thin"},bottom:{style:son?"medium":"thin"},left:{style:ci===0?"medium":"thin"},right:{style:ci===3?"medium":"thin"}};
      if(ci===3) c.numFmt='#,##0.00 "TL"';
    });
  });

  // Bakım tablosu
  var bakimRow = nakRow+1+nakliyeler.length+2;
  ws.getRow(bakimRow).height = 22;
  ["Plaka","Bakım Türü","Tarih","Tutar (TL)"].forEach(function(h,i){
    var c=ws.getCell(bakimRow,i+1);
    c.value=h; c.font={name:"Arial",bold:true,size:11};
    c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFbf5af2"}};
    c.alignment={horizontal:"center"};
    c.border={top:{style:"medium"},bottom:{style:"thin"},left:{style:i===0?"medium":"thin"},right:{style:i===3?"medium":"thin"}};
  });
  bakimlar.forEach(function(b,i){
    var r=bakimRow+1+i;
    ws.getRow(r).height=20;
    var son=i===bakimlar.length-1;
    [[b.plaka],[b.tur],[b.tarih],[b.maliyet]].forEach(function(v,ci){
      var c=ws.getCell(r,ci+1);
      c.value=v[0]; c.font={name:"Arial",size:11};
      c.border={top:{style:"thin"},bottom:{style:son?"medium":"thin"},left:{style:ci===0?"medium":"thin"},right:{style:ci===3?"medium":"thin"}};
      if(ci===3) c.numFmt='#,##0.00 "TL"';
    });
  });

  try {
    var buffer = await wb.xlsx.writeBuffer();
    var blob = new Blob([buffer],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href=url; a.download="MaliyetRaporu_"+bas+"_"+bit+".xlsx";
    document.body.appendChild(a); a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
    showToast("Maliyet raporu indirildi!");
  } catch(e) { showToast("Hata: "+e.message,"error"); }
}

function renderNakliyeListe() {
  var filtreBas = window.NAKLIYE_BAS || "";
  var filtreBit = window.NAKLIYE_BIT || "";

  if(filtreBas) nakliyeler = nakliyeler.filter(function(n){ return n.tarih>=filtreBas; });
  if(filtreBit) nakliyeler = nakliyeler.filter(function(n){ return n.tarih<=filtreBit; });

  var toplamTutar = nakliyeler.reduce(function(a,n){ return a+n.fiyat; }, 0);

  setContent(`
    <div class="card">
      <div class="section-title">FİLTRELE</div>
      <div class="row" style="margin-bottom:8px">
        <div class="field">
          <label>Başlangıç</label>
          <input type="date" value="${filtreBas}" onchange="nakliyeTarihFiltre('bas',this.value)"/>
        </div>
        <div class="field">
          <label>Bitiş</label>
          <input type="date" value="${filtreBit}" onchange="nakliyeTarihFiltre('bit',this.value)"/>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button onclick="nakliyeHizliFiltre(30)" style="padding:5px 10px;background:#3a3a3c;border:1px solid #48484a;border-radius:8px;color:#aeaeb2;font-size:11px;cursor:pointer">Son 30 Gün</button>
        <button onclick="nakliyeHizliFiltre(90)" style="padding:5px 10px;background:#3a3a3c;border:1px solid #48484a;border-radius:8px;color:#aeaeb2;font-size:11px;cursor:pointer">Son 90 Gün</button>
        <button onclick="nakliyeHizliFiltre(0)" style="padding:5px 10px;background:#3a3a3c;border:1px solid #48484a;border-radius:8px;color:#aeaeb2;font-size:11px;cursor:pointer">Tümü</button>
      </div>
    </div>

    ${nakliyeler.length>0?`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div class="kpi-card"><div class="kpi-icon">🚚</div><div class="kpi-val" style="color:#0a84ff">${nakliyeler.length}</div><div class="kpi-unit">adet</div><div class="kpi-label">Toplam Nakliye</div></div>
      <div class="kpi-card"><div class="kpi-icon">💰</div><div class="kpi-val" style="color:#ff9f0a">${toplamTutar.toLocaleString("tr-TR")}</div><div class="kpi-unit">TL</div><div class="kpi-label">Toplam Maliyet</div></div>
    </div>`:""}

    ${nakliyeler.length===0?'<div class="empty"><div class="empty-icon">🚚</div>Nakliye kaydı yok.</div>':""}

    ${nakliyeler.map(function(n) {
      return '<div class="card" style="border-left:3px solid #0a84ff;margin-bottom:10px">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
        '<div style="flex:1">' +
        '<div style="font-weight:700;font-size:14px">📍 '+n.sevk_adresi+'</div>' +
        '<div style="font-size:11px;color:#636366">📅 '+n.tarih+'</div>' +
        (n.aciklama?'<div style="font-size:11px;color:#636366">💬 '+n.aciklama+'</div>':"") +
        '</div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">' +
        '<span class="badge badge-orange">'+n.fiyat.toLocaleString("tr-TR")+' TL</span>' +
        '<button onclick="nakliyeSil('+n.id+')" style="background:none;border:1px solid #ff453a;border-radius:6px;color:#ff453a;font-size:11px;cursor:pointer;padding:3px 8px">🗑️ Sil</button>' +
        '</div></div></div>';
    }).join("")}
    <div style="height:20px"></div>
  `);
}

function nakliyeTarihFiltre(tip, v) {
  if(tip==="bas") window.NAKLIYE_BAS=v;
  else window.NAKLIYE_BIT=v;
  renderNakliyeListe();
}

function nakliyeHizliFiltre(gun) {
  if(gun===0) { window.NAKLIYE_BAS=""; window.NAKLIYE_BIT=""; }
  else { window.NAKLIYE_BIT=bugunTR(); window.NAKLIYE_BAS=new Date(Date.now()-gun*24*60*60*1000).toISOString().split("T")[0]; }
  renderNakliyeListe();
}

async function nakliyeEkle() {
  var tarih = document.getElementById("n-tarih").value;
  var adres = document.getElementById("n-adres").value.trim();
  var fiyat = parseFloat(document.getElementById("n-fiyat").value);
  var aciklama = document.getElementById("n-aciklama").value.trim();
  if(!tarih||!adres||!fiyat) { showToast("Zorunlu alanları doldurun!","error"); return; }
  var yeni = {tarih, sevk_adresi:adres, fiyat, aciklama};
  try {
    const data = await nakliyelEkleDB(yeni);
    DB.nakliyeler.unshift({...yeni, id:data.id});
    showToast("Nakliye kaydı eklendi!");
    if(AKTIF_TAB==="nakliyeliste") renderNakliyeListe(); else renderNakliye();
  } catch(e) { showToast("Hata: "+e.message,"error"); }
}

async function nakliyeSil(id) {
  try { await nakliyeSilDB(id); } catch(e) {}
  DB.nakliyeler = DB.nakliyeler.filter(function(n){ return n.id!==id; });
  showToast("Nakliye silindi.");
  renderNakliyeListe();
}

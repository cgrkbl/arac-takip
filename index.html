}

async function talepSorgula() {
  var isim = document.getElementById("s-isim").value.trim();
  if(!isim) { 
    document.getElementById("sorgula-sonuc").innerHTML = '<div style="color:#ff453a;font-size:12px">Ad soyad girin!</div>';
    return; 
  }
  document.getElementById("sorgula-sonuc").innerHTML = '<div style="color:#636366;font-size:12px;text-align:center">Yükleniyor...</div>';
  try {
    const {data, error} = await supa.from("talepler").select("*").eq("isim", isim).order("created_at", {ascending:false});
    if(error) throw error;
    if(!data || data.length===0) {
      document.getElementById("sorgula-sonuc").innerHTML = '<div style="text-align:center;color:#636366;padding:20px">Bu isme ait talep bulunamadı.</div>';
      return;
    }
    var html = '<div style="font-size:12px;color:#636366;margin-bottom:10px">'+data.length+' talep bulundu</div>';
    data.forEach(function(t) {
      var renk = t.durum==="Onaylandı"?"#30d158":t.durum==="Reddedildi"?"#ff453a":"#ff9f0a";
      var icon = t.durum==="Onaylandı"?"✅":t.durum==="Reddedildi"?"❌":"⏳";
      html += '<div style="background:#2c2c2e;border:1px solid #48484a;border-left:3px solid '+renk+';border-radius:10px;padding:12px;margin-bottom:10px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
        '<div style="font-size:12px;color:#636366">'+t.tarih+' • '+t.saat+'</div>' +
        '<span style="background:'+renk+'22;color:'+renk+';border:1px solid '+renk+';border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700">'+icon+' '+t.durum+'</span>' +
        '</div>' +
        '<div style="font-size:13px;font-weight:700;color:#f2f2f7;margin-bottom:3px">📍 '+t.nereye+'</div>' +
        (t.departman?'<div style="font-size:11px;color:#636366">🏢 '+t.departman+'</div>':'') +
        (t.aciklama?'<div style="font-size:11px;color:#636366">💬 '+t.aciklama+'</div>':'') +
        '</div>';
    });
    document.getElementById("sorgula-sonuc").innerHTML = html;
  } catch(e) {
    document.getElementById("sorgula-sonuc").innerHTML = '<div style="color:#ff453a;font-size:12px">Hata: '+e.message+'</div>';
  }
}

function talepEkraniGoster() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("talep-screen").style.display = "flex";
  // Tarih ve saati otomatik doldur
  var simdi = new Date();
  var yil = simdi.getFullYear();
  var ay = String(simdi.getMonth()+1).padStart(2,"0");
  var gun = String(simdi.getDate()).padStart(2,"0");
  var saat = String(simdi.getHours()).padStart(2,"0");
  var dakika = String(simdi.getMinutes()).padStart(2,"0");
  document.getElementById("t-tarih").value = yil+"-"+ay+"-"+gun;
  document.getElementById("t-saat").value = saat+":"+dakika;
}

function talепYeniGonder() {
  document.getElementById("talep-form").style.display = "block";
  document.getElementById("talep-basari").style.display = "none";
  document.getElementById("t-isim").value = "";
  document.getElementById("t-departman").value = "";
  document.getElementById("t-nereye").value = "";
  document.getElementById("t-tarih").value = "";
  document.getElementById("t-saat").value = "";
  document.getElementById("t-aciklama").value = "";
  document.getElementById("talep-mesaj").textContent = "";
}

function talepEkraniGizle() {
  document.getElementById("talep-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

async function talепGonder() {
  var isim = document.getElementById("t-isim").value.trim();
  var departman = document.getElementById("t-departman").value.trim();
  var nereye = document.getElementById("t-nereye").value.trim();
  var tarih = document.getElementById("t-tarih").value;
  var saat = document.getElementById("t-saat").value;
  var aciklama = document.getElementById("t-aciklama").value.trim();
  if(!isim||!departman||!nereye||!tarih||!saat) { 
    document.getElementById("talep-mesaj").textContent = "Zorunlu alanları doldurun!";
    document.getElementById("talep-mesaj").style.color = "#ff453a";
    return; 
  }
  try {
    await talepEkleDB({isim, departman, nereye, tarih, saat, aciklama});
    document.getElementById("talep-form").style.display = "none";
    document.getElementById("talep-basari").style.display = "block";
  } catch(e) {
    document.getElementById("talep-mesaj").textContent = "Hata: " + e.message;
    document.getElementById("talep-mesaj").style.color = "#ff453a";
  }
}

function renderTalepler() {
  var bekleyen = DB.talepler.filter(function(t){ return t.durum==="Bekliyor"; }).length;
  setContent(`
    <div style="display:flex;gap:10px;margin-bottom:12px">
      <div class="kpi-card" style="flex:1"><div class="kpi-icon">📋</div><div class="kpi-val" style="color:#ff9f0a">${bekleyen}</div><div class="kpi-label">Bekleyen</div></div>
      <div class="kpi-card" style="flex:1"><div class="kpi-icon">✅</div><div class="kpi-val" style="color:#30d158">${DB.talepler.filter(function(t){return t.durum==="Onaylandı";}).length}</div><div class="kpi-label">Onaylanan</div></div>
      <div class="kpi-card" style="flex:1"><div class="kpi-icon">❌</div><div class="kpi-val" style="color:#ff453a">${DB.talepler.filter(function(t){return t.durum==="Reddedildi";}).length}</div><div class="kpi-label">Reddedilen</div></div>
      <div class="kpi-card" style="flex:1"><div class="kpi-icon">📊</div><div class="kpi-val" style="color:#0a84ff">${DB.talepler.length}</div><div class="kpi-label">Toplam</div></div>
    </div>

    ${DB.talepler.length===0?'<div class="empty"><div class="empty-icon">🚗</div>Henüz talep yok.</div>':""}

    ${DB.talepler.map(function(t) {
      var renkBorder = t.durum==="Onaylandı"?"#30d158":t.durum==="Reddedildi"?"#ff453a":"#ff9f0a";
      var badgeClass = t.durum==="Onaylandı"?"badge-green":t.durum==="Reddedildi"?"badge-red":"badge-orange";
      return '<div class="card" style="border-left:3px solid '+renkBorder+';margin-bottom:10px">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">' +
        '<div>' +
        '<div style="font-weight:700;font-size:14px">'+t.isim+'</div>' +
        '<div style="font-size:12px;color:#aeaeb2">🏢 '+t.departman+'  •  📍 '+t.nereye+'</div>' +
        '<div style="font-size:11px;color:#636366">📅 '+t.tarih+' • 🕐 '+t.saat+'</div>' +
        (t.aciklama?'<div style="font-size:11px;color:#636366">💬 '+t.aciklama+'</div>':"") +
        '</div>' +
        '<span class="badge '+badgeClass+'">'+t.durum+'</span>' +
        '</div>' +
        '<div style="display:flex;gap:8px;margin-top:8px">' +
        (t.durum==="Bekliyor"?
          '<button onclick="talepOnayla('+t.id+')" style="flex:1;padding:7px;background:#30d158;border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer">✅ Onayla</button>' +
          '<button onclick="talepReddet('+t.id+')" style="flex:1;padding:7px;background:#ff453a;border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer">❌ Reddet</button>'
        : t.durum==="Reddedildi" ?
          '<button onclick="talepBekleyeAl('+t.id+')" style="flex:1;padding:7px;background:#3a3a3c;border:1px solid #48484a;border-radius:8px;color:#aeaeb2;font-size:12px;cursor:pointer">↩ Beklemeye Al</button>'
        :
          '<button onclick="talepBekleyeAl('+t.id+')" style="flex:1;padding:7px;background:#3a3a3c;border:1px solid #48484a;border-radius:8px;color:#aeaeb2;font-size:12px;cursor:pointer">↩ Beklemeye Al</button>'
        ) +
        '<button onclick="talepSil('+t.id+')" style="padding:7px 12px;background:none;border:1px solid #ff453a;border-radius:8px;color:#ff453a;font-size:12px;cursor:pointer">🗑️</button>' +
        '</div></div>';
    }).join("")}
    <div style="height:20px"></div>
  `);
}

async function talepOnayla(id) {
  try { await talepDurumGuncelleDB(id, "Onaylandı"); } catch(e) {}
  DB.talepler = DB.talepler.map(function(t){ return t.id===id?Object.assign({},t,{durum:"Onaylandı"}):t; });
  showToast("Talep onaylandı!");
  renderTalepler();
}

async function talepReddet(id) {
  try { await talepDurumGuncelleDB(id, "Reddedildi"); } catch(e) {}
  DB.talepler = DB.talepler.map(function(t){ return t.id===id?Object.assign({},t,{durum:"Reddedildi"}):t; });
  showToast("Talep reddedildi.");
  renderTalepler();
}

async function talepBekleyeAl(id) {
  try { await talepDurumGuncelleDB(id, "Bekliyor"); } catch(e) {}
  DB.talepler = DB.talepler.map(function(t){ return t.id===id?Object.assign({},t,{durum:"Bekliyor"}):t; });
  renderTalepler();
}

async function talepSil(id) {
  try { await talepSilDB(id); } catch(e) {}
  DB.talepler = DB.talepler.filter(function(t){ return t.id!==id; });
  showToast("Talep silindi.");
  renderTalepler();
}

window.addEventListener("load", async ()=>{

  document.querySelectorAll("#login-logo-img,#header-logo-img").forEach(img=>img.src=LOGO_SRC);

  // Giriş öncesi gerçek PIN'leri ve şoför listesini yükle (eski PIN'le giriş hatasını önler)
  await loginVerisiYukle();

  // Oturum kontrolü - yenileme sonrası otomatik giriş
  var savedKul = sessionStorage.getItem("kul");
  if(savedKul) {
    try {
      var kul = JSON.parse(savedKul);
      var savedMenu = sessionStorage.getItem("aktif_menu") || "ana";
      var savedTab = sessionStorage.getItem("aktif_tab") || "rapor";
      await girisYap(kul);
      if(kul.rol==="admin") {
        altMenuSec(savedMenu);
        tabSec(savedTab);
      }
      return;
    } catch(e) { sessionStorage.removeItem("kul"); }
  }

  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/arac-takip/sw.js').catch(()=>{});
  }
});

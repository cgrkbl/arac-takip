<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" id="viewport-meta" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Küçüker Lojistik"/>
<meta name="theme-color" content="#1c1c1e"/>
<link rel="manifest" href="/manifest.json"/>
<title>Küçüker Lojistik</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#16141c;font-family:-apple-system,Segoe UI,sans-serif;color:#f2f2f7;min-height:100vh;}
input,select,textarea{font-family:inherit;font-size:14px;color:#f2f2f7;background:#3a3a3c;border:1px solid #48484a;border-radius:8px;padding:10px 12px;width:100%;outline:none;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:#0a84ff;}
input[type=date]{color:#f2f2f7;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
textarea{resize:vertical;}
.screen{display:none;} .screen.active{display:block;}
.card{background:#2c2c2e;border:1px solid #48484a;border-radius:12px;padding:14px;margin-bottom:12px;}
.section-title{font-size:10px;font-weight:700;color:#636366;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:0;}
.field label{font-size:11px;color:#636366;font-weight:600;}
.btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;color:#fff;}
.btn-blue{background:#0a84ff;}
.btn-green{background:#30d158;}
.btn-red{background:#ff453a;}
.btn-orange{background:#ff9f0a;color:#000;}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid;}
.badge-green{color:#30d158;border-color:#30d158;background:#30d15822;}
.badge-orange{color:#ff9f0a;border-color:#ff9f0a;background:#ff9f0a22;}
.badge-blue{color:#0a84ff;border-color:#0a84ff;background:#0a84ff22;}
.badge-red{color:#ff453a;border-color:#ff453a;background:#ff453a22;}
.empty{text-align:center;padding:40px 20px;color:#636366;}
.empty-icon{font-size:32px;margin-bottom:10px;}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:9999;white-space:nowrap;display:none;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s infinite;}

/* Header */
#header{background:#2c2c2e;border-bottom:1px solid #48484a;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
#header-logo{width:36px;height:36px;border-radius:10px;overflow:hidden;flex-shrink:0;}
#header-logo img{width:100%;height:100%;object-fit:contain;background:#fff;}
#header-title{font-size:15px;font-weight:700;}
#header-sub{font-size:10px;color:#636366;}
#header-right{margin-left:auto;display:flex;gap:10px;align-items:center;font-size:12px;}
#btn-cikis-header{background:#3a3a3c;border:1px solid #48484a;border-radius:8px;padding:5px 10px;color:#aeaeb2;font-size:11px;}

/* Üst tab bar */
#tab-bar{background:#2c2c2e;border-bottom:1px solid #48484a;display:flex;overflow-x:auto;}
#tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{flex:1;min-width:60px;padding:11px 4px;background:transparent;color:#636366;border-bottom:2px solid transparent;font-size:11px;font-weight:600;position:relative;white-space:nowrap;}
.tab-btn.active{color:#0a84ff;border-bottom-color:#0a84ff;}
.tab-badge{position:absolute;top:5px;right:4px;background:#ff453a;color:#fff;border-radius:50%;width:15px;height:15px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;}
#akordeon{background:#1c1c1e;border-bottom:1px solid #48484a;}
.akr-bar{display:flex;background:#2c2c2e;}
.akr-bas{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 2px;cursor:pointer;user-select:none;border-bottom:2px solid transparent;color:#aeaeb2;position:relative;}
.akr-bas .akr-ikon{font-size:17px;line-height:1;}
.akr-bas .akr-baslik{font-weight:600;font-size:10px;white-space:nowrap;}
.akr-bas.acik{color:#0a84ff;border-bottom-color:#0a84ff;background:#1c1c1e;}
.akr-panel{display:flex;gap:8px;padding:10px;flex-wrap:wrap;}
.akr-alt-btn{display:flex;align-items:center;gap:8px;padding:11px 16px;background:#2c2c2e;color:#aeaeb2;font-size:14px;border-radius:8px;cursor:pointer;flex:1;min-width:130px;justify-content:center;}
.akr-alt-btn.aktif{background:#0a84ff;color:#fff;font-weight:600;}
.kpi-input{-moz-appearance:textfield;appearance:textfield;}
.kpi-input::-webkit-outer-spin-button,.kpi-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}

/* Alt nav - admin */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#2c2c2e;border-top:1px solid #48484a;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:10px 4px 8px;background:transparent;color:#636366;font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;}
.nav-btn.active{color:#0a84ff;}
.nav-btn span:first-child{font-size:20px;}
.nav-badge{position:absolute;top:6px;right:25%;background:#ff453a;color:#fff;border-radius:50%;width:15px;height:15px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;}
#content{padding:16px;max-width:680px;margin:0 auto;padding-bottom:90px;}
#content.kpi-genis{max-width:1400px;padding-left:24px;padding-right:24px;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.kpi-card{background:#2c2c2e;border:1px solid #48484a;border-left:3px solid #7e57c2;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.kpi-icon{font-size:18px;margin-bottom:6px;}
.kpi-val{font-size:20px;font-weight:800;}
.kpi-unit{font-size:10px;color:#636366;margin-top:1px;}
.kpi-label{font-size:11px;color:#aeaeb2;margin-top:3px;}
.bar-wrap{background:#3a3a3c;border-radius:4px;height:6px;overflow:hidden;margin-top:4px;}
.bar{height:100%;border-radius:4px;}

/* Login */
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
#login-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0a0a0f 0%,#111118 50%,#0d0d15 100%);z-index:0;}
#login-content{position:relative;z-index:1;width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;}
#login-logo{width:80px;height:80px;border-radius:16px;overflow:hidden;margin-bottom:12px;background:#fff;}
#login-logo img{width:100%;height:100%;object-fit:contain;}
#login-title{font-size:24px;font-weight:800;margin-bottom:4px;}
#login-sub{font-size:11px;color:#636366;margin-bottom:32px;text-transform:uppercase;letter-spacing:1px;}
.login-btn{width:100%;padding:16px;border-radius:12px;font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:10px;}
#login-sofor-btn{background:#2c2c2e;border:1px solid #48484a;color:#f2f2f7;}
#login-admin-btn{background:#0a84ff;color:#fff;}
#login-yakit-btn{background:#30d158;color:#fff;}
#login-form{width:100%;}
#pin-display{background:#3a3a3c;border:1px solid #48484a;border-radius:8px;padding:14px;text-align:center;font-size:28px;letter-spacing:12px;min-height:56px;margin-bottom:8px;}
#pin-error{color:#ff453a;font-size:12px;text-align:center;margin-bottom:8px;min-height:20px;}
.numpad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
.numpad-btn{padding:16px;background:#2c2c2e;border:1px solid #48484a;border-radius:10px;color:#f2f2f7;font-size:20px;font-weight:600;}
.numpad-btn.del{background:#3a3a3c;}
#btn-giris{width:100%;padding:14px;border-radius:10px;font-size:16px;font-weight:700;background:#3a3a3c;color:#636366;}
#btn-giris.active{background:#0a84ff;color:#fff;}
#btn-geri{background:none;color:#636366;font-size:13px;margin-bottom:20px;padding:0;}

/* Harita */
#map{height:400px;border-radius:12px;overflow:hidden;border:1px solid #48484a;}
.leaflet-popup-content-wrapper{background:#2c2c2e;border:1px solid #48484a;color:#f2f2f7;border-radius:10px;}
.leaflet-popup-tip{background:#2c2c2e;}
.leaflet-popup-content{margin:10px 14px;font-family:-apple-system,sans-serif;font-size:12px;}

/* Uyarı banner */
.warn-red{background:#3a1a1a;border:1px solid #ff453a;border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:8px;}
.warn-orange{background:#2d1f00;border:1px solid #ff9f0a;border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:8px;}
.info-banner{background:#2c2c2e;border:1px solid #48484a;border-radius:8px;padding:10px 14px;font-size:12px;color:#aeaeb2;margin-bottom:12px;}

/* Araç durum kartı */
.arac-durum-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.durum-item{background:#1c1c1e;border-radius:8px;padding:8px 10px;}
.durum-tur{font-size:10px;color:#636366;text-transform:uppercase;letter-spacing:.8px;}
.durum-val{font-size:12px;font-weight:600;margin-top:2px;}
.dash-grid { display:grid; grid-template-columns:1fr; gap:12px; }
.dash-kpi-kolon { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.dash-sol { display:flex; flex-direction:column; gap:12px; }
.dash-row2 { display:grid; grid-template-columns:1fr; gap:12px; }
.dash-panel { background:rgba(255,255,255,0.06); border-radius:14px; padding:12px; position:relative; overflow:hidden; }
.dash-panel::before { content:""; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,#26a69a,#7e57c2,#42a5f5); opacity:0.8; }
.dash-panel-bas { font-size:12px; font-weight:700; color:#d1c4e9; margin-bottom:8px; }
.dash-kpi-kart { border-radius:14px; padding:16px; color:#fff; }
.dash-kpi-no { font-size:11px; opacity:0.85; font-weight:700; margin-bottom:6px; }
.dash-kpi-val { font-size:20px; font-weight:800; line-height:1; }
.dash-kpi-filtre { display:flex; flex-wrap:wrap; gap:3px; margin-top:8px; }
@media (min-width:720px) {
  .dash-grid { grid-template-columns:3fr 1fr; align-items:start; }
  .dash-kpi-kolon { display:flex; flex-direction:column; gap:10px; justify-content:flex-start; }
  .dash-kpi-kolon .dash-kpi-kart { height:72px; flex:0 0 auto; display:flex; flex-direction:column; justify-content:center; padding:12px 16px; }
  .dash-row2 { grid-template-columns:1fr 1fr; }
}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</head>
<body>


<!-- ARAÇ TALEBİ EKRANI -->
<div id="talep-screen" style="display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;">
  <div style="position:absolute;inset:0;background:linear-gradient(135deg,#0a0a0f 0%,#111118 50%,#0d0d15 100%);z-index:0;"></div>
  <svg style="position:absolute;inset:0;width:100%;height:100%;z-index:0;opacity:.4" viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice">
    <polygon points="200,50 280,100 280,200 200,250 120,200 120,100" fill="none" stroke="#0a84ff" stroke-width=".8" opacity=".6"/>
    <polygon points="320,400 390,440 390,520 320,560 250,520 250,440" fill="none" stroke="#30d158" stroke-width=".6" opacity=".3"/>
    <polygon points="80,550 150,590 150,670 80,710 10,670 10,590" fill="none" stroke="#ff9f0a" stroke-width=".5" opacity=".3"/>
    <line x1="200" y1="250" x2="300" y2="178" stroke="#0a84ff" stroke-width=".4" opacity=".3"/>
    <line x1="280" y1="200" x2="250" y2="440" stroke="#30d158" stroke-width=".4" opacity=".2"/>
    <circle cx="200" cy="50" r="2" fill="#0a84ff" opacity=".6"/>
    <circle cx="320" cy="400" r="2" fill="#30d158" opacity=".5"/>
    <defs>
      <radialGradient id="gt1" cx="50%" cy="30%" r="50%"><stop offset="0%" stop-color="#0a84ff" stop-opacity=".08"/><stop offset="100%" stop-color="#0a84ff" stop-opacity="0"/></radialGradient>
    </defs>
    <rect width="400" height="800" fill="url(#gt1)"/>
  </svg>
  <div style="position:relative;z-index:1;width:100%;max-width:340px">
    <button onclick="talepEkraniGizle()" style="background:none;border:none;color:#636366;font-size:13px;margin-bottom:20px;padding:0;cursor:pointer">← Geri</button>
    <div style="font-size:20px;font-weight:800;margin-bottom:4px;color:#f2f2f7">🚗 Araç Talebi</div>
    <div style="display:flex;background:#2c2c2e;border-radius:10px;padding:4px;gap:4px;margin:12px 0">
      <button onclick="talepTab('form')" id="tab-talep-form" style="flex:1;padding:8px;border:none;border-radius:8px;background:#0a84ff;color:#fff;font-size:12px;font-weight:600;cursor:pointer">📝 Yeni Talep</button>
      <button onclick="talepTab('sorgula')" id="tab-talep-sorgula" style="flex:1;padding:8px;border:none;border-radius:8px;background:transparent;color:#636366;font-size:12px;font-weight:600;cursor:pointer">🔍 Sorgula</button>
    </div>
    <div id="talep-form">
      <div class="field" style="margin-bottom:12px">
        <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:5px">Ad Soyad *</label>
        <input type="text" id="t-isim" />
      </div>
      <div class="field" style="margin-bottom:12px">
        <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:5px">Departman / Kategori *</label>
        <select id="t-departman"><option value="">Seçin...</option></select>
      </div>
      <div class="field" style="margin-bottom:12px">
        <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:5px">Nereye Gidecek *</label>
        <input type="text" id="t-nereye" />
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div class="field">
          <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:5px">Tarih *</label>
          <input type="date" id="t-tarih"/>
        </div>
        <div class="field">
          <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:5px">Saat *</label>
          <input type="time" id="t-saat"/>
        </div>
      </div>
      <div class="field" style="margin-bottom:16px">
        <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:5px">Açıklama</label>
        <textarea id="t-aciklama" rows="2" placeholder="Ek bilgi..."></textarea>
      </div>
      <div id="talep-mesaj" style="font-size:12px;margin-bottom:8px;min-height:18px"></div>
      <button onclick="talепGonder()" style="width:100%;padding:14px;background:#0a84ff;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer">🚗 Talebi Gönder</button>
    </div>
    <div id="talep-basari" style="display:none;text-align:center;padding:30px 0">
      <div style="font-size:48px;margin-bottom:16px">✅</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px;color:#f2f2f7">Talebiniz Alındı!</div>
      <div style="font-size:13px;color:#636366;margin-bottom:24px">Yönetici en kısa sürede değerlendirecek.</div>
      <button onclick="talепYeniGonder()" style="padding:12px 24px;background:#3a3a3c;border:1px solid #48484a;border-radius:10px;color:#f2f2f7;font-size:14px;cursor:pointer">Yeni Talep</button>
    </div>
    <div id="talep-sorgula-panel" style="display:none">
      <div class="field" style="margin-bottom:12px">
        <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:5px">Ad Soyad *</label>
        <input type="text" id="s-isim" />
      </div>
      <button onclick="talepSorgula()" style="width:100%;padding:14px;background:#636366;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:16px">🔍 Sorgula</button>
      <div id="sorgula-sonuc"></div>
    </div>
  </div>
</div>


<!-- LOGIN -->
<div id="login-screen">
  <div id="login-bg">
    <svg style="width:100%;height:100%;opacity:.4" viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice">
      <polygon points="200,50 280,100 280,200 200,250 120,200 120,100" fill="none" stroke="#0a84ff" stroke-width=".8" opacity=".6"/>
      <polygon points="350,150 400,178 400,234 350,262 300,234 300,178" fill="none" stroke="#0a84ff" stroke-width=".5" opacity=".4"/>
      <polygon points="50,300 110,334 110,402 50,436 -10,402 -10,334" fill="none" stroke="#0a84ff" stroke-width=".5" opacity=".4"/>
      <polygon points="320,400 390,440 390,520 320,560 250,520 250,440" fill="none" stroke="#30d158" stroke-width=".6" opacity=".3"/>
      <polygon points="80,550 150,590 150,670 80,710 10,670 10,590" fill="none" stroke="#ff9f0a" stroke-width=".5" opacity=".3"/>
      <line x1="200" y1="250" x2="300" y2="178" stroke="#0a84ff" stroke-width=".4" opacity=".3"/>
      <line x1="120" y1="200" x2="10" y2="334" stroke="#0a84ff" stroke-width=".4" opacity=".3"/>
      <line x1="280" y1="200" x2="250" y2="440" stroke="#30d158" stroke-width=".4" opacity=".2"/>
      <circle cx="200" cy="50" r="2" fill="#0a84ff" opacity=".6"/>
      <circle cx="280" cy="100" r="2" fill="#0a84ff" opacity=".6"/>
      <circle cx="200" cy="250" r="2" fill="#0a84ff" opacity=".6"/>
      <circle cx="320" cy="400" r="2" fill="#30d158" opacity=".5"/>
      <defs>
        <radialGradient id="g1" cx="50%" cy="30%" r="50%"><stop offset="0%" stop-color="#0a84ff" stop-opacity=".08"/><stop offset="100%" stop-color="#0a84ff" stop-opacity="0"/></radialGradient>
        <radialGradient id="g2" cx="50%" cy="70%" r="40%"><stop offset="0%" stop-color="#30d158" stop-opacity=".05"/><stop offset="100%" stop-color="#30d158" stop-opacity="0"/></radialGradient>
      </defs>
      <rect width="400" height="800" fill="url(#g1)"/>
      <rect width="400" height="800" fill="url(#g2)"/>
    </svg>
  </div>
  <div id="login-content">
    <div id="login-logo"><img id="login-logo-img" src="" onload="this.style.opacity=1" style="opacity:0;transition:opacity .3s"/></div>
    <div id="login-title">Küçüker Lojistik</div>
    <div id="login-sub">Araç Takip Sistemi</div>
    <div id="login-buttons">
      <button class="login-btn" id="login-sofor-btn" onclick="loginMod('sofor')" style="background:#ff9f0a;color:#000;">🧑‍✈️ Şoför Girişi</button>
      <button class="login-btn" id="login-admin-btn" onclick="loginMod('admin')">🔑 Yönetici Girişi</button>
      <button class="login-btn" id="login-yakit-btn" onclick="loginMod('yakit')">⛽ Yakıt Personeli</button>
      <button class="login-btn" style="background:#ff453a;color:#fff;" onclick="talepEkraniGoster()">🚗 Araç Talebi</button>
    </div>
    <div id="login-form" style="display:none;width:100%">
      <button id="btn-geri" onclick="loginGeri()">← Geri</button>
      <div id="sofor-sec-wrap" style="display:none;margin-bottom:16px">
        <label style="font-size:11px;color:#636366;font-weight:600;display:block;margin-bottom:6px">ŞOFÖR *</label>
        <select id="sofor-sec" style="width:100%;background:#3a3a3c;border:1px solid #48484a;border-radius:8px;padding:12px;color:#f2f2f7;font-size:14px;outline:none;"></select>
      </div>
      <div id="pin-display">PIN girin</div>
      <div id="pin-error"></div>
      <div class="numpad">
        <button class="numpad-btn" onclick="pinGir('1')">1</button>
        <button class="numpad-btn" onclick="pinGir('2')">2</button>
        <button class="numpad-btn" onclick="pinGir('3')">3</button>
        <button class="numpad-btn" onclick="pinGir('4')">4</button>
        <button class="numpad-btn" onclick="pinGir('5')">5</button>
        <button class="numpad-btn" onclick="pinGir('6')">6</button>
        <button class="numpad-btn" onclick="pinGir('7')">7</button>
        <button class="numpad-btn" onclick="pinGir('8')">8</button>
        <button class="numpad-btn" onclick="pinGir('9')">9</button>
        <button class="numpad-btn" style="opacity:0" disabled></button>
        <button class="numpad-btn" onclick="pinGir('0')">0</button>
        <button class="numpad-btn del" onclick="pinSil()">⌫</button>
      </div>

function formatSure(d) {
  if(d<60) return d+" dk";
  const sa=Math.floor(d/60), dk=d%60;
  return dk>0?sa+" sa "+dk+" dk":sa+" sa";
}

function mesafe(la1,ln1,la2,ln2) {
  la1=parseFloat(la1); ln1=parseFloat(ln1); la2=parseFloat(la2); ln2=parseFloat(ln2);
  if(isNaN(la1)||isNaN(ln1)||isNaN(la2)||isNaN(ln2)) return 0;
  const R=6371,dL=(la2-la1)*Math.PI/180,dN=(ln2-ln1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dN/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

function showToast(msg, type="success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  t.style.background = type==="error" ? "#3a1a1a" : "#1a3a2a";
  t.style.border = "1px solid "+(type==="error"?"#ff453a":"#30d158");
  t.style.color = type==="error" ? "#ff453a" : "#6ee7b7";
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.style.display="none", 3000);
}

function zoomKapat() {
  var m = document.getElementById("viewport-meta");
  if(m) m.setAttribute("content", "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no");
}
function zoomAc() {
  var m = document.getElementById("viewport-meta");
  if(m) m.setAttribute("content", "width=device-width, initial-scale=1.0");
}

function loginMod(mod) {
  LOGIN_MOD = mod;
  PIN = "";
  document.getElementById("login-buttons").style.display = "none";
  document.getElementById("login-form").style.display = "block";
  document.getElementById("sofor-sec-wrap").style.display = mod==="sofor" ? "block" : "none";
  pinGuncelle();
  document.getElementById("pin-error").textContent = "";
  if(mod==="sofor") {
    const sel = document.getElementById("sofor-sec");
    sel.innerHTML = '<option value="">Seçin...</option>' +
      DB.soforler.map(s=>`<option value="${s.isim}">${s.isim}</option>`).join("");
  }
}

function loginGeri() {
  document.getElementById("login-buttons").style.display = "block";
  document.getElementById("login-form").style.display = "none";
  PIN = "";
}

function pinGir(d) {
  if(PIN.length >= 4) return;
  PIN += d;
  pinGuncelle();
}

function pinSil() {
  PIN = PIN.slice(0,-1);
  pinGuncelle();
}

function pinGuncelle() {
  const el = document.getElementById("pin-display");
  el.textContent = PIN ? "●".repeat(PIN.length) : "PIN girin";
  el.style.color = PIN ? "#f2f2f7" : "#636366";
  el.style.letterSpacing = PIN ? "12px" : "0";
  el.style.fontSize = PIN ? "28px" : "14px";
  const btn = document.getElementById("btn-giris");
  btn.className = PIN.length===4 ? "active" : "";
  btn.style.background = PIN.length===4 ? "#0a84ff" : "#3a3a3c";
  btn.style.color = PIN.length===4 ? "#fff" : "#636366";
}

function loginGiris() {
  if(PIN.length < 4) return;
  document.getElementById("pin-error").textContent = "";
  if(LOGIN_MOD==="admin") {
    if(PIN===ADMIN_PIN) girisYap({rol:"admin",isim:"Yönetici"});
    else { document.getElementById("pin-error").textContent="Yanlış PIN!"; PIN=""; pinGuncelle(); }
  } else if(LOGIN_MOD==="yakit") {
    if(PIN===YAKIT_PIN) girisYap({rol:"yakit",isim:"Yakıt Personeli"});
    else { document.getElementById("pin-error").textContent="Yanlış PIN!"; PIN=""; pinGuncelle(); }
  } else {
    const sf = document.getElementById("sofor-sec").value;
    if(!sf) { document.getElementById("pin-error").textContent="Şoför seçin!"; return; }
    const sofor = DB.soforler.find(s=>s.isim===sf);
    if(sofor && PIN===sofor.pin) girisYap({rol:"sofor",isim:sf});
    else { document.getElementById("pin-error").textContent="Yanlış PIN!"; PIN=""; pinGuncelle(); }
  }
}

// Giriş ekranı için PIN ve şoför listesini önceden yükler (giriş öncesi doğrulama için)
async function loginVerisiYukle() {
  try {
    const [ayarlar, soforler] = await Promise.all([
      supa.from('ayarlar').select('*'),
      supa.from('soforler').select('*').order('isim'),
    ]);
    if(ayarlar.data) {
      ayarlar.data.forEach(function(a) {
        if(a.anahtar==='admin_pin') ADMIN_PIN=a.deger;
        if(a.anahtar==='yakit_pin') YAKIT_PIN=a.deger;
        if(a.anahtar==='litre_fiyati') DB.litreFiyati=a.deger;
        if(a.anahtar==='kpi_depo_doluluk') { window.KPI_DASH=window.KPI_DASH||{depoDoluluk:"",planaUyum:"",isKazasi:""}; window.KPI_DASH.depoDoluluk=a.deger; }
        if(a.anahtar==='kpi_is_kazasi') { window.KPI_DASH=window.KPI_DASH||{depoDoluluk:"",planaUyum:"",isKazasi:""}; window.KPI_DASH.isKazasi=a.deger; }
      });
    }
    if(soforler.data) DB.soforler = soforler.data;
  } catch(e) { console.error("Giriş verisi yükleme hatası:", e); }
}

async function girisYap(kul) {
  KUL = kul;
  // Oturumu kaydet
  sessionStorage.setItem("kul", JSON.stringify(kul));
  sessionStorage.setItem("aktif_menu", AKTIF_MENU);
  sessionStorage.setItem("aktif_tab", AKTIF_TAB);
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  zoomAc(); // uygulama içinde zoom serbest
  // Giriş sonrası yükle
  showToast("Veriler yükleniyor...");
  await dbYukle();
  document.getElementById("header-sub").textContent =
    kul.rol==="admin" ? "🔑 Yönetici" :
    kul.rol==="yakit" ? "⛽ Yakıt Personeli" : "🧑‍✈️ "+kul.isim;

  // Önceki oturumdan kalan arka plan işlerini durdur
  if(window._talepGlobalInterval) { clearInterval(window._talepGlobalInterval); window._talepGlobalInterval = null; }
  if(window._talepInterval) { clearInterval(window._talepInterval); window._talepInterval = null; }
  // Akordeon ve içeriği temizle (rol geçişlerinde kalıntı olmasın)
  var akrEl = document.getElementById("akordeon"); if(akrEl) akrEl.innerHTML = "";
  var contentEl = document.getElementById("content"); if(contentEl) contentEl.classList.remove("kpi-genis");

  if(kul.rol==="admin") {
    document.getElementById("bottom-nav").style.display = "flex";
    altMenuSec("ana");
    // Yeni talep bildirimi için arka planda sürekli kontrol (her sayfada)
    window._talepIlkYukleme = true;
    window._talepGlobalInterval = setInterval(function(){ if(KUL && KUL.rol==="admin") talepleriTazele(); }, 20000);
  } else if(kul.rol==="yakit") {
    AKTIF_MENU = "yakit-personeli";
    document.getElementById("bottom-nav").style.display = "none";
    renderTabBar([{id:"yakit",label:"⛽ Yakıt Girişi"},{id:"yakitliste",label:"📋 Yakıt Listesi"}]);
    tabSec("yakit");
  } else {
    AKTIF_MENU = "sofor";
    document.getElementById("bottom-nav").style.display = "none";
    renderSoforTabBar();
    tabSec("cikis");
  }
  headerGuncelle();
  logo();
}

function logout() {
  KUL = null;
  // Oturum ve durum verilerini tamamen temizle
  sessionStorage.removeItem("kul");
  sessionStorage.removeItem("aktif_menu");
  sessionStorage.removeItem("aktif_tab");
  AKTIF_MENU = "ana";
  AKTIF_TAB = "rapor";
  // Arka plan intervallerini durdur (admin talep bildirimi vb.)
  if(window._talepGlobalInterval) { clearInterval(window._talepGlobalInterval); window._talepGlobalInterval = null; }
  if(window._talepInterval) { clearInterval(window._talepInterval); window._talepInterval = null; }
  // Yönetici içeriğini ekrandan sil (şoför asla görmesin)
  var content = document.getElementById("content");
  if(content) { content.innerHTML = ""; content.classList.remove("kpi-genis"); }
  var tabBar = document.getElementById("tab-bar"); if(tabBar) tabBar.innerHTML = "";
  var nav = document.getElementById("bottom-nav"); if(nav) { nav.innerHTML = ""; nav.style.display = "none"; }
  var akr = document.getElementById("akordeon"); if(akr) akr.innerHTML = "";
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  zoomKapat();
  document.getElementById("login-buttons").style.display = "block";
  document.getElementById("login-form").style.display = "none";
  PIN = "";
}

function altMenuSec(menu) {
  // GÜVENLİK: Alt menü (yönetici navigasyonu) sadece admin içindir
  if(!KUL || KUL.rol!=="admin") return;
  AKTIF_MENU = menu;
  sessionStorage.setItem("aktif_menu", menu);
  renderBottomNav();
  if(menu==="diger") {
    // Accordion göster, tab-bar gizle
    document.getElementById("tab-bar").style.display = "none";
    document.getElementById("akordeon").style.display = "block";
    // İlk modülü aç ve ilk alt sekmesini seç
    window.AKR_ACIK = window.AKR_ACIK || DIGER_MODULLER[0].id;
    var acikMod = DIGER_MODULLER.find(function(m){return m.id===window.AKR_ACIK;}) || DIGER_MODULLER[0];
    tabSec(acikMod.alt[0].id);
    renderAkordeon();
  } else {
    document.getElementById("akordeon").style.display = "none";
    document.getElementById("tab-bar").style.display = "flex";
    const tablar = MENU_GRUPLARI[menu];
    renderTabBar(tablar);
    tabSec(tablar[0].id);
  }
}

function renderAkordeon() {
  var basHtml = DIGER_MODULLER.map(function(mod){
    var acik = window.AKR_ACIK===mod.id;
    var bekSay = (mod.id==="talep-mod") ? DB.talepler.filter(function(x){return x.durum==="Bekliyor";}).length : 0;
    return '<div class="akr-bas '+(acik?"acik":"")+'" onclick="akrToggle(\''+mod.id+'\')" style="position:relative">'+
      '<span class="akr-ikon">'+mod.ikon+'</span>'+
      '<span class="akr-baslik">'+mod.baslik+'</span>'+
      (bekSay>0?'<span style="position:absolute;top:3px;right:6px;background:#ff453a;color:#fff;border-radius:10px;min-width:16px;height:16px;padding:0 4px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center">'+bekSay+'</span>':'')+
    '</div>';
  }).join("");

  var acikMod = DIGER_MODULLER.find(function(m){return m.id===window.AKR_ACIK;}) || DIGER_MODULLER[0];
  var panelHtml = '<div class="akr-panel">' + acikMod.alt.map(function(a){
    var aktif = AKTIF_TAB===a.id;
    var bekSay = (a.id==="talepler") ? DB.talepler.filter(function(x){return x.durum==="Bekliyor";}).length : 0;
    return '<div class="akr-alt-btn '+(aktif?"aktif":"")+'" onclick="akrSec(\''+a.id+'\')" style="position:relative">'+
      '<span>'+a.ikon+'</span><span>'+a.label+'</span>'+
      (bekSay>0?'<span style="position:absolute;top:4px;right:8px;background:#ff453a;color:#fff;border-radius:10px;min-width:18px;height:18px;padding:0 5px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center">'+bekSay+'</span>':'')+
      '</div>';
  }).join("") + '</div>';

  document.getElementById("akordeon").innerHTML = '<div class="akr-bar">'+basHtml+'</div>'+panelHtml;
}

function akrToggle(modId) {
  window.AKR_ACIK = modId;
  var mod = DIGER_MODULLER.find(function(m){return m.id===modId;});
  // Önce sekmeyi seç (AKTIF_TAB güncellensin), sonra akordeonu çiz ki aktif buton işaretlensin
  if(mod) tabSec(mod.alt[0].id);
  renderAkordeon();
}

function akrSec(tabId) {
  tabSec(tabId);
  renderAkordeon();
}

function renderBottomNav() {
  const nav = document.getElementById("bottom-nav");
  const aktifSayisi = DB.aktifSeferler.length;
  nav.innerHTML = [
    {id:"ana",icon:"🏠",label:"Ana"},
    {id:"sefer",icon:"🚛",label:"Seferler"},

    {id:"diger",icon:"⛽",label:"Diğer"},
  ].map(m=>`
    <button class="nav-btn ${AKTIF_MENU===m.id?'active':''}" onclick="altMenuSec('${m.id}')">

function renderTabBar(tablar) {
  const bar = document.getElementById("tab-bar");
  var aktifSay = (DB.aktifSeferler||[]).length;
  var bekleyenTalep = (DB.talepler||[]).filter(function(x){return x.durum==="Bekliyor";}).length;
  bar.innerHTML = tablar.map(t=>`
    <button class="tab-btn ${AKTIF_TAB===t.id?'active':''}" onclick="tabSec('${t.id}')">
      ${t.label}
      ${t.id==="aktif"&&aktifSay>0?`<span class="tab-badge">${aktifSay}</span>`:""}
      ${t.id==="talepler"&&bekleyenTalep>0?`<span class="tab-badge">${bekleyenTalep}</span>`:""}
    </button>
  `).join("");
}

function tabSec(id) {
  // GÜVENLİK: Rol bazlı sekme erişimi. Şoför/yakıt admin sekmelerini AÇAMAZ.
  if(!KUL) return;
  var izinli = {
    admin: null, // admin her şeye erişebilir
    yakit: ["yakit","yakitliste"],
    sofor: ["cikis","aktif"]
  };
  if(KUL.rol!=="admin") {
    var liste = izinli[KUL.rol] || [];
    if(liste.indexOf(id)===-1) {
      // Yetkisiz sekme: kendi varsayılan sekmesine yönlendir
      id = liste[0];
    }
  }
  AKTIF_TAB = id;
  sessionStorage.setItem("aktif_tab", id);
  // Talepler ekranı için otomatik yenileme: bu ekrandayken her 15 sn'de bir kontrol et
  if(window._talepInterval) { clearInterval(window._talepInterval); window._talepInterval = null; }
  if(id==="talepler") {
    window._talepInterval = setInterval(function(){
      if(AKTIF_TAB==="talepler") talepleriTazele(); else { clearInterval(window._talepInterval); window._talepInterval=null; }
    }, 15000);
  }
  // tab bar güncelle
  document.querySelectorAll(".tab-btn").forEach(b=>{
    b.classList.toggle("active", b.textContent.trim().startsWith(
      id==="rapor"?"📊":id==="harita"?"🗺️":id==="cikis"?"🚀":
      id==="aktif"?"🟡":id==="liste"?"📋":id==="araclar"?"🚗":
      id==="soforler"?"👤":id==="konumlar"?"📍":id==="yakit"?"⛽":
      id==="yakitliste"?"📋":id==="bakim"?"🔧":
      id==="bakimliste"?"📋":id==="nakliye"?"🚚":
      id==="nakliyeliste"?"📋":id==="mesailer"?"⏰":
      id==="mesailiste"?"📋":"XXX"
    ));
  });
  // Tekrar tab bar'ı doğru render et
  if(KUL.rol==="admin") { if(AKTIF_MENU!=="diger") renderTabBar(MENU_GRUPLARI[AKTIF_MENU]); }
  else if(KUL.rol==="yakit") renderTabBar([{id:"yakit",label:"⛽ Yakıt Girişi"},{id:"yakitliste",label:"📋 Yakıt Listesi"}]);
  else renderSoforTabBar();

  // içeriği render et
  switch(id) {
    case "rapor":      renderKPI(); break;
    case "harita":     renderHarita(); break;
    case "cikis":      renderCikis(); break;
    case "aktif":      renderAktif(); break;
    case "liste":      renderListe(); break;
    case "araclar":    renderAraclar(); break;
    case "soforler":   renderSoforler(); break;
    case "konumlar":   renderKonumlar(); break;
    case "yakit":      renderYakit(); break;
    case "yakitliste": renderYakitListe(); break;
    case "bakim":      renderBakim(); break;
    case "bakimliste": renderBakimListe(); break;
    case "ayarlar":    renderAyarlar(); break;
    case "mesailer":   renderMesailer(); break;
    case "mesailiste": renderMesaiListe(); break;
    case "talepler":   renderTalepler(); break;
    case "nakliye":    renderNakliye(); break;
    case "nakliyeliste": renderNakliyeListe(); break;
    case "kaza":       renderKaza(); break;
    case "kazaliste":  renderKazaListe(); break;
    case "islistesi":   window.IS_FILTRE_TARIH_MANUEL=false; window.IS_FILTRE_TARIH=null; renderIsListesi(); break;
    case "islisteleme": window.IS_FILTRE_TARIH_MANUEL=false; window.IS_FILTRE_TARIH=null; renderIsListe(); break;
    case "excel":      renderExcel(); break;
  }
  window.scrollTo(0,0);
}

let CIKIS_SEL = {lat:null,lng:null,id:null};
let VARIS_SEL = {lat:null,lng:null,id:null,isim:""};

function cikisSecildi() {
  const idx = document.getElementById("f-cikis").value;
  const k = idx==="" ? null : tumKonumlar()[parseInt(idx)];
  if(!k) { CIKIS_SEL={lat:null,lng:null,id:null}; return; }
  CIKIS_SEL = {lat:k.lat,lng:k.lng,id:k.id,isim:k.isim};
  const link = document.getElementById("cikis-harita-link");
  link.style.display="block";
  link.innerHTML=`<a href="https://www.google.com/maps?q=${k.lat},${k.lng}" target="_blank" style="color:#0a84ff;text-decoration:none">📍 ${k.isim} — Haritada Gör →</a>`;
  varisGuncelle();
}

function varisSecildi() {
  const idx = document.getElementById("f-varis").value;
  const k = idx==="" ? null : tumKonumlar()[parseInt(idx)];
  const el = document.getElementById("varis-detay");
  if(!k) { VARIS_SEL={lat:null,lng:null,id:null,isim:""}; el.style.display="none"; return; }
  VARIS_SEL = {lat:k.lat,lng:k.lng,id:k.id,isim:k.isim};
  varisGuncelle();
}

function varisGuncelle() {
  const el = document.getElementById("varis-detay");
  if(!VARIS_SEL.lat) return;
  const basLat = CIKIS_SEL.lat || DB.fabrika.lat;
  const basLng = CIKIS_SEL.lng || DB.fabrika.lng;
  el.style.display="block";
  el.innerHTML=`
    <div style="background:#1c1c1e;border:1px solid #0a84ff44;border-radius:10px;padding:12px 14px">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px">${VARIS_SEL.isim}</div>
      <a href="https://www.google.com/maps/dir/?api=1&origin=${basLat},${basLng}&destination=${VARIS_SEL.lat},${VARIS_SEL.lng}&travelmode=driving"
        target="_blank" style="display:block;text-align:center;background:#1a73e8;color:#fff;border-radius:8px;padding:9px;font-size:13px;font-weight:700;text-decoration:none">
        🗺️ Rotayı Google Maps'te Aç
      </a>
    </div>`;
}

function cikisKaydetBtn(btn) {
  const soforAdi = btn.getAttribute("data-sofor") || "";
  cikisKaydet(soforAdi);
}

async function cikisKaydet(soforAdi) {
  const soforEl = document.getElementById("f-sofor");
  const sofor = (soforEl ? soforEl.value : "") || soforAdi || "";
  const tarihEl = document.getElementById("f-tarih");
  const tarih = tarihEl ? tarihEl.value : new Date().toISOString().split("T")[0];
  const cikisId = (document.getElementById("f-cikis")||{}).value || "";
  const varisId = (document.getElementById("f-varis")||{}).value || "";
  const km = (document.getElementById("f-km")||{}).value || "";
  const yuk = (document.getElementById("f-yuk")||{}).value || "";
  const plaka = (document.getElementById("f-plaka")||{}).value || "";
  const miktar = (document.getElementById("f-miktar")||{}).value || "";
  const birim = (document.getElementById("f-birim")||{}).value || "kg";
  const aciklama = (document.getElementById("f-aciklama")||{}).value || "";

  if(!sofor||!cikisId||!varisId||!km||!yuk) { 
    let eksik = [];
    if(!sofor) eksik.push("Şoför");
    if(!cikisId) eksik.push("Çıkış konumu");
    if(!varisId) eksik.push("Varış noktası");
    if(!km) eksik.push("Başlangıç KM");
    if(!yuk) eksik.push("Yük türü");
    showToast(eksik.join(", ")+" zorunlu!","error"); 
    return; 
  }
  if(DB.aktifSeferler.find(s=>s.sofor===sofor)) { showToast(sofor+" zaten yolda!","error"); return; }

  const cikisK = cikisId==="" ? null : tumKonumlar()[parseInt(cikisId)];
  const varisK = varisId==="" ? null : tumKonumlar()[parseInt(varisId)];
  const km_mesafe = cikisK&&varisK ? mesafe(cikisK.lat,cikisK.lng,varisK.lat,varisK.lng) : null;
  const simdi = new Date();

  const yeniSefer = {
    sofor, tarih, plaka,
    cikis_id: cikisK?.id, cikis_isim: cikisK?.isim||"", cikis_lat: cikisK?.lat, cikis_lng: cikisK?.lng,

function kmHesapla(id, basKm) {
  const val = parseInt(document.getElementById("don-km-"+id).value)||0;
  const el = document.getElementById("km-fark-"+id);
  if(val > basKm) { el.style.display="block"; el.textContent=`+${val-basKm} km`; }
  else el.style.display="none";
}

async function donusKaydet(id) {
  const sefer = DB.aktifSeferler.find(s=>s.id===id);
  if(!sefer) return;
  const bKm = parseInt(document.getElementById("don-km-"+id).value);
  const not = document.getElementById("don-not-"+id).value;
  if(!bKm) { showToast("Bitiş KM girin!","error"); return; }
  if(bKm <= sefer.baslangic_km) { showToast("Bitiş KM başlangıçtan büyük olmalı!","error"); return; }
  const simdi = new Date();
  const bekleme = Math.round((simdi.getTime()-sefer.cikis_timestamp)/60000);
  const tamamlanan = {
    ...sefer, bitis_km: bKm, km_fark: bKm-sefer.baslangic_km,
    donus_notu: not, bekleme_dakika: bekleme,
    donus_saati: simdi.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"})
  };
  try {
    await seferTamamlaDB(id, bKm, not, bekleme, tamamlanan.donus_saati, bKm-sefer.baslangic_km);
  } catch(e) {}
  DB.tamamlananlar.unshift(tamamlanan);
  DB.aktifSeferler = DB.aktifSeferler.filter(s=>s.id!==id);
  showToast(sefer.sofor+" döndü - "+formatSure(bekleme));
  headerGuncelle();
  if(KUL.rol==="admin") renderBottomNav();
  else renderSoforTabBar();
  renderAktif();
}

// Bir dönem modunu {bas,bit} tarih aralığına çevirir
function donemAralik(mod) {
  var bugun = bugunTR();
  if(mod==="bugun") return {bas:bugun, bit:bugun};
  if(mod==="hafta") return {bas:new Date(Date.now()-7*86400000).toISOString().split("T")[0], bit:bugun};
  if(mod==="ay") { var s=new Date(); return {bas:s.getFullYear()+"-"+String(s.getMonth()+1).padStart(2,"0")+"-01", bit:bugun}; }
  if(mod==="yil") return {bas:new Date().getFullYear()+"-01-01", bit:bugun};
  return {bas:"", bit:""}; // tumu
}

// Belirli dönemde toplam sefer sayısı
function kutuSeferSayisi(mod) {
  var a = donemAralik(mod);
  var data = DB.tamamlananlar || [];
  if(a.bas) data = data.filter(function(s){ return s.tarih>=a.bas && s.tarih<=a.bit; });
  return data.length;
}

// Belirli dönemde toplam yakıt maliyeti (TL)
function kutuYakitMaliyet(mod) {
  var a = donemAralik(mod);
  var data = DB.yakitlar || [];
  if(a.bas) data = data.filter(function(y){ return y.tarih>=a.bas && y.tarih<=a.bit; });
  return data.reduce(function(s,y){ return s+(y.tutar||0); }, 0);
}

// Belirli dönemde toplam taşınan yük (kg)
function kutuToplamYuk(mod) {
  var a = donemAralik(mod);
  var data = DB.tamamlananlar || [];
  if(a.bas) data = data.filter(function(s){ return s.tarih>=a.bas && s.tarih<=a.bit; });
  return data.reduce(function(s,x){ return s+(parseFloat(x.yuk_miktari)||0); }, 0);
}

// Belirli dönemde toplam km
function kutuToplamKm(mod) {
  var a = donemAralik(mod);
  var data = DB.tamamlananlar || [];
  if(a.bas) data = data.filter(function(s){ return s.tarih>=a.bas && s.tarih<=a.bit; });
  return data.reduce(function(s,x){ return s+(parseFloat(x.km_fark)||0); }, 0);
}

// Belirli dönemde toplam bakım maliyeti (TL)
function kutuBakimMaliyet(mod) {
  var a = donemAralik(mod);
  var data = DB.bakimlar || [];
  if(a.bas) data = data.filter(function(b){ return b.tarih>=a.bas && b.tarih<=a.bit; });
  return data.reduce(function(s,b){ return s+(b.maliyet||0); }, 0);
}

// Belirli dönemde toplam nakliye maliyeti (TL)
function kutuNakliyeMaliyet(mod) {
  var a = donemAralik(mod);
  var data = DB.nakliyeler || [];
  if(a.bas) data = data.filter(function(n){ return n.tarih>=a.bas && n.tarih<=a.bit; });
  return data.reduce(function(s,n){ return s+(n.fiyat||0); }, 0);
}

// Dönem filtreli kayıtları döndürür
function donemFiltre(arr, mod, alan) {
  var a = donemAralik(mod);
  if(!a.bas) return arr.slice();
  alan = alan || "tarih";
  return arr.filter(function(x){ return x[alan]>=a.bas && x[alan]<=a.bit; });
}
// Bir aracın gerçek tüketimi (lt/100km) = alınan litre ÷ yapılan km × 100
function aracTuketim(plaka, mod) {
  var litre = donemFiltre(DB.yakitlar||[], mod).filter(function(y){ return y.plaka===plaka; })
    .reduce(function(s,y){ return s+(parseFloat(y.litre)||0); }, 0);
  var km = donemFiltre(DB.tamamlananlar||[], mod).filter(function(s){ return s.plaka===plaka; })
    .reduce(function(s,x){ return s+(parseFloat(x.km_fark)||0); }, 0);
  if(km<=0) return 0;
  return litre/km*100;
}
// Bir aracın km başı yakıt maliyeti (TL/km) = (litre ÷ km) × litre fiyatı
function aracTlKm(plaka, mod) {
  var litre = donemFiltre(DB.yakitlar||[], mod).filter(function(y){ return y.plaka===plaka; })
    .reduce(function(s,y){ return s+(parseFloat(y.litre)||0); }, 0);
  var km = donemFiltre(DB.tamamlananlar||[], mod).filter(function(s){ return s.plaka===plaka; })
    .reduce(function(s,x){ return s+(parseFloat(x.km_fark)||0); }, 0);
  if(km<=0) return 0;
  var lf = parseFloat(DB.litreFiyati)||0;
  return (litre/km)*lf;
}
// Bir alanı bir anahtara göre gruplar → [{etiket,deger}] (azalan)
function grupla(kayitlar, anahtarFn, degerFn) {
  var g = {};
  kayitlar.forEach(function(k){
    var key = anahtarFn(k) || "Diğer";
    g[key] = (g[key]||0) + (degerFn(k)||0);
  });
  return Object.keys(g).map(function(k){ return {etiket:k, deger:g[k]}; })
    .filter(function(x){ return x.deger>0; })
    .sort(function(a,b){ return b.deger-a.deger; });
}
// Donut için yüzde ekler
function yuzdele(veriler) {
  var t = veriler.reduce(function(a,x){ return a+x.deger; }, 0);
  return veriler.map(function(x){ return {etiket:x.etiket, deger:x.deger, yuzde:t>0?Math.round(x.deger/t*100):0}; });
}

// Haftalık değer hesaplayıcı: son N haftanın hafta-bazlı toplamını döndürür

function haftaNumarasi(d) {
  var onceki = new Date(Date.UTC(d.getFullYear(),0,1));
  var gun = Math.floor((d - onceki)/(24*60*60*1000));
  return Math.ceil((gun + onceki.getUTCDay()+1)/7);
}

// Son N ayın aylık toplamını hesaplar. tip: 'km' | 'maliyet'
function aylikSeri(tip, ayN) {
  var simdi = new Date();
  var sonuc = [];
  var aylarKisa = ["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
  var yilSimdi = simdi.getFullYear();
  var aySimdi = simdi.getMonth(); // 0-11
  for(var ay=0; ay<=aySimdi; ay++) {
    var d = new Date(yilSimdi, ay, 1);
    var yil = d.getFullYear();
    var onek = yil+"-"+String(ay+1).padStart(2,"0");
    var deger = 0;
    if(tip==="km") {
      deger = (DB.tamamlananlar||[]).filter(function(s){ return s.tarih && s.tarih.startsWith(onek) && s.km_fark; })
        .reduce(function(a,s){ return a+(s.km_fark||0); }, 0);
    } else if(tip==="maliyet") {
      var yk = (DB.yakitlar||[]).filter(function(y){ return y.tarih && y.tarih.startsWith(onek); }).reduce(function(a,y){ return a+(y.tutar||0); },0);
      var nk = (DB.nakliyeler||[]).filter(function(n){ return n.tarih && n.tarih.startsWith(onek); }).reduce(function(a,n){ return a+(n.fiyat||0); },0);
      var bk = (DB.bakimlar||[]).filter(function(b){ return b.tarih && b.tarih.startsWith(onek); }).reduce(function(a,b){ return a+(b.maliyet||0); },0);
      deger = yk+nk+bk;
    } else if(tip==="sefer") {
      deger = (DB.tamamlananlar||[]).filter(function(s){ return s.tarih && s.tarih.startsWith(onek); }).length;
    } else if(tip==="yakit") {
      deger = (DB.yakitlar||[]).filter(function(y){ return y.tarih && y.tarih.startsWith(onek); }).reduce(function(a,y){ return a+(y.tutar||0); },0);
    } else if(tip==="bakim") {
      deger = (DB.bakimlar||[]).filter(function(b){ return b.tarih && b.tarih.startsWith(onek); }).reduce(function(a,b){ return a+(b.maliyet||0); },0);
    } else if(tip==="nakliye") {
      deger = (DB.nakliyeler||[]).filter(function(nk){ return nk.tarih && nk.tarih.startsWith(onek); }).reduce(function(a,nk){ return a+(nk.fiyat||0); },0);
    } else if(tip==="is") {
      deger = (DB.isler||[]).filter(function(i){ return i.tarih && i.tarih.startsWith(onek); }).length;
    } else if(tip==="istamam") {
      deger = (DB.isler||[]).filter(function(i){ return i.tarih && i.tarih.startsWith(onek) && i.durum==="Tamamlandı"; }).length;
    }
    sonuc.push({label:aylarKisa[ay], deger:Math.round(deger)});
  }
  return sonuc;
}

// Canvas'a alan (area) + çizgi grafik çizer; etiketli, mor temalı
// Ekrana yatay bar grafik çizer (şoför/araç sıralaması için)
function cizYatayBar(canvasId, veriler, renk) {
  var cv = document.getElementById(canvasId);
  if(!cv || !veriler || veriler.length===0) return;
  var ctx = cv.getContext("2d");
  var dpr = window.devicePixelRatio||1;
  var cssW = cv.clientWidth||cv.width, cssH = cv.clientHeight||cv.height;
  cv.width = Math.round(cssW*dpr); cv.height = Math.round(cssH*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  var W=cssW, H=cssH;
  ctx.clearRect(0,0,W,H);
  var n = veriler.length;
  var max = Math.max.apply(null, veriler.map(function(v){return v.deger;})); if(max===0) max=1;
  var satirH = H/n;
  var barH = Math.min(22, satirH*0.55);
  var etiketGen = 70;
  veriler.forEach(function(v,i){
    var y = i*satirH + satirH/2;
    // etiket
    ctx.fillStyle="#d1c4e9"; ctx.font="600 13px -apple-system,Segoe UI,Arial"; ctx.textAlign="left"; ctx.textBaseline="middle";
    var et = v.etiket.length>10 ? v.etiket.substring(0,9)+"…" : v.etiket;
    ctx.fillText(et, 0, y);
    // bar
    var barW = (v.deger/max)*(W-etiketGen-50);
    ctx.fillStyle=renk;
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(etiketGen, y-barH/2, Math.max(barW,2), barH, 4); else ctx.rect(etiketGen, y-barH/2, Math.max(barW,2), barH);
    ctx.fill();
    // değer
    ctx.fillStyle="#fff"; ctx.font="bold 13px -apple-system,Segoe UI,Arial"; ctx.textAlign="left";
    ctx.fillText(v.deger.toLocaleString("tr-TR"), etiketGen+barW+6, y);
  });
}

// Ekrana dikey bar grafik çizer (aylık sefer sayısı için)
function cizDikeyBar(canvasId, noktalar, renk) {
  var cv = document.getElementById(canvasId);
  if(!cv || !noktalar || noktalar.length===0) return;
  var ctx = cv.getContext("2d");
  var dpr = window.devicePixelRatio||1;
  var cssW = cv.clientWidth||cv.width, cssH = cv.clientHeight||cv.height;
  cv.width = Math.round(cssW*dpr); cv.height = Math.round(cssH*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  var W=cssW, H=cssH;
  ctx.clearRect(0,0,W,H);
  var padB=20, padT=18;
  var n = noktalar.length;
  var max = Math.max.apply(null, noktalar.map(function(p){return p.deger;})); if(max===0) max=1;
  var alanW = W/n;
  var barW = alanW*0.55;
  noktalar.forEach(function(nt,i){
    var x = i*alanW + (alanW-barW)/2;
    var h = (nt.deger/max)*(H-padT-padB);
    var y = H-padB-h;
    ctx.fillStyle=renk;
    ctx.beginPath();
    if(ctx.roundRect) ctx.roundRect(x,y,barW,Math.max(h,2),4); else ctx.rect(x,y,barW,Math.max(h,2));
    ctx.fill();
    if(nt.deger>0){ ctx.fillStyle="#fff"; ctx.font="bold 12px -apple-system,Segoe UI,Arial"; ctx.textAlign="center"; ctx.fillText(nt.deger, x+barW/2, y-4); }
    ctx.fillStyle="#8fa3c4"; ctx.font="600 11px -apple-system,Segoe UI,Arial"; ctx.textAlign="center"; ctx.fillText(nt.label, x+barW/2, H-6);
  });
}

function cizAlanGrafik(canvasId, noktalar, cizgiRenk, dolguRenk) {
  var cv = document.getElementById(canvasId);
  if(!cv || !noktalar || noktalar.length===0) return;
  var ctx = cv.getContext("2d");
  // Keskin çizim: CSS boyutuna ve ekran yoğunluğuna göre iç çözünürlüğü ayarla
  var dpr = window.devicePixelRatio || 1;
  var cssW = cv.clientWidth || cv.width;
  var cssH = cv.clientHeight || cv.height;
  cv.width = Math.round(cssW * dpr);
  cv.height = Math.round(cssH * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  var W = cssW, H = cssH;
  ctx.clearRect(0,0,W,H);
  var padL=8, padR=8, padT=24, padB=22;
  var degerler = noktalar.map(function(n){ return n.deger; });
  var max = Math.max.apply(null, degerler);
  var min = 0;
  if(max===0) max=1;
  var n = noktalar.length;
  var stepX = (W-padL-padR)/(n-1 || 1);
  function px(i){ return padL + i*stepX; }
  function py(v){ return H-padB - (v-min)/(max-min)*(H-padT-padB); }

  // Dolgu alanı
  ctx.beginPath();
  ctx.moveTo(px(0), H-padB);
  noktalar.forEach(function(nt,i){ ctx.lineTo(px(i), py(nt.deger)); });
  ctx.lineTo(px(n-1), H-padB);
  ctx.closePath();
  ctx.fillStyle = dolguRenk;
  ctx.fill();

  // Çizgi
  ctx.beginPath();
  noktalar.forEach(function(nt,i){
    var x=px(i), y=py(nt.deger);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.strokeStyle = cizgiRenk;
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Noktalar + değer + ay etiketi
  ctx.textAlign = "center";
  noktalar.forEach(function(nt,i){
    var x=px(i), y=py(nt.deger);
    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle = cizgiRenk;
    ctx.fill();
    // değer (sadece sıfır değilse ve yer varsa)
    if(nt.deger>0) {
      ctx.fillStyle = "#f2f2f7";
      ctx.font = "bold 11px -apple-system,Segoe UI,Arial";
      ctx.fillText(nt.deger>=1000?(Math.round(nt.deger/100)/10)+"k":nt.deger, x, y-7);
    }
    // ay etiketi
    ctx.fillStyle = "#8fa3c4";
    ctx.font = "600 11px -apple-system,Segoe UI,Arial";
    ctx.fillText(nt.label, x, H-7);
  });
}

  var isler = dönem(DB.isler||[], "tarih");

  // Hesaplar
  var tKm = seferler.reduce(function(a,s){ return a+(s.km_fark||0); },0);
  var tSefer = seferler.length;
  var tYuk = seferler.reduce(function(a,s){ return a+(parseFloat(s.yuk_miktari)||0); },0);
  var yakitTutar = yakitlar.reduce(function(a,y){ return a+(y.tutar||0); },0);
  var yakitLitre = yakitlar.reduce(function(a,y){ return a+(y.litre||0); },0);
  var nakTutar = nakliyeler.reduce(function(a,n){ return a+(n.fiyat||0); },0);
  var bakTutar = bakimlar.reduce(function(a,b){ return a+(b.maliyet||0); },0);
  var toplamMaliyet = yakitTutar+nakTutar+bakTutar;
  var mesaiSaat = Math.round(mesailer.reduce(function(a,m){ return a+(m.sure_dakika||0); },0)/60);
  var aracTlKmListE = (DB.araclar||[]).map(function(a){ return aracTlKm(a.plaka, "tumu"); }).filter(function(v){ return v>0; });
  var kmBirim = aracTlKmListE.length>0 ? aracTlKmListE.reduce(function(s,v){return s+v;},0)/aracTlKmListE.length : 0;
  var isTamam = isler.filter(function(i){ return i.durum==="Tamamlandı"; }).length;
  var isOlmadi = isler.filter(function(i){ return i.durum==="Tamamlanamadı"; }).length;
  var planUyum = (isTamam+isOlmadi)>0 ? Math.round(isTamam/(isTamam+isOlmadi)*100) : null;
  var isKazasi = (window.KPI_DASH&&window.KPI_DASH.isKazasi)||"";

  // Araç & şoför km
  var aracKm={}, soforKm={};
  seferler.forEach(function(s){
    if(s.plaka) aracKm[s.plaka]=(aracKm[s.plaka]||0)+(s.km_fark||0);
    if(s.sofor) soforKm[s.sofor]=(soforKm[s.sofor]||0)+(s.km_fark||0);
  });

  var donemAd = filtreMod==="bugun"?"Bugün":filtreMod==="hafta"?"Bu Hafta":filtreMod==="ay"?"Bu Ay":filtreMod==="yil"?"Bu Yıl":"Tüm Zamanlar";
  var bugun = new Date();
  function trT(s){ if(!s) return ""; var p=String(s).split("-"); return p.length===3?p[2]+"."+p[1]+"."+p[0]:s; }
  var raporTarih = String(bugun.getDate()).padStart(2,"0")+"."+String(bugun.getMonth()+1).padStart(2,"0")+"."+bugun.getFullYear();
  var donemMetni = bas ? (trT(bas)+" — "+trT(bit)) : "Tüm Kayıtlar";

  // Renkler
  var KOYU="FF0F2147", LACIVERT="FF15233D", BEYAZ="FFFFFFFF", ACIK="FF8FA3C4", SARI="FFFFD700", GRI="FFF2F2F2";
  var ince={style:"thin",color:{argb:"FFBFBFBF"}};
  function num(c,fmt){ c.numFmt=fmt; }

  // ── Dashboard için veri paketi hazırla ──
  var palet = ["#7e57c2","#26a69a","#42a5f5","#ab47bc","#ffa726","#66bb6a","#ef5350","#4dd0e1"];
  var aKeys=Object.keys(aracKm).sort(function(a,b){return aracKm[b]-aracKm[a];});
  var sKeys=Object.keys(soforKm).sort(function(a,b){return soforKm[b]-soforKm[a];});
  var nakGrup={}; nakliyeler.forEach(function(n){ var k=n.sevk_adresi||"Diğer"; nakGrup[k]=(nakGrup[k]||0)+(n.fiyat||0); });
  var dashVeri = {
    donemMetni: donemAd+" ("+donemMetni+")",
    tSefer: tSefer, tYuk: tYuk, tKm: tKm,
    yakitTutar: yakitTutar, bakTutar: bakTutar, nakTutar: nakTutar,
    maliyetVeri: [{etiket:"Yakıt",deger:yakitTutar},{etiket:"Nakliye",deger:nakTutar},{etiket:"Bakım",deger:bakTutar}].filter(function(z){return z.deger>0;}),
    kmSeri: aylikSeri("km",12),
    yakitSeri: aylikSeri("yakit",12),
    isVeri: [{etiket:"Tamamlandı",deger:isTamam},{etiket:"Tamamlanamadı",deger:isOlmadi},{etiket:"Bekliyor",deger:isler.filter(function(i){return !i.durum||i.durum==="Bekliyor";}).length}].filter(function(z){return z.deger>0;}),
    aracVeri: aKeys.map(function(p){return {etiket:p,deger:aracKm[p]};}),
    soforVeri: sKeys.map(function(p){return {etiket:p,deger:soforKm[p]};}),
    nakliyeVeri: Object.keys(nakGrup).map(function(k){return {etiket:k,deger:nakGrup[k]};}).sort(function(a,b){return b.deger-a.deger;})
  };

  // ── Dashboard'ı tek resim olarak çiz ──
  var dashPng = dashboardResimCiz(dashVeri);

  var wb = new ExcelJS.Workbook();
  var ws = wb.addWorksheet("KPI Dashboard", {views:[{showGridLines:false}]});
  // Resmi sayfaya tam genişlikte göm
  try {
    var imgId = wb.addImage({base64: dashPng.split(",")[1], extension:"png"});
    ws.addImage(imgId, {tl:{col:0,row:0}, ext:{width:1320, height:760}});
    var buffer = await wb.xlsx.writeBuffer();
    var blob = new Blob([buffer],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "KPI_Raporu_"+bugun.getFullYear()+"-"+String(bugun.getMonth()+1).padStart(2,"0")+"-"+String(bugun.getDate()).padStart(2,"0")+".xlsx";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
    showToast("KPI raporu indirildi!");
  } catch(e) {
    showToast("Hata: "+(e.message||"rapor oluşturulamadı"),"error");
  }
}

// ═══════════ TEK PARÇA DASHBOARD ÇİZİMİ (Excel'e gömmek için) ═══════════
function dashboardResimCiz(d) {
  // d: tüm hesaplanmış veriler
  var W=1320, H=760;
  var cv=document.createElement("canvas"); cv.width=W; cv.height=H;
  document.body.appendChild(cv);
  var x=cv.getContext("2d");

  // Arka plan
  x.fillStyle="#f4f2f9"; x.fillRect(0,0,W,H);

  // ── Yardımcılar ──
  function rrect(px,py,pw,ph,r,renk){ x.fillStyle=renk; x.beginPath(); x.moveTo(px+r,py); x.arcTo(px+pw,py,px+pw,py+ph,r); x.arcTo(px+pw,py+ph,px,py+ph,r); x.arcTo(px,py+ph,px,py,r); x.arcTo(px,py,px+pw,py,r); x.closePath(); x.fill(); }
  function panel(px,py,pw,ph,baslik){ rrect(px,py,pw,ph,10,"#ffffff"); x.fillStyle="#5a3d8a"; x.font="bold 14px Arial"; x.textAlign="left"; x.textBaseline="top"; x.fillText(baslik,px+14,py+12); }
  function donut(cx,cy,r,veriler,renkler,lejX,lejY){
    var top=veriler.reduce(function(a,v){return a+v.deger;},0); if(top===0){ x.fillStyle="#999"; x.textAlign="center"; x.fillText("veri yok",cx,cy); return; }
    var a=-Math.PI/2;
    veriler.forEach(function(v,i){ var dd=v.deger/top*Math.PI*2; x.beginPath(); x.moveTo(cx,cy); x.arc(cx,cy,r,a,a+dd); x.closePath(); x.fillStyle=renkler[i%renkler.length]; x.fill(); x.strokeStyle="#fff"; x.lineWidth=2; x.stroke();
      var mid=a+dd/2, yz=Math.round(v.deger/top*100); if(yz>=5){ x.fillStyle="#fff"; x.font="bold 12px Arial"; x.textAlign="center"; x.textBaseline="middle"; x.fillText(yz+"%",cx+Math.cos(mid)*r*0.7,cy+Math.sin(mid)*r*0.7); } a+=dd; });
    x.fillStyle="#fff"; x.beginPath(); x.arc(cx,cy,r*0.55,0,Math.PI*2); x.fill();
    // lejant
    var ly=lejY; x.textAlign="left"; x.textBaseline="middle"; x.font="12px Arial";
    veriler.forEach(function(v,i){ x.fillStyle=renkler[i%renkler.length]; x.fillRect(lejX,ly,12,12); x.fillStyle="#333"; x.fillText(v.etiket,lejX+18,ly+6); ly+=22; });
  }
  function cizgi(px,py,pw,ph,noktalar,renk){
    if(!noktalar.length) return; var pad=30, max=Math.max.apply(null,noktalar.map(function(n){return n.deger;}))||1;
    var n=noktalar.length, sx=(pw-pad*2)/(n-1||1);
    function gx(i){return px+pad+i*sx;} function gy(v){return py+ph-pad-(v/max)*(ph-pad*1.6);}
    // alan
    x.beginPath(); x.moveTo(gx(0),py+ph-pad); noktalar.forEach(function(nt,i){ x.lineTo(gx(i),gy(nt.deger)); }); x.lineTo(gx(n-1),py+ph-pad); x.closePath(); x.fillStyle=renk+"33"; x.fill();
    x.beginPath(); noktalar.forEach(function(nt,i){ i===0?x.moveTo(gx(i),gy(nt.deger)):x.lineTo(gx(i),gy(nt.deger)); }); x.strokeStyle=renk; x.lineWidth=2.5; x.stroke();
    noktalar.forEach(function(nt,i){ x.fillStyle=renk; x.beginPath(); x.arc(gx(i),gy(nt.deger),3,0,Math.PI*2); x.fill();
      x.fillStyle="#333"; x.font="9px Arial"; x.textAlign="center"; x.textBaseline="bottom"; if(nt.deger>0) x.fillText(nt.deger>=1000?(nt.deger/1000).toFixed(1)+"k":nt.deger,gx(i),gy(nt.deger)-4);
      x.fillStyle="#999"; x.textBaseline="top"; x.fillText(nt.label,gx(i),py+ph-pad+5); });
  }
  function yatayBar(px,py,pw,ph,veriler,renk){
    veriler=veriler.slice(0,6); if(!veriler.length){ x.fillStyle="#999"; x.textAlign="center"; x.fillText("veri yok",px+pw/2,py+ph/2); return; }
    var max=Math.max.apply(null,veriler.map(function(v){return v.deger;}))||1, n=veriler.length;
    var gap=(ph-20)/n, bh=gap*0.6, lblW=90;
    veriler.forEach(function(v,i){ var yy=py+15+i*gap; x.fillStyle="#555"; x.font="11px Arial"; x.textAlign="left"; x.textBaseline="middle"; x.fillText(String(v.etiket).slice(0,12),px+8,yy+bh/2);
      var bw=(v.deger/max)*(pw-lblW-50); x.fillStyle=renk; rrect(px+lblW,yy,bw,bh,3,renk);
      x.fillStyle="#333"; x.textAlign="left"; x.fillText(v.deger.toLocaleString("tr-TR"),px+lblW+bw+6,yy+bh/2); });
  }
  function kpiKart(px,py,pw,ph,renk,ust,buyuk){ rrect(px,py,pw,ph,8,renk); x.fillStyle="rgba(255,255,255,0.9)"; x.font="bold 12px Arial"; x.textAlign="left"; x.textBaseline="top"; x.fillText(ust,px+16,py+14); x.fillStyle="#fff"; x.font="bold 22px Arial"; x.fillText(buyuk,px+16,py+34); }

  // ── BAŞLIK ŞERİDİ ──
  rrect(20,20,W-40,70,8,"#4a2d7a");
  x.fillStyle="#fff"; x.font="bold 30px Arial"; x.textAlign="left"; x.textBaseline="middle"; x.fillText("KÜÇÜKER LOJİSTİK — KPI DASHBOARD",50,55);
  x.font="13px Arial"; x.textAlign="right"; x.fillText(d.donemMetni,W-50,55);

  // ── SOL GRID (3 sütun x 3 satır benzeri) + SAĞ KPI kartları ──
  var gx0=20, gy0=105, kartW=270, solW=W-40-kartW-15;
  var col=(solW-30)/3, rowH=195;

  // Satır 1: Maliyet donut, Aylık KM çizgi (2 birim), 
  panel(gx0, gy0, col, rowH, "Maliyet Kırılımı");
  donut(gx0+col*0.32, gy0+rowH/2+10, 55, d.maliyetVeri, ["#7e57c2","#26a69a","#ab47bc"], gx0+col*0.62, gy0+rowH/2-15);
  panel(gx0+col+15, gy0, col*2+15, rowH, "Aylık KM (Son 12 Ay)");
  cizgi(gx0+col+15, gy0+25, col*2+15, rowH-30, d.kmSeri, "#7e57c2");

  // Satır 2: Aylık Yakıt çizgi (2 birim), İş Durumu donut
  var gy1=gy0+rowH+15;
  panel(gx0, gy1, col*2+15, rowH, "Aylık Yakıt Maliyeti (Son 12 Ay)");
  cizgi(gx0, gy1+25, col*2+15, rowH-30, d.yakitSeri, "#26a69a");
  panel(gx0+col*2+30, gy1, col, rowH, "İş Durumu");
  donut(gx0+col*2+30+col*0.32, gy1+rowH/2+10, 55, d.isVeri, ["#66bb6a","#ef5350","#ffa726"], gx0+col*2+30+col*0.6, gy1+rowH/2-15);

  // Satır 3: Araç KM bar, Şoför KM bar, Nakliye bar
  var gy2=gy1+rowH+15;
  panel(gx0, gy2, col, rowH, "Araç Bazlı KM");
  yatayBar(gx0, gy2+30, col, rowH-35, d.aracVeri, "#42a5f5");
  panel(gx0+col+15, gy2, col, rowH, "Şoför Bazlı KM");
  yatayBar(gx0+col+15, gy2+30, col, rowH-35, d.soforVeri, "#7e57c2");
  panel(gx0+col*2+30, gy2, col, rowH, "Sevk Adresine Göre Nakliye");
  yatayBar(gx0+col*2+30, gy2+30, col, rowH-35, d.nakliyeVeri, "#ab47bc");

  // ── SAĞ KPI KARTLARI (6 adet) ──
  var kx=W-20-kartW, ky=gy0, kh=(rowH*3+30-50)/6, gap=10;
  var kartlar=[
    {renk:"#26a69a", ust:"🚛 TOPLAM SEFER", val:d.tSefer.toLocaleString("tr-TR")},
    {renk:"#4dd0e1", ust:"📦 TOPLAM KG", val:d.tYuk.toLocaleString("tr-TR")},
    {renk:"#42a5f5", ust:"🛣️ TOPLAM KM", val:d.tKm.toLocaleString("tr-TR")},
    {renk:"#7e57c2", ust:"⛽ YAKIT MALİYETİ", val:d.yakitTutar.toLocaleString("tr-TR")+" TL"},
    {renk:"#5e35b1", ust:"🔧 BAKIM MALİYETİ", val:d.bakTutar.toLocaleString("tr-TR")+" TL"},
    {renk:"#ab47bc", ust:"🚚 NAKLİYE MALİYETİ", val:d.nakTutar.toLocaleString("tr-TR")+" TL"}
  ];
  kartlar.forEach(function(k,i){ kpiKart(kx, ky+i*(kh+gap), kartW, kh, k.renk, k.ust, k.val); });

  var url=cv.toDataURL("image/png");
  document.body.removeChild(cv);
  return url;
}

function cizPastaGrafik(canvasId, legendId, veriler, renkler) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  const toplam = veriler.reduce((a,v)=>a+v.deger,0);
  if(toplam===0) return;
  // Keskin çizim için HiDPI ölçekleme
  var dpr = window.devicePixelRatio || 1;
  var cssW = canvas.clientWidth || canvas.width;
  var cssH = canvas.clientHeight || canvas.height;
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const cx = cssW/2, cy = cssH/2, r = Math.min(cssW,cssH)/2 - 2;

  ctx.clearRect(0,0,cssW,cssH);
  let aci = -Math.PI/2;
  var dilimAcilari = [];
  veriler.forEach((v,i) => {
    const dilim = (v.deger/toplam) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,aci,aci+dilim);
    ctx.closePath();
    ctx.fillStyle = renkler[i%renkler.length];
    ctx.fill();
    ctx.strokeStyle = "#1c1c1e";
    ctx.lineWidth = 2;
    ctx.stroke();
    dilimAcilari.push({orta: aci + dilim/2, yuzde: v.yuzde});
    aci += dilim;
  });

  // Ortada boşluk (donut efekti) - transparan, her zemine uyumlu
  ctx.save();
  ctx.globalCompositeOperation = "destination-out";
  ctx.beginPath();
  ctx.arc(cx,cy,r*0.55,0,Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Dilim üzerine yüzde yazıları (görseldeki gibi)
  var etiketR = r*0.78;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = "bold 13px -apple-system,Segoe UI,Arial";
  dilimAcilari.forEach(function(d){
    if(d.yuzde < 4) return; // çok küçük dilime yazma
    var x = cx + Math.cos(d.orta)*etiketR;
    var y = cy + Math.sin(d.orta)*etiketR;
    ctx.fillStyle = "#ffffff";
    ctx.fillText(d.yuzde+"%", x, y);
  });

  // Legend
  const leg = document.getElementById(legendId);
  if(leg) {
    leg.innerHTML = veriler.map((v,i)=>`
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
        <div style="width:10px;height:10px;border-radius:50%;background:${renkler[i%renkler.length]};flex-shrink:0"></div>
        <span style="color:#aeaeb2">${v.etiket}</span>
        <span style="color:#f2f2f7;font-weight:600;margin-left:auto">${v.yuzde}%</span>
      </div>`).join("");
  }
}

async function seferSil(id) {
  if(KUL.rol!=="admin") { showToast("Bu işlem için yetkiniz yok.","error"); return; }
  if(!confirm("Bu sefer kaydını silmek istediğinize emin misiniz? Bu işlem geri alınamaz.")) return;
  try {
    await seferSilDB(id);
    DB.tamamlananlar = DB.tamamlananlar.filter(function(s){ return s.id!==id; });
    showToast("Sefer kaydı silindi.");
    if(AKTIF_TAB==="harita") renderHarita(); else renderListe();
  } catch(e) {
    showToast("Silinemedi: "+(e.message||"hata"),"error");
  }
}
function listeTarihGuncelle(tip,v) { if(tip==="bas") FILTRE_BAS=v; else FILTRE_BIT=v; renderListe(); }
function listeHizliFiltre(gun) {
  if(gun===0) { FILTRE_BAS=""; FILTRE_BIT=""; }
  else if(gun===1) { FILTRE_BAS=new Date().toISOString().split("T")[0]; FILTRE_BIT=FILTRE_BAS; }
  else { FILTRE_BIT=new Date().toISOString().split("T")[0]; FILTRE_BAS=new Date(Date.now()-gun*24*60*60*1000).toISOString().split("T")[0]; }
  renderListe();
}

function renderHarita() {
  const tarihler = [...new Set(DB.tamamlananlar.map(s=>s.tarih))].sort((a,b)=>b.localeCompare(a));
  if(tarihler.length>0 && !tarihler.includes(FILTRE_HARITA_TARIH)) {
    FILTRE_HARITA_TARIH = tarihler[0];
  }

  setContent(`
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
      <span style="font-size:12px;color:#636366">Tarih:</span>
      <select onchange="haritaTarihGuncelle(this.value)" style="flex:1">
        ${tarihler.length===0?`<option value="${FILTRE_HARITA_TARIH}">${FILTRE_HARITA_TARIH}</option>`:""}
        ${tarihler.map(t=>`<option value="${t}" ${FILTRE_HARITA_TARIH===t?"selected":""}>${t}</option>`).join("")}
      </select>
    </div>
    <div class="card" style="padding:10px;display:flex;gap:16px;font-size:12px;color:#aeaeb2;margin-bottom:12px">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#ff453a;margin-right:5px"></span>Varış noktası</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#ff9f0a;margin-right:5px"></span>Fabrika</span>
    </div>
    <div id="map"></div>
    <div style="height:20px"></div>
  `);

  setTimeout(()=>haritaRender(), 100);
}

function haritaTarihGuncelle(t) { FILTRE_HARITA_TARIH=t; renderHarita(); }

function haritaRender() {
  const mapEl = document.getElementById("map");
  if(!mapEl) return;

  if(MAP_OBJ) { MAP_OBJ.remove(); MAP_OBJ=null; }
  MAP_OBJ = L.map("map").setView([DB.fabrika.lat, DB.fabrika.lng], 8);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(MAP_OBJ);

  // Fabrika
  L.marker([DB.fabrika.lat,DB.fabrika.lng],{icon:L.divIcon({
    html:`<div style="background:#ff9f0a;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>`,
    className:"",iconSize:[14,14],iconAnchor:[7,7]
  })}).bindPopup(`<b>🏭 ${DB.fabrika.isim}</b>`).addTo(MAP_OBJ);

  const seferler = DB.tamamlananlar.filter(s=>s.tarih===FILTRE_HARITA_TARIH);
  seferler.forEach(s=>{
    if(!s.varis_lat||!s.varis_lng) return;
    L.marker([s.varis_lat,s.varis_lng],{icon:L.divIcon({
      html:`<div style="background:#ff453a;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>`,
      className:"",iconSize:[14,14],iconAnchor:[7,7]
    })}).bindPopup(`<b>${s.varis_isim}</b><br>🧑‍✈️ ${s.sofor}<br>🛣️ ${s.km_fark} km<br>⏱️ ${formatSure(s.bekleme_dakika)}`).addTo(MAP_OBJ);
    L.polyline([[DB.fabrika.lat,DB.fabrika.lng],[s.varis_lat,s.varis_lng]],{color:"#ff453a",weight:2,opacity:.5,dashArray:"6,6"}).addTo(MAP_OBJ);
  });

  if(seferler.length>0) {
    const bounds = seferler.filter(s=>s.varis_lat).map(s=>[s.varis_lat,s.varis_lng]);
    bounds.push([DB.fabrika.lat,DB.fabrika.lng]);
    if(bounds.length>1) MAP_OBJ.fitBounds(bounds,{padding:[30,30]});
  }
}

async function konumEkle() {
  const isim=document.getElementById("yk-isim").value.trim();
  const adres=document.getElementById("yk-adres").value.trim();
  const lat=parseFloat(document.getElementById("yk-lat").value);
  const lng=parseFloat(document.getElementById("yk-lng").value);
  if(!isim){showToast("Konum adı zorunlu!","error");return;}
  try {
    const data = await konumEkleDB({isim,adres,lat:isNaN(lat)?null:lat,lng:isNaN(lng)?null:lng});
    DB.konumlar.push(Object.assign({}, data, {lat:data.lat!=null?parseFloat(data.lat):null, lng:data.lng!=null?parseFloat(data.lng):null}));

}

function litreFiyatiGuncelle() {
  // Bilgi satırını güncelle
  const fiyat = parseFloat(DB.litreFiyati)||0;
  const bilgiEl = document.getElementById("litre-fiyat-bilgi");
  if(bilgiEl) {
    if(fiyat>0) {
      bilgiEl.style.display="block";
      bilgiEl.innerHTML=`💡 1 litre = <strong style="color:#0a84ff">${fiyat.toFixed(2)} TL</strong>`;
    } else {
      bilgiEl.style.display="none";
    }
  }
  // Hesabı da güncelle
  yakitHesapla();
}

function yakitHesapla() {
  const litre = parseFloat(document.getElementById("y-litre")?.value)||0;
  const fiyat = parseFloat(DB.litreFiyati)||0;
  const el = document.getElementById("yakit-hesap");
  if(!el) return;
  if(litre>0) {
    el.style.display="block";
    el.innerHTML=`<div style="background:#1c1c1e;border-radius:8px;padding:10px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;margin-bottom:10px">
      <div><div style="color:#636366;font-size:10px;text-transform:uppercase;letter-spacing:1px">Alınan Yakıt</div>

      ${KUL.rol==="admin"&&fiyat>0?`<div><div style="color:#636366;font-size:10px;text-transform:uppercase;letter-spacing:1px">Toplam Tutar</div>
      <div style="color:#ff9f0a;font-weight:700;font-size:18px;margin-top:4px">${(litre*fiyat).toFixed(2)} TL</div></div>`:""}
    </div>`;
  } else el.style.display="none";
}

async function yakitKaydet() {
  const sofor=document.getElementById("y-sofor").value;
  const plaka=document.getElementById("y-plaka").value;
  const tarih=document.getElementById("y-tarih").value;
  const litre=parseFloat(document.getElementById("y-litre").value);
  if(!sofor||!plaka||!litre){showToast("Zorunlu alanları doldurun!","error");return;}
  const fiyat=parseFloat(DB.litreFiyati)||0;
  const simdi=new Date();
  // Eğer tarih bugün ise saati yaz, değilse boş bırak
  const bugunStr = bugunTR ? bugunTR() : simdi.toISOString().split("T")[0];
  const yeniYakit = {
    sofor, plaka, tarih, litre,
    tutar: fiyat>0?litre*fiyat:0,
    saat: tarih===bugunStr ? simdi.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}) : "",
    kaydeden: KUL.isim
  };
  try {
    const data = await yakitEkleDB(yeniYakit);
    DB.yakitlar.unshift({...yeniYakit, id: data.id});
  } catch(e) { DB.yakitlar.unshift({...yeniYakit, id: Date.now()}); }
  showToast("Yakıt kaydı eklendi!");
  renderYakit();
}

async function yakitSil(id) {
  try { await yakitSilDB(id); } catch(e) {}
  DB.yakitlar = DB.yakitlar.filter(function(y){ return y.id!==id; });
  showToast("Yakıt kaydı silindi.");
  renderYakitListe();
}

// ═══ GENEL LİSTE EXCEL AKTARMA (tüm listeler aynı formatta) ═══
async function listeExcel(baslik, sutunlar, satirlar, dosyaAdi) {
  if(!satirlar || satirlar.length===0) { showToast("Aktarılacak kayıt yok!","error"); return; }
  var bugun = new Date();
  function trT(s){ if(!s) return ""; var p=String(s).split("-"); return p.length===3?p[2]+"."+p[1]+"."+p[0]:s; }
  var raporTarih = String(bugun.getDate()).padStart(2,"0")+"."+String(bugun.getMonth()+1).padStart(2,"0")+"."+bugun.getFullYear();
  var KOYU="FF0F2147", BEYAZ="FFFFFFFF", SARI="FFFFD700", GRI="FFF2F2F2";
  var ince={style:"thin",color:{argb:"FFBFBFBF"}};
  var wb = new ExcelJS.Workbook();
  var ws = wb.addWorksheet(baslik.slice(0,30), {views:[{showGridLines:false}]});
  var KOL = sutunlar.length;
  ws.getColumn(1).width = 3;
  // Sütun genişlikleri (içeriğe göre)
  for(var c=0;c<KOL;c++){
    var enUzun = String(sutunlar[c]).length;
    satirlar.forEach(function(r){ var l=String(r[c]==null?"":r[c]).length; if(l>enUzun) enUzun=l; });
    ws.getColumn(2+c).width = Math.min(Math.max(enUzun+3, 10), 40);
  }
  var R=1;
  // Başlık şeridi
  ws.getRow(R).height=26; ws.mergeCells(R,2,R,1+KOL);
  var hc=ws.getCell(R,2); hc.value="KÜÇÜKER LOJİSTİK";
  hc.font={name:"Arial",bold:true,size:15,color:{argb:BEYAZ}}; hc.fill={type:"pattern",pattern:"solid",fgColor:{argb:KOYU}}; hc.alignment={horizontal:"left",vertical:"middle",indent:1}; R++;
  ws.getRow(R).height=20; ws.mergeCells(R,2,R,1+KOL);
  var h2=ws.getCell(R,2); h2.value=baslik.toUpperCase();
  h2.font={name:"Arial",bold:true,size:12,color:{argb:KOYU}}; h2.fill={type:"pattern",pattern:"solid",fgColor:{argb:SARI}}; h2.alignment={horizontal:"left",vertical:"middle",indent:1}; R++;
  ws.getRow(R).height=16; ws.mergeCells(R,2,R,1+KOL);
  var h3=ws.getCell(R,2); h3.value="Rapor Tarihi: "+raporTarih+"  •  Toplam "+satirlar.length+" kayıt";
  h3.font={name:"Arial",size:9,italic:true,color:{argb:"FF888888"}}; h3.alignment={horizontal:"left",indent:1}; R++;
  R++;
  // Tablo başlıkları
  ws.getRow(R).height=18;
  for(var ci=0;ci<KOL;ci++){
    var bc=ws.getCell(R,2+ci); bc.value=sutunlar[ci];
    bc.font={name:"Arial",bold:true,size:10,color:{argb:BEYAZ}}; bc.fill={type:"pattern",pattern:"solid",fgColor:{argb:KOYU}};
    bc.alignment={horizontal:"center",vertical:"middle"}; bc.border={top:ince,bottom:ince,left:ince,right:ince};
  }
  R++;
  // Satırlar
  satirlar.forEach(function(row, ri){
    for(var ci=0;ci<KOL;ci++){
      var dc=ws.getCell(R,2+ci);
      var hucre=row[ci];
      var baslik=(sutunlar[ci]||"").toLowerCase();
      var sayiSutun = baslik.indexOf("tl")>=0 || baslik.indexOf("fiyat")>=0 || baslik.indexOf("tutar")>=0 || baslik.indexOf("maliyet")>=0 || baslik.indexOf("km")>=0;
      if(sayiSutun && typeof hucre==="string" && /\d/.test(hucre)) {
        var sayi=parseFloat(hucre.replace(/\./g,"").replace(",","."));
        if(!isNaN(sayi)) { dc.value=sayi; dc.numFmt="#,##0"; } else dc.value=hucre;
      } else dc.value=hucre;
      dc.font={name:"Arial",size:10,color:{argb:"FF222222"}};
      if(ri%2===1) dc.fill={type:"pattern",pattern:"solid",fgColor:{argb:GRI}};
      dc.alignment={horizontal: ci===0?"center":"left", vertical:"middle", wrapText:true};
      dc.border={top:ince,bottom:ince,left:ince,right:ince};
    }
    R++;
  });
  try {
    var buffer = await wb.xlsx.writeBuffer();
    var blob = new Blob([buffer],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href=url; a.download=dosyaAdi+"_"+bugun.getFullYear()+"-"+String(bugun.getMonth()+1).padStart(2,"0")+"-"+String(bugun.getDate()).padStart(2,"0")+".xlsx";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
    showToast("Excel indirildi!");
  } catch(e){ showToast("Hata: "+(e.message||"oluşturulamadı"),"error"); }
}

async function yakitRaporExcel() {
  var fBas = window.YAKIT_FILTRE_BAS || "";
  var fBit = window.YAKIT_FILTRE_BIT || "";
  var liste = DB.yakitlar.slice();
  if(fBas) liste = liste.filter(function(y){ return y.tarih>=fBas; });
  if(fBit) liste = liste.filter(function(y){ return y.tarih<=fBit; });
  if(liste.length===0) { showToast("Aktarılacak kayıt yok!","error"); return; }

  // Tarihe göre sırala (eski → yeni)
  liste.sort(function(a,b){ return a.tarih.localeCompare(b.tarih) || (a.saat||"").localeCompare(b.saat||""); });

  var bugun = new Date();
  function trTarih(s){ if(!s) return ""; var p=String(s).split("-"); return p.length===3?p[2]+"."+p[1]+"."+p[0]:s; }
  var raporTarih = String(bugun.getDate()).padStart(2,"0")+"."+String(bugun.getMonth()+1).padStart(2,"0")+"."+bugun.getFullYear();
  var donemMetni = (fBas||fBit) ? ((fBas?trTarih(fBas):"Başlangıç")+" — "+(fBit?trTarih(fBit):"Bugün")) : "Tüm Kayıtlar";

  var toplamLitre = liste.reduce(function(a,y){ return a+(y.litre||0); },0);
  var toplamTutar = liste.reduce(function(a,y){ return a+(y.tutar||0); },0);
  var ortBirim = toplamLitre>0 ? toplamTutar/toplamLitre : 0;

  // Araç bazlı özet
  var arac = {};
  liste.forEach(function(y){
    if(!arac[y.plaka]) arac[y.plaka]={litre:0,tutar:0,adet:0};
    arac[y.plaka].litre+=y.litre||0; arac[y.plaka].tutar+=y.tutar||0; arac[y.plaka].adet++;
  });

  // Renkler
  var LACIVERT="FF15233D", KOYU="FF0F2147", BEYAZ="FFFFFFFF", ACIK="FF8FA3C4";
  var SARI="FFFFD700", GRI="FFF2F2F2", YESILZEMIN="FFE8F5E9";
  var ince={style:"thin",color:{argb:"FFBFBFBF"}};

  var wb = new ExcelJS.Workbook();
  var ws = wb.addWorksheet("Yakıt Raporu", {views:[{showGridLines:false}]});

  // Sütun genişlikleri: A boşluk, B-I veri — içeriğe göre otomatik hesapla
  ws.getColumn(1).width = 3;
  // Her sütun için başlık + tüm değerlerin en uzununu bul
  var basliklarG = ["No","Tarih","Şoför","Plaka","Litre","Tutar (TL)","TL/Litre","Kaydeden"];
  function uzunluk(v){ return String(v==null?"":v).length; }
  var kolonDeger = [
    liste.map(function(y,i){ return i+1; }),
    liste.map(function(y){ return trTarih(y.tarih)+(y.saat?" "+y.saat:""); }),
    liste.map(function(y){ return y.sofor||""; }),
    liste.map(function(y){ return y.plaka||""; }),
    liste.map(function(y){ return (y.litre||0).toLocaleString("tr-TR"); }),
    liste.map(function(y){ return (y.tutar||0).toLocaleString("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2}); }),
    liste.map(function(y){ return ((y.tutar&&y.litre)?(y.tutar/y.litre):0).toFixed(2); }),
    liste.map(function(y){ return y.kaydeden||""; })
  ];
  for(var ci=0; ci<basliklarG.length; ci++) {

    // B sütunu (ci=0) araç özet tablosunda "Plaka" da gösterdiği için plaka uzunluklarını da hesaba kat
    if(ci===0) {
      Object.keys(arac).forEach(function(p){ var l=uzunluk(p); if(l>enUzun) enUzun=l; });
      var phB = uzunluk("ARAÇ BAZLI ÖZET");
      // başlık merge edildiği için tek sütuna sığması gerekmez, sadece plaka önemli
    }
    // pay ekle (kenar boşluğu için +3), min 7, max 30
    ws.getColumn(ci+2).width = Math.min(30, Math.max(7, enUzun+3));
  }

  ws.getRow(1).height = 8;

  // ── Başlık şeridi (satır 2) ──
  ws.getRow(2).height = 38;
  ws.mergeCells(2,2,2,9);
  var bas = ws.getCell(2,2);
  bas.value = "KÜÇÜKER LOJİSTİK";

  alt.fill = {type:"pattern",pattern:"solid",fgColor:{argb:SARI}};
  alt.alignment = {horizontal:"center",vertical:"middle"};

  // Dönem + rapor tarihi (satır 4)
  ws.getRow(4).height = 18;
  ws.mergeCells(4,2,4,6);
  var d1 = ws.getCell(4,2);
  d1.value = "Dönem: "+donemMetni;
  d1.font = {name:"Arial",size:10,italic:true,color:{argb:"FF555555"}};

  d2.alignment = {horizontal:"right",vertical:"middle"};

  ws.getRow(5).height = 6;

  // ── Özet kutuları (satır 6-7) ──
  var ozet = [
    {b:"TOPLAM KAYIT", d:liste.length+" adet"},
    {b:"TOPLAM LİTRE", d:toplamLitre.toLocaleString("tr-TR")+" lt"},
    {b:"TOPLAM TUTAR", d:toplamTutar.toLocaleString("tr-TR")+" TL"},
    {b:"ORT. BİRİM", d:ortBirim.toLocaleString("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2})+" TL/lt"}
  ];
  ws.getRow(6).height = 22;
  ws.getRow(7).height = 24;
  // her kutu 2 sütun: B-C, D-E, F-G, H-I

  tLitreC.value = toplamLitre; tLitreC.numFmt = "#,##0";
  tLitreC.font = {name:"Arial",bold:true,size:11,color:{argb:KOYU}};
  tLitreC.fill = {type:"pattern",pattern:"solid",fgColor:{argb:SARI}};
  tLitreC.alignment = {horizontal:"center",vertical:"middle"};
  tLitreC.border = {top:{style:"medium"},bottom:{style:"medium"}};
  var tTutarC = ws.getCell(tRow,7);
  tTutarC.value = toplamTutar; tTutarC.numFmt = "#,##0.00";
  tTutarC.font = {name:"Arial",bold:true,size:11,color:{argb:KOYU}};
  tTutarC.fill = {type:"pattern",pattern:"solid",fgColor:{argb:SARI}};
  tTutarC.alignment = {horizontal:"center",vertical:"middle"};
  tTutarC.border = {top:{style:"medium"},bottom:{style:"medium"}};
  var tBirimC = ws.getCell(tRow,8);
  tBirimC.value = ortBirim; tBirimC.numFmt = "0.00";
  tBirimC.font = {name:"Arial",bold:true,size:11,color:{argb:KOYU}};
  tBirimC.fill = {type:"pattern",pattern:"solid",fgColor:{argb:SARI}};
  tBirimC.alignment = {horizontal:"center",vertical:"middle"};
  tBirimC.border = {top:{style:"medium"},bottom:{style:"medium"}};
  var tBosC = ws.getCell(tRow,9);
  tBosC.fill = {type:"pattern",pattern:"solid",fgColor:{argb:SARI}};
  tBosC.border = {top:{style:"medium"},bottom:{style:"medium"},right:{style:"medium"}};

  // ── Araç bazlı özet tablosu ──

  ws.mergeCells(aRow,2,aRow,5);
  var aBas = ws.getCell(aRow,2);
  aBas.value = "ARAÇ BAZLI ÖZET";
  aBas.font = {name:"Arial",bold:true,size:12,color:{argb:KOYU}};
  aBas.alignment = {horizontal:"left",vertical:"middle"};
  ws.getRow(aRow).height = 22;

  var aHRow = aRow+1;
  ws.getRow(aHRow).height = 20;
  ["Plaka","Kayıt","Litre","Tutar (TL)"].forEach(function(h,i){
    var c = ws.getCell(aHRow,i+2);
    c.value = h;
    c.font = {name:"Arial",bold:true,size:10,color:{argb:BEYAZ}};
    c.fill = {type:"pattern",pattern:"solid",fgColor:{argb:LACIVERT}};
    c.alignment = {horizontal:"center",vertical:"middle"};
    c.border = {top:ince,bottom:ince,left:ince,right:ince};
  });
  var aKeys = Object.keys(arac).sort(function(a,b){ return arac[b].tutar-arac[a].tutar; });
  aKeys.forEach(function(p,idx){
    var r = aHRow+1+idx;
    ws.getRow(r).height = 18;
    var vals = [p, arac[p].adet, arac[p].litre, arac[p].tutar];
    vals.forEach(function(val,i){
      var c = ws.getCell(r,i+2);
      c.value = val;
      c.font = {name:"Arial",size:10,color:{argb:"FF222222"}};
      c.alignment = {horizontal:i===0?"left":"center",vertical:"middle"};

    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
    showToast("Yakıt raporu indirildi!");

function yakitFiltre(tip,v) {
  if(tip==="bas") window.YAKIT_FILTRE_BAS=v; else window.YAKIT_FILTRE_BIT=v;
  renderYakitListe();
}
function yakitHizliFiltre(gun) {
  if(gun===0) { window.YAKIT_FILTRE_BAS=""; window.YAKIT_FILTRE_BIT=""; }
  else { window.YAKIT_FILTRE_BIT=bugunTR(); window.YAKIT_FILTRE_BAS=new Date(Date.now()-gun*86400000).toISOString().split("T")[0]; }
  renderYakitListe();
}

function renderBakim() {
  const bugun = new Date();
  const gecmis = DB.bakimlar.filter(b=>b.sonrakiTarih&&new Date(b.sonrakiTarih)<bugun);
  const yaklasan = DB.bakimlar.filter(b=>{
    if(!b.sonrakiTarih) return false;
    const fark=(new Date(b.sonrakiTarih)-bugun)/(1000*60*60*24);
    return fark<=30&&fark>=0;
  });

  var html = "";
  gecmis.forEach(b=>{
    html+=`<div class="warn-red"><span style="color:#ff453a;font-weight:700">🚨 VADESİ GEÇMİŞ: </span><span>${b.plaka} — ${b.tur} (${b.sonrakiTarih})</span></div>`;
  });
  yaklasan.forEach(b=>{
    const fark=Math.ceil((new Date(b.sonrakiTarih)-bugun)/(1000*60*60*24));
    html+=`<div class="warn-orange"><span style="color:#ff9f0a;font-weight:700">⚠️ ${fark} GÜN KALDI: </span><span>${b.plaka} — ${b.tur} (${b.sonrakiTarih})</span></div>`;
  });

  html+=`<div class="card">
    <div class="section-title">Yeni Bakım Kaydı</div>
    <div class="row" style="margin-bottom:10px">
      <div class="field"><label>Plaka *</label><select id="b-plaka"><option value="">Seçin...</option>${DB.araclar.map(a=>"<option>"+a.plaka+"</option>").join("")}</select></div>
      <div class="field"><label>Bakım Türü *</label><select id="b-tur"><option value="">Seçin...</option>${BAKIM_TURLERI.map(t=>"<option>"+t+"</option>").join("")}</select></div>
    </div>
    <div class="row" style="margin-bottom:10px">
      <div class="field"><label>Yapıldığı Tarih *</label><input type="date" id="b-tarih" value="${new Date().toISOString().split("T")[0]}"/></div>
      <div class="field"><label>Sonraki Tarih</label><input type="date" id="b-sonraki"/></div>
    </div>
    <div class="row" style="margin-bottom:10px">
      <div class="field"><label>KM</label><input type="number" id="b-km" placeholder="125000"/></div>
      <div class="field"><label>Maliyet (TL)</label><input type="number" id="b-maliyet" placeholder="1500"/></div>
    </div>
    <div class="field" style="margin-bottom:10px"><label>Not</label><input type="text" id="b-not" placeholder="Ek bilgi..."/></div>
    <button class="btn btn-green" onclick="bakimKaydet()">+ Bakım Kaydı Ekle</button>
  </div>`;

  html+=`<div style="height:20px"></div>`;
  setContent(html);
}

function renderBakimListe() {
  const bugun = new Date();
  var html = "";

  if(DB.araclar.length>0) {
    html+=`<div class="card"><div class="section-title">Araç Bakım Durumu</div>`;
    DB.araclar.forEach(a=>{
      const ab = DB.bakimlar.filter(b=>b.plaka===a.plaka);
      html+=`<div style="background:#1c1c1e;border-radius:10px;padding:12px 14px;border:1px solid #48484a;margin-bottom:8px">
        <div style="font-weight:700;font-size:14px;margin-bottom:8px">🚗 ${a.plaka}</div>
        <div class="arac-durum-grid">`;
      BAKIM_TURLERI.forEach(tur=>{
        const son = ab.filter(b=>b.tur===tur).sort((a,b)=>b.tarih.localeCompare(a.tarih))[0];
        let renk="#636366", durum="Kayıt yok";
        if(son){
          durum=son.sonrakiTarih||son.tarih;
          if(son.sonrakiTarih){
            const fark=(new Date(son.sonrakiTarih)-bugun)/(1000*60*60*24);
            renk=fark<0?"#ff453a":fark<=30?"#ff9f0a":"#30d158";
          }
        }
        html+=`<div class="durum-item"><div class="durum-tur">${tur}</div><div class="durum-val" style="color:${renk}">${durum}</div></div>`;
      });
      html+=`</div></div>`;
    });
    html+=`</div>`;
  }

  if(DB.bakimlar.length>0) {
    html+=`<div class="card"><div class="section-title">Bakım Geçmişi (${DB.bakimlar.length})</div>`;
    if(KUL.rol==="admin" && DB.bakimlar.length>0) html+=`<div style="margin-bottom:12px"><button class="btn btn-green" onclick="bakimExcel()">📥 Excel'e Aktar</button></div>`;
    DB.bakimlar.forEach(b=>{
      const gec=b.sonrakiTarih&&new Date(b.sonrakiTarih)<bugun;
      const yak=b.sonrakiTarih&&!gec&&(new Date(b.sonrakiTarih)-bugun)/(1000*60*60*24)<=30;
      html+=`<div style="background:#1c1c1e;border-radius:8px;padding:10px 12px;border:1px solid ${gec?"#ff453a":yak?"#ff9f0a":"#48484a"};margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <div>
            <span style="font-weight:700;font-size:14px">${b.plaka}</span>
            <span style="margin-left:8px;background:#2c2c2e;border:1px solid #48484a;border-radius:6px;padding:2px 8px;font-size:11px;color:#aeaeb2">${b.tur}</span>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            ${b.maliyet>0?`<span class="badge badge-orange">${b.maliyet.toLocaleString()} TL</span>`:""}
            <button onclick="bakimSil(${b.id})" style="background:none;color:#ff453a;font-size:16px;padding:0;border:none;cursor:pointer">🗑️</button>
          </div>
        </div>
        <div style="font-size:11px;color:#636366;display:flex;gap:12px;flex-wrap:wrap">
          <span>📅 ${b.tarih}</span>
          ${b.sonrakiTarih?`<span style="color:${gec?"#ff453a":yak?"#ff9f0a":"#636366"}">⏭️ ${b.sonrakiTarih}${gec?" 🚨":yak?" ⚠️":""}</span>`:""}
          ${b.km>0?`<span>🛣️ ${b.km.toLocaleString()} km</span>`:""}
          ${b.not?`<span>💬 ${b.not}</span>`:""}
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  if(DB.araclar.length===0 && DB.bakimlar.length===0) {
    html+=`<div class="empty"><div class="empty-icon">🔧</div>Henüz bakım kaydı yok.</div>`;
  }

  html+=`<div style="height:20px"></div>`;
  setContent(html);
}
async function bakimKaydet() {
  const plaka=document.getElementById("b-plaka").value;
  const tur=document.getElementById("b-tur").value;
  const tarih=document.getElementById("b-tarih").value;
  const sonraki=document.getElementById("b-sonraki").value;
  const km=document.getElementById("b-km").value;
  const maliyet=document.getElementById("b-maliyet").value;
  const not=document.getElementById("b-not").value;
  if(!plaka||!tur||!tarih){showToast("Zorunlu alanları doldurun!","error");return;}
  const yeniBakim = {plaka,tur,tarih,sonrakiTarih:sonraki,km:km?parseInt(km):0,maliyet:maliyet?parseFloat(maliyet):0,not};
  try {
    const data = await bakimEkleDB(yeniBakim);
    DB.bakimlar.unshift({...yeniBakim, id: data.id});
  } catch(e) { DB.bakimlar.unshift({...yeniBakim, id: Date.now()}); }
  showToast("Bakım kaydı eklendi!");
  if(AKTIF_TAB==="bakimliste") renderBakimListe(); else renderBakim();
}

async function bakimSil(id) {
  try { await bakimSilDB(id); } catch(e) {}
  DB.bakimlar=DB.bakimlar.filter(b=>b.id!==id);
  showToast("Silindi.");
  if(AKTIF_TAB==="bakim") renderBakim(); else renderBakimListe();
}

async function tumVeriYedekle() {
  showToast("Yedek hazırlanıyor...");
  var wb = new ExcelJS.Workbook();
  var KOYU="FF0F2147", BEYAZ="FFFFFFFF";
  var ince={style:"thin",color:{argb:"FFBFBFBF"}};
  function sayfaEkle(ad, basliklar, satirlar) {
    var ws = wb.addWorksheet(ad.slice(0,30), {views:[{showGridLines:false}]});
    basliklar.forEach(function(b,i){
      ws.getColumn(i+1).width = 18;
      var c=ws.getCell(1,i+1); c.value=b;
      c.font={name:"Arial",bold:true,size:10,color:{argb:BEYAZ}};
      c.fill={type:"pattern",pattern:"solid",fgColor:{argb:KOYU}};
      c.alignment={horizontal:"center"}; c.border={top:ince,bottom:ince,left:ince,right:ince};
    });
    satirlar.forEach(function(row,ri){
      row.forEach(function(v,ci){
        var c=ws.getCell(ri+2,ci+1); c.value=v;
        c.font={name:"Arial",size:10}; c.alignment={vertical:"middle",wrapText:true};
        c.border={top:ince,bottom:ince,left:ince,right:ince};
      });
    });
  }
  // Her tablo
  sayfaEkle("Seferler", ["Tarih","Şoför","Plaka","Çıkış","Varış","KM","Yük","Birim","Tür","Bekleme(dk)","Durum"],
    (DB.tamamlananlar||[]).map(function(s){return [s.tarih,s.sofor,s.plaka,s.cikis_isim,s.varis_isim,s.km_fark,s.yuk_miktari,s.yuk_birimi,s.yuk_turu,s.bekleme_dakika,s.durum];}));
  sayfaEkle("Yakit", ["Tarih","Saat","Şoför","Plaka","Litre","Tutar","Kaydeden"],
    (DB.yakitlar||[]).map(function(y){return [y.tarih,y.saat,y.sofor,y.plaka,y.litre,y.tutar,y.kaydeden];}));
  sayfaEkle("Bakim", ["Tarih","Plaka","Tür","Sonraki Tarih","KM","Maliyet","Açıklama"],
    (DB.bakimlar||[]).map(function(b){return [b.tarih,b.plaka,b.tur,b.sonraki_tarih,b.km,b.maliyet,b.not||b.aciklama];}));
  sayfaEkle("Nakliye", ["Tarih","Sevk Adresi","Fiyat","Açıklama"],
    (DB.nakliyeler||[]).map(function(n){return [n.tarih,n.sevk_adresi,n.fiyat,n.aciklama];}));

function excHizliFiltre(gun) {
  const bas = document.getElementById("exc-bas");
  const bit = document.getElementById("exc-bit");
  if(!bas||!bit) return;
  bit.value = new Date().toISOString().split("T")[0];
  bas.value = new Date(Date.now()-gun*24*60*60*1000).toISOString().split("T")[0];
  excOnizlemeGuncelle();
}

function excOnizlemeGuncelle() {
  const bas = document.getElementById("exc-bas")?.value;
  const bit = document.getElementById("exc-bit")?.value;
  if(!bas||!bit) return;

  const seferler = DB.tamamlananlar.filter(s=>s.tarih>=bas&&s.tarih<=bit);
  const yakitlar = DB.yakitlar.filter(y=>y.tarih>=bas&&y.tarih<=bit);
  const bakimlar = DB.bakimlar.filter(b=>b.tarih>=bas&&b.tarih<=bit);

  const el = document.getElementById("exc-onizleme");
  if(!el) return;
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div class="kpi-card"><div class="kpi-icon">🚛</div><div class="kpi-val" style="color:#0a84ff">${seferler.length}</div><div class="kpi-unit">kayıt</div><div class="kpi-label">Sefer</div></div>

    s = s.replace(/"/g, '""');
    return '"' + s + '"';
  }).join(",") + "\r\n";
}

const SUPA_URL = "https://xwqaloxiebliccrjmgyo.supabase.co";
const SUPA_KEY = "sb_publishable_BLp6PmrBVk2SJOVzwb0eDA_wsR3lpcX";

// Supabase REST API - CDN gerektirmez
const supa = {
  from: function(table) {
    return new SupaQuery(table);
  }
};

class SupaQuery {
  constructor(table) {
    this.table = table;
    this._filters = [];
    this._order = null;
    this._limit = null;
    this._single = false;
    this._select = '*';
    this._insertData = null;
    this._updateData = null;
    this._deleteMode = false;
  }
  select(s) { this._select = s||'*'; return this; }
  eq(col, val) { this._filters.push({col, val, op:'eq'}); return this; }
  order(col, opts) { this._order = {col, asc: opts&&opts.ascending!==false?true:false}; return this; }
  limit(n) { this._limit = n; return this; }
  single() { this._single = true; return this; }
  insert(data) { this._insertData = data; return this; }
  update(data) { this._updateData = data; return this; }
  delete() { this._deleteMode = true; return this; }

  async _exec() {
    let url = SUPA_URL + '/rest/v1/' + this.table + '?select=' + this._select;
    this._filters.forEach(f => { url += '&' + f.col + '=eq.' + encodeURIComponent(f.val); });
    if(this._order) url += '&order=' + this._order.col + (this._order.asc?'.asc':'.desc');
    if(this._limit) url += '&limit=' + this._limit;

    const headers = {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': this._single ? 'return=representation' : 'return=representation'
    };

    let method = 'GET';
    let body = null;

    if(this._insertData) {
      method = 'POST';
      body = JSON.stringify(this._insertData);
      headers['Prefer'] = 'return=representation';
      url = SUPA_URL + '/rest/v1/' + this.table;
    } else if(this._updateData) {
      method = 'PATCH';
      body = JSON.stringify(this._updateData);
      headers['Prefer'] = 'return=representation';
      url = SUPA_URL + '/rest/v1/' + this.table;
      this._filters.forEach(f => { url += (url.includes('?')?'&':'?') + f.col + '=eq.' + encodeURIComponent(f.val); });
    } else if(this._deleteMode) {
      method = 'DELETE';
      url = SUPA_URL + '/rest/v1/' + this.table;
      this._filters.forEach(f => { url += (url.includes('?')?'&':'?') + f.col + '=eq.' + encodeURIComponent(f.val); });
    }

    try {
      const res = await fetch(url, {method, headers, body});
      const data = await res.json();
      if(!res.ok) return {data: null, error: data};
      if(this._single) return {data: Array.isArray(data)?data[0]:data, error: null};
      return {data, error: null};
    } catch(e) {
      return {data: null, error: e};
    }
  }

  then(resolve, reject) { return this._exec().then(resolve, reject); }
}

async function dbYukle() {
  try {
    const [soforler, araclar, konumlar, fabrikaRes, aktif, tamamlanan, yakitlar, bakimlar, isler, ayarlar, mesailer, talepler, nakliyeler] = await Promise.all([
      supa.from('soforler').select('*').order('isim'),
      supa.from('araclar').select('*').order('plaka'),
      supa.from('konumlar').select('*').order('isim'),
      supa.from('fabrika').select('*').limit(1).single(),
      supa.from('seferler').select('*').eq('durum','aktif'),
      supa.from('seferler').select('*').eq('durum','tamamlandi').order('created_at', {ascending:false}),
      supa.from('yakitlar').select('*').order('tarih', {ascending:false}),
      supa.from('bakimlar').select('*').order('tarih', {ascending:false}),
      supa.from('isler').select('*').order('tarih', {ascending:false}),
      supa.from('ayarlar').select('*'),
      supa.from('mesailer').select('*').order('tarih', {ascending:false}),
      supa.from('talepler').select('*').order('created_at', {ascending:false}),
      supa.from('nakliyeler').select('*').order('tarih', {ascending:false}),
    ]);
    if(soforler.data) DB.soforler = soforler.data;
    if(araclar.data) DB.araclar = araclar.data;
    if(konumlar.data) DB.konumlar = konumlar.data.map(function(k){ return Object.assign({}, k, {lat:parseFloat(k.lat), lng:parseFloat(k.lng)}); });
    if(fabrikaRes.data) DB.fabrika = fabrikaRes.data;
    if(aktif.data) DB.aktifSeferler = aktif.data.map(seferDBdenJS);
    if(tamamlanan.data) DB.tamamlananlar = tamamlanan.data.map(seferDBdenJS);
    if(yakitlar.data) DB.yakitlar = yakitlar.data;
    if(bakimlar.data) DB.bakimlar = bakimlar.data.map(bakimDBdenJS);
    if(isler.data) DB.isler = isler.data.map(isDBdenJS);
    if(isler.data) DB.mesailer = (typeof mesailer !== 'undefined' && mesailer.data) ? mesailer.data.map(mesaiDBdenJS) : [];
    if(talepler && talepler.data) DB.talepler = talepler.data;
    if(nakliyeler && nakliyeler.data) DB.nakliyeler = nakliyeler.data;
    // İş kazaları (tablo yoksa ana yüklemeyi bozmasın diye ayrı/güvenli)
    try {
      const kazalar = await supa.from('kazalar').select('*').order('tarih', {ascending:false});
      DB.kazalar = (kazalar && kazalar.data) ? kazalar.data : [];
    } catch(e) { DB.kazalar = []; }
    if(ayarlar.data) {
      ayarlar.data.forEach(function(a) {
        if(a.anahtar==='admin_pin') ADMIN_PIN=a.deger;
        if(a.anahtar==='yakit_pin') YAKIT_PIN=a.deger;
        if(a.anahtar==='litre_fiyati') DB.litreFiyati=a.deger;
        if(a.anahtar==='kpi_depo_doluluk') { window.KPI_DASH=window.KPI_DASH||{depoDoluluk:"",planaUyum:"",isKazasi:""}; window.KPI_DASH.depoDoluluk=a.deger; }
        if(a.anahtar==='kpi_is_kazasi') { window.KPI_DASH=window.KPI_DASH||{depoDoluluk:"",planaUyum:"",isKazasi:""}; window.KPI_DASH.isKazasi=a.deger; }
      });
    }
  } catch(e) {
    console.error("DB yükleme hatası:", e);
    showToast("Veritabanı bağlantı hatası!","error");
  }
}

  var yil = now.getFullYear();
  var ay = String(now.getMonth()+1).padStart(2,"0");
  var gun = String(now.getDate()).padStart(2,"0");
  return yil+"-"+ay+"-"+gun;
}

async function isEkle() {
  var kat = document.getElementById("is-kat").value;
  var tarih = document.getElementById("is-tarih").value;
  var firma = document.getElementById("is-firma").value.trim();
  var miktar = "";
  var oncelik = "Normal";
  var not = "";
  if(!firma) { showToast("Firma/konum adı zorunlu!","error"); return; }
  const yeniIs = {
    kategori:kat, tarih:tarih, firma:firma, miktar:miktar, oncelik:oncelik,
    not:not, durum:"Bekliyor",
    olusturma:new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"})
  };
  try {
    const data = await isEkleDB(yeniIs);
    DB.isler.push({...yeniIs, id: data.id});
  } catch(e) { DB.isler.push({...yeniIs, id: Date.now()}); }
  showToast(firma+" eklendi!");
  if(AKTIF_TAB==="islisteleme") renderIsListe(); else renderIsListesi();
}

async function isDurumSet(id, hedef) {
  var mevcut = DB.isler.find(i=>i.id===id);
  if(!mevcut) return;
  // Aynı duruma tekrar basılırsa Bekliyor'a dön (geri alma)
  var yeniDurum = (mevcut.durum===hedef) ? "Bekliyor" : hedef;
  try { await isDurumGuncelleDB(id, yeniDurum); } catch(e) {}
  DB.isler = DB.isler.map(function(i){
    if(i.id===id) return Object.assign({},i,{durum:yeniDurum});
    return i;
  });
  renderIsListe();
}

async function isSil(id) {
  try { await isSilDB(id); } catch(e) {}
  DB.isler = DB.isler.filter(function(i){ return i.id!==id; });
  renderIsListe();
}

function isFiltreKat(k) { window.IS_FILTRE_KAT=k; renderIsListe(); }

async function aracPlanExcel() {
  var isler = (DB.isler||[]).slice().sort(function(a,b){ return (a.tarih||"").localeCompare(b.tarih||""); });
  if(isler.length===0){ showToast("İş kaydı yok!","error"); return; }
  var wb = new ExcelJS.Workbook();
  var ws = wb.addWorksheet("Sayfa1");
  var basliklar = ["No","Tarih","İlgili Birim","Açıklama","Araç Kullanım","Çıkış Yeri","Gidiş Yeri","Planlanan Sevkiyat","Plaka","Hafta","Plan","Gerçekleşen"];
  var gen = [6,13,16,28,16,13,26,20,10,9,9,14];
  gen.forEach(function(w,i){ ws.getColumn(i+1).width=w; });
  var ince={style:"thin",color:{argb:"FFB0B0B0"}};
  // Başlık
  basliklar.forEach(function(b,i){
    var c=ws.getCell(1,i+1); c.value=b;
    c.font={name:"Arial",bold:true,size:11}; c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFFCE4D6"}};
    c.alignment={horizontal:"left",vertical:"middle"}; c.border={top:ince,bottom:ince,left:ince,right:ince};
  });
  ws.getRow(1).height=20;
  // Satırlar
  isler.forEach(function(is,idx){
    var r=idx+2;
    var nakliyeMi = is.kaynak==="nakliye" || /nakliye/i.test(is.firma||"");
    var planlanan = parseFloat(is.miktar)||1;
    var gerc = is.durum==="Tamamlandı" ? 1 : 0;
    var satir = [
      idx+1,
      is.tarih ? new Date(is.tarih) : null,
      is.kategori||"",
      is.firma||"",
      nakliyeMi?"Nakliye":"KR","KR",
      {formula:"D"+r},
      planlanan,
      null,
      {formula:'CONCATENATE("W",WEEKNUM(B'+r+',11))'},
      {formula:"H"+r+"*1"},
      gerc
    ];
    satir.forEach(function(v,i){
      var c=ws.getCell(r,i+1); c.value=v;
      c.font={name:"Arial",size:11};
      c.border={top:ince,bottom:ince,left:ince,right:ince};
      c.alignment={horizontal:"left"};
      if(i===1){ c.numFmt="dd.mm.yyyy"; }
    });
    // İlgili Birim (C): kalın + mavi dolgu
    var cc=ws.getCell(r,3); cc.font={name:"Arial",size:11,bold:true}; cc.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFDDEBF7"}};
    // Nakliye satırı: D ve G kırmızı + kalın
    if(nakliyeMi){
      ws.getCell(r,4).font={name:"Arial",size:11,bold:true,color:{argb:"FFFF0000"}};
      ws.getCell(r,7).font={name:"Arial",size:11,bold:true,color:{argb:"FFFF0000"}};
    }
  });
  try {
    var buffer = await wb.xlsx.writeBuffer();
    var blob = new Blob([buffer],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    var url=URL.createObjectURL(blob); var a=document.createElement("a");
    a.href=url; a.download="Arac_Gerceklesen_Plan_"+bugunTR()+".xlsx";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
    showToast("Araç planı indirildi!");
  } catch(e){ showToast("Hata: "+(e.message||"oluşturulamadı"),"error"); }
}

async function isExcel() {
  var tarih = window.IS_FILTRE_TARIH || bugunTR();
  var isler = DB.isler.filter(function(i){ return i.tarih===tarih; });
  if(isler.length===0) { showToast("Aktarılacak kayıt yok!","error"); return; }

  var parca = tarih.split("-");
  var tarihGoster = parca[2]+"/"+parca[1]+"/"+parca[0];

  var katVeriler = {};
  IS_KATEGORILER.forEach(function(kat){
    katVeriler[kat] = isler
      .filter(function(i){ return i.kategori===kat; })
      .map(function(i){ return i.firma + (i.miktar?" ("+i.miktar+")":""); });
  });
  var maxSatir = Math.max(1, Math.max.apply(null, IS_KATEGORILER.map(function(k){ return (katVeriler[k]||[]).length; })));

  var wb = new ExcelJS.Workbook();
  var ws = wb.addWorksheet("Araç Programı");

  // Sütun A boşluk, B-G kategoriler
  ws.getColumn(1).width = 4;
  for(var ci=0; ci<IS_KATEGORILER.length; ci++) ws.getColumn(ci+2).width = 30;

  // Satır 1: boşluk
  ws.getRow(1).height = 12;

  // Satır 2: Başlık - birleştirme yok, her hücre ayrı, tüm kenarlıklar kapalı
  ws.getRow(2).height = 36;
  for(var ci=0; ci<IS_KATEGORILER.length; ci++) {
    var cell = ws.getCell(2, ci+2);
    cell.value = ci===0 ? tarihGoster + " ARAÇ PROGRAMI" : null;
    cell.font = {name:"Arial", bold:true, size:16};
    cell.fill = {type:"pattern", pattern:"solid", fgColor:{argb:"FFFFD700"}};
    cell.alignment = {horizontal:"center", vertical:"middle"};
    cell.border = {
      top:    {style:"medium"},
      bottom: {style:"thin"},
      left:   {style:"medium"},
      right:  {style:"medium"}
    };
  }
  ws.mergeCells(2, 2, 2, IS_KATEGORILER.length+1);

  // Satır 3: Kategori başlıkları
  ws.getRow(3).height = 26;
  IS_KATEGORILER.forEach(function(kat, i) {
    var cell = ws.getCell(3, i+2);
    cell.value = kat;
    cell.font = {name:"Arial", bold:true, size:12};
    cell.fill = {type:"pattern", pattern:"solid", fgColor:{argb:"FF00CFCF"}};
    cell.alignment = {horizontal:"center", vertical:"middle"};
    cell.border = {
      top:{style:"thin"}, bottom:{style:"thin"},
      left:{style: i===0?"medium":"thin"},
      right:{style: i===IS_KATEGORILER.length-1?"medium":"thin"}
    };
  });

  // Satır 4+: Veri satırları
  for(var r=0; r<maxSatir; r++) {
    var rowNum = r + 4;
    var sonSatir = r === maxSatir-1;
    ws.getRow(rowNum).height = 25;
    IS_KATEGORILER.forEach(function(kat, i) {
      var cell = ws.getCell(rowNum, i+2);
      cell.value = (katVeriler[kat]||[])[r] || "";
      cell.font = {name:"Arial", size:11};
      cell.alignment = {horizontal:"left", vertical:"middle"};
      cell.border = {
        top:{style:"thin"},
        bottom:{style: sonSatir?"medium":"thin"},
        left:{style: i===0?"medium":"thin"},
        right:{style: i===IS_KATEGORILER.length-1?"medium":"thin"}
      };
    });
  }

  try {
    var buffer = await wb.xlsx.writeBuffer();
    var blob = new Blob([buffer], {type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "AracProgrami_"+tarih+".xlsx";
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
    showToast("Araç programı indirildi!");
  } catch(e) {
    showToast("Hata: "+e.message,"error");
  }
}

function mesaiSureHesapla() {
  var bas = document.getElementById("m-bas")?.value;
  var bit = document.getElementById("m-bit")?.value;
  var el = document.getElementById("mesai-sure");
  if(!el) return;
  if(bas && bit) {
    var basDk = parseInt(bas.split(":")[0])*60 + parseInt(bas.split(":")[1]);
    var bitDk = parseInt(bit.split(":")[0])*60 + parseInt(bit.split(":")[1]);
    var fark = bitDk - basDk;
    if(fark < 0) fark += 1440;
    el.style.display = "block";
    el.innerHTML = '⏱️ Mesai süresi: <strong style="color:#0a84ff">' + formatSure(fark) + '</strong>';
    el.dataset.sure = fark;
  } else {
    el.style.display = "none";
  }
}

async function mesaiEkle() {
  var sofor = document.getElementById("m-sofor").value;
  var tarih = document.getElementById("m-tarih").value;
  var bas = document.getElementById("m-bas").value;
  var bit = document.getElementById("m-bit").value;
  var aciklama = document.getElementById("m-aciklama").value;
  if(!sofor||!tarih||!bas||!bit) { showToast("Zorunlu alanları doldurun!","error"); return; }
  var basDk = parseInt(bas.split(":")[0])*60 + parseInt(bas.split(":")[1]);
  var bitDk = parseInt(bit.split(":")[0])*60 + parseInt(bit.split(":")[1]);
  var sure = bitDk - basDk;
  if(sure < 0) sure += 1440;
  var yeniMesai = {sofor, tarih, baslangic:bas, bitis:bit, sure_dakika:sure, aciklama};
  try {
    const data = await mesaiEkleDB(yeniMesai);
    DB.mesailer.unshift({...yeniMesai, id:data.id});
    showToast(sofor+" mesai eklendi!");
    if(AKTIF_TAB==="mesailiste") renderMesaiListe(); else renderMesailer();
  } catch(e) { showToast("Hata: "+e.message,"error"); }
}

async function mesaiSil(id) {
  try { await mesaiSilDB(id); } catch(e) {}
  DB.mesailer = DB.mesailer.filter(function(m){ return m.id!==id; });
  showToast("Mesai silindi.");
  renderMesaiListe();
}

function mesaiFiltreGuncelle(v) { window.MESAI_FILTRE_SOFOR=v; renderMesaiListe(); }
function mesaiTarihFiltre(tip,v) {
  if(tip==="bas") window.MESAI_FILTRE_BAS=v;
  else window.MESAI_FILTRE_BIT=v;
  renderMesaiListe();
}
function mesaiHizliFiltre(gun) {
  if(gun===0) { window.MESAI_FILTRE_BAS=""; window.MESAI_FILTRE_BIT=""; }
  else if(gun===1) { window.MESAI_FILTRE_BAS=bugunTR(); window.MESAI_FILTRE_BIT=bugunTR(); }
  else { window.MESAI_FILTRE_BIT=bugunTR(); window.MESAI_FILTRE_BAS=new Date(Date.now()-gun*24*60*60*1000).toISOString().split("T")[0]; }
  renderMesaiListe();
}

async function nakliyeEkle() {

  var yeni = {tarih, sevk_adresi:adres, fiyat, aciklama};
  try {
    const data = await nakliyelEkleDB(yeni);
    DB.nakliyeler.unshift({...yeni, id:data.id});
    // İş listesine de ekle (kaynak: nakliye)
    try {
      var yeniIs = {
        kategori: "Nakliye", tarih: tarih, firma: adres,
        miktar: "", oncelik: "Normal", not: aciklama||"",

      var isData = await isEkleDB(yeniIs);
      DB.isler = DB.isler || [];
      DB.isler.unshift(Object.assign({}, yeniIs, {id:isData.id}));
    } catch(e) {}
    showToast("Nakliye kaydı eklendi (iş listesine de işlendi)!");

function nakliyeFiyatDuzenle(id) {
  if(KUL.rol!=="admin") return;
  var n = DB.nakliyeler.find(function(x){ return x.id===id; });
  if(!n) return;
  window._fiyatNakliyeId = id;
  document.getElementById("fiyat-input").value = n.fiyat;
  document.getElementById("fiyat-modal").style.display = "flex";
  setTimeout(function(){ document.getElementById("fiyat-input").focus(); }, 100);
}
function fiyatModalKapat() {
  document.getElementById("fiyat-modal").style.display = "none";
  window._fiyatNakliyeId = null;
}
async function fiyatModalKaydet() {
  var id = window._fiyatNakliyeId;
  var yeni = parseFloat(document.getElementById("fiyat-input").value);
  if(!id || isNaN(yeni)) { showToast("Geçerli bir tutar girin!","error"); return; }
  fiyatModalKapat();
  try {
    await supa.from('nakliyeler').update({fiyat:yeni}).eq('id', id);
    DB.nakliyeler = DB.nakliyeler.map(function(n){ return n.id===id?Object.assign({},n,{fiyat:yeni}):n; });
    showToast("Nakliye ücreti güncellendi.");
    renderNakliyeListe();
  } catch(e) { showToast("Hata: "+(e.message||"güncellenemedi"),"error"); }
}

function kazaHizliFiltre(gun) {

}

async function kazaEkle() {
  var tarih = document.getElementById("k-tarih").value;
  var kisi = document.getElementById("k-kisi").value.trim();
  var arac = document.getElementById("k-arac").value.trim();
  var agirlik = document.getElementById("k-agirlik").value;
  var aciklama = document.getElementById("k-aciklama").value.trim();
  if(!tarih||!agirlik||!aciklama) { showToast("Tarih, ağırlık ve açıklama zorunlu!","error"); return; }
  var yeni = {tarih, kisi, arac, agirlik, aciklama};
  try {
    const data = await kazaEkleDB(yeni);
    DB.kazalar = DB.kazalar || [];
    DB.kazalar.unshift(Object.assign({}, yeni, {id:data.id}));
    showToast("İş kazası kaydı eklendi.");
    if(AKTIF_TAB==="kazaliste") renderKazaListe(); else renderKaza();
  } catch(e) { showToast("Hata: "+(e.message||"kayıt eklenemedi"),"error"); }
}

async function kazaSil(id) {
  if(KUL.rol!=="admin") { showToast("Bu işlem için yetkiniz yok.","error"); return; }
  if(!confirm("Bu kaza kaydını silmek istediğinize emin misiniz?")) return;
  try { await kazaSilDB(id); } catch(e) {}
  DB.kazalar = (DB.kazalar||[]).filter(function(k){ return k.id!==id; });
  showToast("Kaza kaydı silindi.");
  renderKazaListe();
}

async function kazaModalKaydet() {
  var id = window._kazaModalId;
  if(!id) return;
  var guncel = {
    kisi: document.getElementById("km-kisi").value.trim(),
    arac: document.getElementById("km-arac").value.trim(),
    agirlik: document.getElementById("km-agirlik").value,
    aciklama: document.getElementById("km-aciklama").value.trim()
  };
  try {
    await supa.from('kazalar').update(guncel).eq('id', id);

function kazaModalKapat() {

async function kazaEkleDB(k) {
  const {data,error} = await supa.from('kazalar').insert({
    tarih:k.tarih, kisi:k.kisi||"", arac:k.arac||"", agirlik:k.agirlik, aciklama:k.aciklama||""
  }).select().single();
  if(error) throw error; return data;
}

async function talepleriTazele() {
  try {
    var res = await supa.from('talepler').select('*').order('created_at', {ascending:false});
    if(res && res.data) {
      var eskiBekleyen = DB.talepler.filter(function(t){return t.durum==="Bekliyor";}).length;
      var eski = JSON.stringify(DB.talepler.map(function(t){return t.id+":"+t.durum;}));
      DB.talepler = res.data;
      var yeniBekleyen = DB.talepler.filter(function(t){return t.durum==="Bekliyor";}).length;
      var yeni = JSON.stringify(DB.talepler.map(function(t){return t.id+":"+t.durum;}));
      // Yeni bekleyen talep geldiyse uyarı ver (ilk yüklemede değil)
      if(window._talepIlkYukleme && yeniBekleyen>eskiBekleyen) {
        var fark = yeniBekleyen - eskiBekleyen;
        showToast("🚗 "+fark+" yeni araç talebi geldi!");
        talepBipCal();
        // Rozet güncellensin (sekmeyi sıfırlamadan)
        if(AKTIF_MENU==="diger" && typeof renderAkordeon==="function") try { renderAkordeon(); } catch(e){}
      }
      window._talepIlkYukleme = true;
      // Veri değiştiyse ve hâlâ talepler ekranındaysak yeniden çiz (sonsuz döngüye girmeden)
      if(eski!==yeni && AKTIF_TAB==="talepler") {
        window._talepTazeleniyor = true;
        renderTalepler();
        window._talepTazeleniyor = false;
      }
    }
  } catch(e) {}
}

// Kısa bir bip sesi (Web Audio - dosya gerektirmez)
function talepBipCal() {
  try {
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = "sine"; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.3);
    osc.start(); osc.stop(ctx.currentTime+0.3);
  } catch(e) {}
}

        '</div>' +
        '<span class="badge '+badgeClass+'">'+t.durum+'</span>' +

async function talepOnayla(id) {
  var talep = DB.talepler.find(function(t){ return t.id===id; });
  try { await talepDurumGuncelleDB(id, "Onaylandı"); } catch(e) {}
  DB.talepler = DB.talepler.map(function(t){ return t.id===id?Object.assign({},t,{durum:"Onaylandı"}):t; });
  // Onaylanan talebi otomatik iş listesine ekle
  if(talep) {
    var yeniIs = {
      kategori: talep.departman || "Diğer",
      tarih: talep.tarih || bugunTR(),
      firma: talep.nereye || "",
      miktar: "",
      oncelik: "Normal",
      not: talep.aciklama || "",
      durum: "Bekliyor",
      kaynak: "talep"
    };
    try {
      var data = await isEkleDB(yeniIs);
      DB.isler = DB.isler || [];
      DB.isler.unshift(Object.assign({}, yeniIs, {id:data.id}));
      showToast("Talep onaylandı, iş listesine eklendi!");
    } catch(e) {
      showToast("Talep onaylandı (iş eklenemedi: "+(e.message||"hata")+")");
    }
  } else {
    showToast("Talep onaylandı!");
  }
  renderTalepler();
}

}
async function redModalOnayla() {
  var id = window._redTalepId;
  if(!id) return;
  var neden = document.getElementById("red-neden-input").value.trim();
  redModalKapat();
  try { await talepReddetDB(id, neden); } catch(e) {}
  DB.talepler = DB.talepler.map(function(t){ return t.id===id?Object.assign({},t,{durum:"Reddedildi", red_nedeni:neden}):t; });
  showToast("Talep reddedildi.");
  renderTalepler();
}

async function talepReddetDB(id, neden) {
  await supa.from('talepler').update({durum:"Reddedildi", red_nedeni:neden||""}).eq('id', id);
}

async function talepBekleyeAl(id) {
  try { await talepDurumGuncelleDB(id, "Bekliyor"); } catch(e) {}
  DB.talepler = DB.talepler.map(function(t){ return t.id===id?Object.assign({},t,{durum:"Bekliyor"}):t; });
  renderTalepler();
}

async function talepSil(id) {
  try { await talepSilDB(id); } catch(e) {}
  DB.talepler = DB.talepler.filter(function(t){ return t.id!==id; });
  showToast("Talep silindi.");
  renderTalepler();
}

window.addEventListener("load", async ()=>{
  logo();
  document.querySelectorAll("#login-logo-img,#header-logo-img").forEach(img=>img.src=LOGO_SRC);

  // Giriş öncesi gerçek PIN'leri ve şoför listesini yükle (eski PIN'le giriş hatasını önler)
  await loginVerisiYukle();

  // Oturum kontrolü - yenileme sonrası otomatik giriş
  var savedKul = sessionStorage.getItem("kul");
  if(savedKul) {
    try {
      var kul = JSON.parse(savedKul);
      var savedMenu = sessionStorage.getItem("aktif_menu") || "ana";
      var savedTab = sessionStorage.getItem("aktif_tab") || "rapor";
      await girisYap(kul);
      if(kul.rol==="admin") {
        altMenuSec(savedMenu);
        tabSec(savedTab);
      }
      return;
    } catch(e) { sessionStorage.removeItem("kul"); }
  }
  // Oturum yok: login ekranındayız, zoom kapalı olsun
  zoomKapat();

  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/arac-takip/sw.js').catch(()=>{});
  }
});
